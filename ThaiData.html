<script>
const ThaiMasterData = {
  consonants: {}, 
  vowelRules: [], 
  clusters: {},
  terminalGroups:{},

  toneMap: {
    0: { mark: '', label: '平声 (Common)', color: 'text-teal-600 dark:text-teal-400' }, 
    1: { mark: '̀', label: '低声 (Low)', color: 'text-red-500' },
    2: { mark: '̂', label: '下声 (Falling)', color: 'text-purple-500' },
    3: { mark: '́', label: '高声 (High)', color: 'text-sky-500' },
    4: { mark: '̌', label: '上声 (Rising)', color: 'text-amber-500' }
  },

  classColors: {
    'Low': 'text-blue-400',
    'Mid': 'text-green-400',
    'High': 'text-red-400',
    '不明': 'text-white/30'
  },

};
// ==========================================
// 2. DB展開ロジック：Bridgeから呼ばれる「加工担当」
// ==========================================
function initializeThaiMaster(dbFull) {
  if (!dbFull) return;

  // 子音展開 (charをキーにする)
  ThaiMasterData.consonants = {};
  dbFull.consonants.forEach(item => {
    const key = item.char || item.symbol; 
    ThaiMasterData.consonants[key] = {
      class: item.class, name: item.name, sound: item.sound, final: item.final
    };
  });

  // 母音展開 (長い文字列から順にソートして、誤判定を防ぐ)
  ThaiMasterData.vowelRules = dbFull.vowelRules.sort((a, b) => 
    (b.symbols?.length || 0) - (a.symbols?.length || 0)
  );

  // クラスタ展開 (comboをキーにする)
  ThaiMasterData.clusters = {};
  dbFull.clusters.forEach(item => {
    ThaiMasterData.clusters[item.combo] = { sound: item.sound, class: item.class };
  });

  // 末子音グループ (final の値から Live/Dead を動的生成)
  ThaiMasterData.terminalGroups = {};
  Object.entries(ThaiMasterData.consonants).forEach(([char, info]) => {
    if (['k', 't', 'p'].includes(info.final)) {
      ThaiMasterData.terminalGroups[char] = 'Dead';
    } else if (info.final && info.final !== '-') {
      ThaiMasterData.terminalGroups[char] = 'Live';
    }
  });

  console.log("✅ ThaiMasterData Initialized from DB.");
}

</script>
