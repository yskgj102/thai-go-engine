<script>

/**
 * StudyEngine: 学習システムの中枢ロジック
 * AppStoreのステート（状態）を監視し、描画、音声再生、学習進捗の判定を行う司令塔。
 */
const StudyEngine = {

  /**
   * 学習画面のメインレンダリング（描画）
   * キューから現在の単語を抽出し、ViewControllerを介して画面上の全てのテキスト・色・統計情報を更新する。
   */
  render: function() {

    // カードが変わる際、分析パネルをリセット（非表示）にする
    const panel = document.getElementById('analysis-panel');
    if (panel) { panel.classList.add('hidden'); panel.style.display = 'none'; }
    const list = AppStore.state.queue;
    if (!list || list.length === 0) return;
    
    // カード描画のたびに「めくり状態」を未読(false)にリセット
    AppStore.update('revealed', false);

    // 現在のインデックスに該当する単語オブジェクトを取得
    const item = list[AppStore.state.currentIndex];

    // 1. UIの物理リセット（隠すべき要素を隠し、スクロール位置などを整える）
    ViewController.resetCardUI();

    // 2. 視覚的情報の更新（忘却曲線に基づくボーダー色、最終学習日などの統計）
    ViewController.updateBorder(item);
    ViewController.updateStats(item);
    
    // 3. テキストデータの流し込み（現在の出題言語モードに応じてタイ語/日本語を切り替え）
    ViewController.updateText(item, AppStore.state.isTargetThai);

    this.renderContextLinks(item.example_th, 'ex-th', item.id);
    
    // ★ 解説（日本語/タイ語混じり）にもリンクを貼る
    // 解説文の中にタイ語が含まれていれば、それも自動でチップになります
    this.renderContextLinks(item.explanation, 'note', item.id);
    // this.renderContextLinks(item.explanation, 'ex-ja', item.id);

    // ★ 追加：逆引き（この単語を引用している他のカード）を表示
    // 第一引数に「今のタイ語単語」、第二引数に「今のID（自分を除外するため）」を渡す
    this.renderReferences(item.word_th, item.id);
    
// ★ render は「今のカードを表示した瞬間」の見た目を整えるだけに留める
    const btn = document.getElementById('bookmark-btn');
    const icon = document.getElementById('card-bookmark-icon');
    
    if (btn && icon && item) {
      const isBM = (item.is_bookmark === true || String(item.is_bookmark).toLowerCase() === "true");
      
      // ここは「初期描画時」に星がついているか判定して色を塗るだけ
      icon.innerText = isBM ? "★" : "☆";
      if (isBM) btn.classList.add('is-gold');
      else btn.classList.remove('is-gold');
    }
    // 4. スクロール時に出現するヘッダー情報の同期
    this.syncHeader();

    
  },

  /**
   * 音声合成エンジンによる再生
   * @param {boolean} isEx - trueなら例文、falseなら単語単体を再生
   */
  speak: function(isEx = false) {
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return;

    let text = "";
    let lang = "th-TH";

    // モード判定：タイ語学習時はタイ語、日本語学習時は日本語（意味）を選択
    if (AppStore.state.isTargetThai) {
      text = isEx ? item.example_th : item.word_th;
      lang = "th-TH";
    } else {
      // 日本語学習モード（タイ人向け等）では、意味(meaning_ja)を日本語で読み上げる
      text = isEx ? item.example_ja : item.meaning_ja;
      lang = "ja-JP";
    }

    // 音声再生の実務を AudioSystem モジュールへ委託
    AudioSystem.play(
      text, 
      lang, 
      AppStore.state.isSlowMode ? 0.5 : 0.9 // スローモードなら0.5倍速
    );
  },

  /**
   * 再生速度（スローモード）のトグル切り替え
   * UI上のアイコン(🐢/🐌)と再生速度パラメータを同時に更新する。
   */
  toggleSlowMode: function() {
    if (AppStore.state.isProcessing) return;

    AppStore.state.isSlowMode = !AppStore.state.isSlowMode;
    const btn = document.getElementById('slow-mode-btn');
    
    if (btn) {
      if (AppStore.state.isSlowMode) {
        btn.classList.add('text-yellow-400', 'scale-110');
        btn.style.opacity = "1";
        btn.innerText = "🐢"; 
      } else {
        btn.classList.remove('text-yellow-400', 'scale-110');
        btn.style.opacity = "0.2";
        btn.innerText = "🐌";
      }
    }
    ViewController.showToast(`Speed: ${AppStore.state.isSlowMode ? '0.5x' : '0.9x'}`, "success");
  },

  /**
   * 指定したHTML要素内のテキストをクリップボードにコピー
   */
  copyText: function(elementId) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const text = el.innerText;
    if (!text || text === '---') return;

    navigator.clipboard.writeText(text).then(() => {
      ViewController.showToast(`Copied: ${text}`, "success");
    });
  },

  /**
   * 単語の忘却スコアに基づいてHSLカラーコードを算出
   * 赤(忘却中) -> 黄(復習期) -> 緑(定着) のグラデーションを定義。
   */
  getColor: function(item) {
    if (!item) return "hsl(0, 0%, 90%)";
    if (item.last_date === 'New') return "hsl(200, 70%, 60%)";

    const s = parseFloat(item.priority_score) || 0;
    if (s > 1.2) return "hsl(0, 75%, 60%)";   // 強警告：赤
    if (s > 0.8) return "hsl(45, 90%, 60%)";  // 警告：黄
    return "hsl(140, 50%, 70%)";             // 正常：緑
  },

  /**
   * カードをめくり、解答情報を表示する
   * 裏面の表示切り替えと音声の自動再生をトリガーする。
   */
  revealAll: function() {
    if (AppStore.state.revealed) return;

    // 状態を「めくり済み」に変更
    AppStore.update('revealed', true);

    // UIの切り替え実務を ViewController に委譲（一貫性の確保）
    ViewController.applyRevealUI(AppStore.state.isTargetThai);

    // 裏面表示と同時に単語を自動読み上げ
    this.speak(false); 
  },

  /**
   * ユーザーの自己評価を記録し、次のカードへ遷移する
   * @param {number} rating - 1(難), 2(普), 3(易)
   */
  answer: function(rating) {
    // 通信中、未読、連打の防止
    if ( !AppStore.state.revealed || AppStore.state.isAnswering) return;
    // if (AppStore.state.isProcessing || !AppStore.state.revealed || AppStore.state.isAnswering) return;
    AppStore.state.isAnswering = true;
    
    const list = AppStore.state.queue;
    const item = list[AppStore.state.currentIndex];
    
    // 解答演出とサーバーへのログ保存
    ViewController.playSuccessEffect(); 
    Bridge.saveLog(item.id, rating);

    setTimeout(() => {
      AppStore.state.isAnswering = false;
      document.getElementById('word-card').classList.remove('success-flash');
      document.getElementById('footer-ui').classList.add('translate-y-full', 'pointer-events-none');
      
      // 次のインデックスを算出（リスト末尾なら最初に戻る）
      const nextIdx = (AppStore.state.currentIndex + 1) % list.length;
      AppStore.update('currentIndex', nextIdx);
      this.render(); // 次のカードを描画
    }, 150);
  },

  /**
   * ミニヘッダー（スクロール時出現）の内容を現在の単語と同期
   */
  syncHeader: function() {
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return;
    const th = document.getElementById('header-display-th');
    const ja = document.getElementById('header-display-ja');
    
    if (AppStore.state.isTargetThai) {
      th.innerText = item.word_th || '---';
      ja.innerText = item.meaning_ja || '---';
    } else {
      th.innerText = item.meaning_ja || '---';
      ja.innerText = item.word_th || '---';
    }
  },
/**
   * 特定の単語IDへジャンプ（飛ばしバグ修正版）
   */
  jumpToWordFromId: function(id) {
    const queue = AppStore.state.queue;
    const targetIdx = queue.findIndex(v => v.id === id);
    const currentIdx = AppStore.state.currentIndex;

    if (targetIdx !== -1) {
      // 1. ターゲットを配列から切り出す
      const [targetItem] = queue.splice(targetIdx, 1);
      
      // 2. 挿入位置（今見ている単語の直前）を計算
      // ターゲットが現在地より「前」にいた場合、抜いたことで現在地が1つ前にズレているので調整
      let insertIdx = currentIdx;
      if (targetIdx < currentIdx) {
        insertIdx = currentIdx - 1;
      }

      // 3. 挿入
      queue.splice(insertIdx, 0, targetItem);
      
      // 4. 現在地をその挿入した場所に固定
      AppStore.update('currentIndex', insertIdx);
      
      // 5. 再描画
      this.render(); 
      
      console.log(`[FixedJump] ID: ${id} moved to ${insertIdx}. Queue consistency maintained.`);
    }
  },
  /**
   * 学習進捗統計（ヒートマップ）をサーバーから取得し描画
   */
renderHeatmap: function() {
  google.script.run.withSuccessHandler(d => {
    const now = new Date();
    const start = new Date();
    // 画面に収まりつつ、少しだけスクロールできる「ちょうどいい」期間（150日）
    start.setDate(now.getDate() - 150);

    const fmt = (date) => date.toISOString().split('T')[0];

    new frappe.Chart("#heatmap", { 
      type: 'heatmap', 
      data: { dataPoints: d }, 
      start: fmt(start), 
      end: fmt(now), // ★ これで「今日」が右端の境界線になります
      countOfWeeks: 20, // ★ 画面幅に収まる「週の数」を明示的に指定（ライブラリの自動計算を防ぐ）
      colors: ['#1e293b', '#4f46e5', '#6366f1', '#818cf8', '#c7d2fe']
    });

    // 描画後、少しだけ右に寄せる（念のため）
    setTimeout(() => {
      const el = document.querySelector('.heatmap-scroll');
      if (el) el.scrollLeft = el.scrollWidth;
    }, 200);
  }).getLearningStatistics();
},
  /**
   * 出題のメイン言語（タイ語からか、日本語からか）を切り替える
   */
  toggleTargetLanguage: function() {
    if (AppStore.state.isProcessing) return;
    
    const nextMode = !AppStore.state.isTargetThai;
    AppStore.update('isTargetThai', nextMode);
    
    const btn = document.getElementById('target-toggle-btn');
    if (btn) btn.innerText = nextMode ? "🇹🇭" : "🇯🇵";
    
    this.render(); 
  },

  /**
   * 学習アルゴリズム（Smart:忘却曲線重視 / Classic:ランダム）を切り替える
   */
  toggleMode: function() {
    if (AppStore.state.isProcessing) return;
    
    AppStore.state.isSmart = !AppStore.state.isSmart; 
    const btn = document.getElementById('mode-btn');
    if (btn) btn.innerText = AppStore.state.isSmart ? '🧠' : '✨';
    
    // Bridgeのソートロジックを再実行してキューを再構成
    Bridge._refreshQueue(AppStore.state.allVocab);
    this.render();
  },

  /**
   * 外部タイ語辞書サイト（GotThai）を現在のワードで開く
   */
  openGotThai: function(query) {
    if (AppStore.state.isProcessing) return;

    let word = "";
    if (query !== undefined && query !== null) {
      word = query.trim();
    } else {
      // 引数がない場合は現在表示中のカードのタイ語を使用
      const item = AppStore.state.queue[AppStore.state.currentIndex];
      word = item ? item.word_th : "";
    }

    if (!word || word === '---' || word === '') {
      ViewController.showToast("Please enter or select a word.", "warning");
      return;
    }

    // GotThai検索用URLの生成
    const url = "https://www.gotthai.net/search_all?search_form_all%5Bkeyword%5D=" 
              + encodeURIComponent(word) 
              + "&search_form_all%5Bforce_type%5D=thai";
    
    window.open(url, '_blank');
    ViewController.showToast(`Searching "${word}" on GotThai...`, "success");
  },


renderContextLinks: function(rawText, targetElementId, excludeId) {
  const targetEl = document.getElementById(targetElementId);
  if (!rawText || !targetEl) return;

  let text = rawText;
  const allVocab = AppStore.state.allVocab;
  const map = new Map();

  // 1. 【自分自身の処理】 
  // excludeId に一致する「自分」を先に見つけ、特別なクラス 'is-self' を付与
  const selfVocab = allVocab.find(v => v.id === excludeId);
  if (selfVocab && text.includes(selfVocab.word_th)) {
    const placeholder = `__SELF__`;
    const meaning = selfVocab.meaning_ja.replace(/"/g, '&quot;');
    // クラスに 'is-self' を追加
    const linkHtml = `<span class="context-link is-self" data-meaning="${meaning}" onclick="event.stopPropagation(); StudyEngine.handleContextClick(this, '${selfVocab.id}')">${selfVocab.word_th}</span>`;
    
    map.set(placeholder, linkHtml);
    text = text.split(selfVocab.word_th).join(placeholder);
  }

  // 2. 【自分以外の処理】
  const sortedOthers = [...allVocab]
    .filter(v => v.word_th && v.word_th.length > 1 && v.id !== excludeId)
    .sort((a, b) => b.word_th.length - a.word_th.length);

  sortedOthers.forEach((v, index) => {
    if (text.includes(v.word_th)) {
      const placeholder = `__VOCAB_${index}__`;
      const meaning = v.meaning_ja.replace(/"/g, '&quot;');
      const linkHtml = `<span class="context-link" data-meaning="${meaning}" onclick="event.stopPropagation(); StudyEngine.handleContextClick(this, '${v.id}')">${v.word_th}</span>`;
      
      map.set(placeholder, linkHtml);
      text = text.split(v.word_th).join(placeholder);
    }
  });

  // 3. 復元
  map.forEach((html, placeholder) => {
    text = text.split(placeholder).join(html);
  });

  targetEl.innerHTML = text;
},
/**
 * 2クリック遷移のロジック（ここだけ追加）
 */
handleContextClick: function(el, id) {
  if (el.classList.contains('is-confirming')) {
    // 2回目：ジャンプ
    this.jumpToWordFromId(id);
    el.classList.remove('is-confirming');
  } else {
    // 1回目：他を消して自分を「確認中」にする（これでCSSのTIPが出る）
    document.querySelectorAll('.context-link').forEach(l => l.classList.remove('is-confirming'));
    el.classList.add('is-confirming');
    
    // 3秒後に自動解除
    setTimeout(() => el.classList.remove('is-confirming'), 3000);
  }
},
/**
 * この単語を「解説」や「例文」に含んでいる他の単語を抽出する
 */
renderReferences: function(currentWordTh, currentId) {
  const refListEl = document.getElementById('reference-list');
  if (!refListEl) return;

  // 全単語の中から、解説文(explanation)に今の単語が含まれているものを探す
  const refs = AppStore.state.allVocab.filter(v => 
    v.id !== currentId && 
    (v.explanation.includes(currentWordTh) || v.example_th.includes(currentWordTh))
  );

  if (refs.length === 0) {
    refListEl.innerHTML = ""; // なければ非表示
    return;
  }

  // 小さなチップ（またはリスト）として表示
  let html = `<div class="text-xs text-gray-500 mt-4 mb-2">この単語が登場する他のカード:</div>`;
  html += `<div class="flex flex-wrap gap-2">`;
refs.forEach(r => {
  html += `
    <button onclick="event.stopPropagation(); StudyEngine.jumpToWordFromId('${r.id}')" 
            class="px-3 py-1.5 rounded-xl bg-white/5 border border-white/5 text-[11px] font-bold text-blue-500/80 hover:bg-blue-500/10 active:scale-95 transition-all">
      ${r.word_th} <span class="opacity-40 font-normal text-[9px] ml-1">${r.meaning_ja}</span>
    </button>`;
});
  html += `</div>`;
  
  refListEl.innerHTML = html;
},
/**
 * クリップボードの内容を指定したIDのinputにペーストする
 */
pasteTo: function(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;

  // ブラウザのクリップボード読み取り権限を確認して実行
  navigator.clipboard.readText()
    .then(text => {
      if (text) {
        el.value = text;
        // リスト検索の場合は、入力イベントを強制発火させてフィルタリングを動かす
        if (elementId === 'list-search') {
          VocabListUI.update(text);
        }
        ViewController.showToast("Pasted!", "success");
      }
    })
    .catch(err => {
      console.error('Failed to read clipboard:', err);
      ViewController.showToast("Clipboard access denied", "warning");
    });
},
toggleAnalysis: function() {
        console.log("hello ana"); // 山岡さんのデバッグログも復活
        const panel = document.getElementById('analysis-panel');
        if (!panel) return;

        // すでに表示されているなら閉じる（トグル動作）
        if (!panel.classList.contains('hidden')) {
            panel.classList.add('hidden');
            panel.style.display = 'none';
            return;
        }

        // 非表示なら、最新の解析を実行して表示する
        this.renderAnalysis();
    },






renderAnalysis: function() {
    const item = AppStore.getCurrentItem();
    if (!item || !item.word_th) return;
    
    const panel = document.getElementById('analysis-panel');
    if (!panel) return;
    panel.innerHTML = '';
    panel.style.display = 'flex';
    panel.classList.remove('hidden');

    // ★重要: Parserがすでに「属性伝染」も「声調番号」も計算し終えた状態で返してくる
    const syllables = ThaiParser.parseSyllables(item.word_th);

    const wrapper = document.createElement('div');
    wrapper.style.cssText = `
        display: flex; overflow-x: auto; gap: 10px; width: 100%; 
        padding: 12px 6px 26px 6px; 
        justify-content: ${syllables.length <= 2 ? 'center' : 'flex-start'};
        -webkit-overflow-scrolling: touch;
    `;

    syllables.forEach((syl) => {
        // --- 1. 表示用の部品を「計算済みのsyl」から取り出す ---
        const tInfo = ThaiMasterData.toneMap[syl.toneNum] || ThaiMasterData.toneMap[0];
        const cColor = ThaiMasterData.classColors[syl.finalClass] || 'text-white/40';
        
        // コンソナント情報は名前を表示するためにMasterから引き直す
        const cObj = ThaiMasterData.consonants[syl.mainC[0]] || { name: '不明', sound: '?' };
        const termSound = syl.lastC ? (ThaiMasterData.consonants[syl.lastC]?.sound || '?') : '-';

        // --- 2. タイ文字の着色（頭子音を強調） ---
        const coloredText = Array.from(syl.full).map(c => 
            syl.mainC.includes(c) ? `<span class="${cColor}">${c}</span>` : `<span class="opacity-40">${c}</span>`
        ).join('');

        // --- 3. チップの生成（sylの中に全部答えが入っている） ---
        wrapper.insertAdjacentHTML('beforeend', `
            <div class="analysis-chip p-3.5 bg-slate-900 border border-slate-700 rounded-3xl w-[126px] text-center flex-shrink-0 shadow-2xl relative overflow-hidden">
                <div class="mb-2 pb-2 border-b border-white/5">
                    <div class="${tInfo.color} text-3xl leading-none font-black drop-shadow-md">${tInfo.mark || 'ー'}</div>
                    <div class="${tInfo.color} text-[9px] font-black tracking-tighter uppercase">${tInfo.label}</div>
                </div>

                <div class="text-4xl font-bold mb-3 thai-font drop-shadow-lg">${coloredText}</div>

                <div class="text-[10px] text-left space-y-1.5 font-mono">
                    <div class="flex justify-between items-center">
                        <span class="text-white/30 text-[8px]">CLASS:</span>
                        <span class="${cColor} font-bold">${syl.finalClass}${syl.isOverridden ? '*' : ''}</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-white/30 text-[7px] leading-none mb-0.5">NAME:</span>
                        <span class="text-white/80 text-[9px] truncate leading-tight">${cObj.name}</span>
                    </div>
                    <div class="flex justify-between items-center pt-1 border-t border-white/5">
                        <span class="text-white/30 text-[8px]">SOUND:</span>
                        <span class="text-blue-400 font-bold">${cObj.sound}/${termSound}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-white/30 text-[8px]">VOWEL:</span>
                        <span class="text-yellow-500 font-bold">${syl.vSound || '?'} <small class="text-[7px] opacity-60">${(syl.vLen || 's')[0]}</small></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-white/30 text-[8px]">TYPE:</span>
                        <span class="text-purple-400 font-bold">${(syl.sType || 'D')[0]} <small class="text-[7px] opacity-60">(${syl.ruleLabel || '標準'})</small></span>
                    </div>
                </div>
            </div>`);
    });
    
    panel.appendChild(wrapper);
// GSのデバッグログとフォーマットを完全に一致させる
    const debugText = syllables.map(syl => {
        const tInfo = ThaiMasterData.toneMap[syl.toneNum] || { label: '不明' };
        // 例: [สนุก] -> [ส: a/H/d -> 低] | [นุก: u/L/D -> 高] 形式
        return `[${syl.full}: ${syl.vSound || '?'}/${syl.finalClass[0]}/${(syl.sType || 'D')[0]} -> ${tInfo.label[0]}]`;
    }).join(' | ');

    panel.insertAdjacentHTML('beforeend', `
        <div class="w-full mt-2 px-3 py-2 bg-slate-950/80 rounded-xl text-[10px] font-mono text-blue-300/60 flex flex-col gap-1 border border-blue-500/20 shadow-inner">
            <div class="flex justify-between border-b border-white/5 pb-1 mb-1">
                <span class="text-white/40">FINAL_LOG: ${item.word_th}</span>
                <span class="text-blue-500/40 font-bold tracking-widest">v6.2_LOGIC_SYNC</span>
            </div>
            <div class="leading-relaxed break-all">
                ${debugText}
            </div>
        </div>
    `);

}


};





/**
 * GS_Parser: 音節構造解析エンジン (Final Fixed Version)
 */
const ThaiParser = {
  parseSyllables: function(text) {
    if (!text) return [];
    const vMarks = "ะาิีึืุูัำ";
    const leadingV = "เแโใไ";
    const toneMarks = "่้๊๋์";
    const chars = Array.from(text);
    const syllables = [];
    let i = 0;

    while (i < chars.length) {
      let syl = { full: '', leadingV: '', mainC: '', marks: [], lastC: '', isRoHan: false };

      // 1. 前置母音 (เแโใไ) - 最初に見つけたら保持
      if (i < chars.length && leadingV.indexOf(chars[i]) !== -1) {
        syl.leadingV = chars[i]; syl.full += chars[i]; i++;
      }
// 2. 核子音 (Cluster & ฤ / 記号なし核子音の強化)
      if (i < chars.length) {
        syl.mainC = chars[i]; syl.full += chars[i]; i++;
        
        // ฤ (Rue) が核子音として現れた場合の処理
        if (syl.mainC === 'ฤ') {
          // ฤ 自体が母音の性質を持つので、そのまま Step 4 へ
        } else if (i < chars.length) {
          const c2 = chars[i];
          const nextMark = chars[i+1];
          const isHo = syl.mainC === 'ห' && "งญนมรลวยว".indexOf(c2) !== -1;
          const isCluster = "กขคตปผพจสซ".indexOf(syl.mainC) !== -1 && "รลว".indexOf(c2) !== -1;
          
          if (isHo || isCluster) {
            // ★真犯人逮捕：c2が 'ร' で、次も 'ร' なら Ro Han のためクラスタ化しない！
            if (c2 === 'ร' && nextMark === 'ร') {
               // 何もしない（Step 3 の Ro Han 検知に任せる）
            } else if (!(vMarks.indexOf(c2) !== -1 || toneMarks.indexOf(c2) !== -1)) {
               syl.mainC += c2; syl.full += c2; i++;
            }
          }
        }
      }

      // 3. Ro Han (รร) 検知
      if (i + 1 < chars.length && chars[i] === 'ร' && chars[i+1] === 'ร') {
        const next = chars[i+2];
        if (!next || (vMarks.indexOf(next) === -1 && leadingV.indexOf(next) === -1)) {
          syl.isRoHan = true; syl.marks.push('รร'); syl.full += 'รร'; i += 2;
        }
      }

// 4. すべての記号 (上下・声調・黙字記号) および母音構成要素 (ย, ว, อ) の回収
      while (i < chars.length) {
        const c = chars[i];
        const next = chars[i+1];
        
        // 黙字記号 ์ が次にある文字は、末子音として扱うため Step 5 へ
        if (next === '์') break;

        // A. 基本の母音記号・声調記号なら回収
        if (vMarks.indexOf(c) !== -1 || toneMarks.indexOf(c) !== -1 || c === '์') {
          syl.marks.push(c); syl.full += c; i++;
          continue;
        }

        // B. ★重要★ 母音の一部として機能する子音 (ย, ว, อ) の判定
        // 前に特定の母音がある場合、これらは末子音ではなく「母音記号」として marks に入れる
        const currentBase = (syl.leadingV || '') + syl.marks.join('');
        const isVowelPart = 
          (c === 'ย' && currentBase.indexOf('เ') !== -1 && currentBase.indexOf('ี') !== -1) || // เ-ีย
          (c === 'อ' && (currentBase.indexOf('เ') !== -1 || currentBase.indexOf('ื') !== -1)) || // เ-อ, -ือ
          (c === 'ว' && currentBase.indexOf('ั') !== -1); // -ัว (末子音ありの形)

        if (isVowelPart) {
          syl.marks.push(c); syl.full += c; i++;
          continue;
        }
        
        break;
      }

      // 5. 末子音回収 (Greedy Loop)
      while (i < chars.length) {
        const c = chars[i];
        const next = chars[i+1];

        // 次が前置母音なら、今の文字は次音節の開始
        if (leadingV.indexOf(c) !== -1) break;

        // 次に母音記号（์ 以外）があるなら、今の文字は次音節の核子音
        if (next && (vMarks.indexOf(next) !== -1 || toneMarks.indexOf(next) !== -1) && next !== '์') break;

        // 吸い込み
        syl.lastC = c; syl.full += c; i++;

        // 直後に ์ や母音記号(ุ ิ 等)があるなら、それらもセットで回収（黙字道連れ）
        while (i < chars.length && (vMarks.indexOf(chars[i]) !== -1 || toneMarks.indexOf(chars[i]) !== -1 || chars[i] === '์')) {
          syl.marks.push(chars[i]); syl.full += chars[i]; i++;
        }

        // 基本1文字（または黙字セット）で終了
        break;
      }
      syllables.push(syl);
    }


// 最後に、切り出した音節リストをロジック関数に渡して完成させる
    return this.resolveLogic(syllables);
  },



  resolveLogic: function(syllables) {
    
// --- 解析の最後に全音節をスキャン (Logicの集約) ---
    const lowSingles = "งนมยรลวยญณฬ";
    syllables.forEach((syl, i) => {
        const headChar = syl.mainC[0];
        const cObj = ThaiMasterData.consonants[headChar] || { class: '不明' };
        
        syl.finalClass = cObj.class;
        syl.isOverridden = false;
        syl.ruleLabel = "標準";

        // 1. 属性伝染・引導子音の判定
        if (syl.mainC.startsWith('ห') && syl.mainC.length > 1) {
            syl.finalClass = 'High'; syl.isOverridden = true; syl.ruleLabel = "ห引導";
        } else if (i > 0) {
            const prev = syllables[i-1];
            // ★重要: Ro Han (รร) も属性を後ろに流すフラグを強制的に立てる
            const isPrevOpenA = (!prev.lastC && !prev.leadingV && prev.marks.length === 0) || prev.isRoHan;

            if ((prev.finalClass === 'High' || prev.finalClass === 'Mid') && 
                isPrevOpenA && 
                syl.finalClass === 'Low' && 
                lowSingles.indexOf(headChar) !== -1) {
                syl.finalClass = prev.finalClass;
                syl.isOverridden = true;
                syl.ruleLabel = "属性伝染";
            }
        }

        // 2. 母音と声調の確定
        const vRule = ThaiValidator.resolveVowel(syl);
        const tMark = syl.marks.find(m => /[\u0E48-\u0E4B]/.test(m));
        
        // 基本のタイプ
        let sType = syl.lastC ? (ThaiMasterData.terminalGroups[syl.lastC] || 'Dead') : vRule.type;
        
        // ★最重要: Ro Han (รร) の死音化ロジック
        // 次の音節が存在するなら、この Ro Han は促音(Dead)扱い。これで [สรร] が低声になる。
        if (syl.isRoHan && i + 1 < syllables.length) {
            sType = 'Dead';
            syl.ruleLabel = "RoHan(閉)";
        }

        // 3. 最終的な声調番号を確定
        syl.toneNum = ThaiValidator.getToneNumber(syl.finalClass, tMark, sType, vRule.length);
        
        // ログ表示用にデータを同期
        syl.sType = sType;
        syl.vSound = syl.isRoHan ? 'a' : vRule.sound;
        syl.vLen = vRule.length;
    });
    return syllables;
}
};

/**
 * GS_Validator: 判定ロジック
 */
const ThaiValidator = {
resolveVowel: function(syl) {
  console.log(`DEBUG: [${syl.full}] base: "${(syl.leadingV || '') + syl.marks.filter(m => !/[่้๊๋์]/.test(m)).join('')}" lastC: "${syl.lastC}"`);
const isRoHanChar = syl.full.indexOf('รร') !== -1;

  if (isRoHanChar) {
    return { 
      sound: 'a', 
      length: 'short', 
      // syl.sType が 'Dead' (resolveLogicで設定済み) なら dead を返す
      type: (syl.sType === 'Dead') ? 'dead' : 'live' 
    };
  }
    // 1. 声調記号と黙字記号を徹底除去してベースを作る
    const pure = syl.marks.filter(m => !/[่้๊๋์]/.test(m)).join('');
    const base = (syl.leadingV || '') + pure;
    
    // 2. マスタ側の symbols からもハイフンなどを除去して比較する
    // symbols: 'เ-ีย' と base: 'เีย' を一致させるため
    const normalize = (str) => str.replace(/[-\s]/g, '');

    // 3. マスタ照合（3段構え）
    // A: 記号 + 末子音 (เดี๋ยว のように 'ย' を含むマスタ用)
    // B: 記号のみ
    const withLast = base + (syl.lastC || '');
    let rule = ThaiMasterData.vowelRules.find(r => normalize(r.symbols) === withLast) ||
               ThaiMasterData.vowelRules.find(r => normalize(r.symbols) === base);

    if (rule) {
      // 母音の一部として 'ย' や 'ว' が食われた場合、末子音フラグを消す
      if (normalize(rule.symbols).endsWith(syl.lastC)) {
        syl.isVowelPart = true; 
      }
      return rule;
    }

    // 4. 最終フォールバック
    if (syl.lastC && !syl.isVowelPart) {
      return { sound: 'o', length: 'short', type: 'live' };
    }
    return { sound: 'a', length: 'short', type: 'dead' };
  },
getToneNumber: function(charClass, tMark, sType, vLength) {
    const vLen = (vLength || 'short').toLowerCase();
    
    // 1. 声調記号がある場合（最優先：ここは完璧）
    if (tMark) {
        if (tMark === '่') return (charClass === 'Low') ? 2 : 1;
        if (tMark === '้') return (charClass === 'Low') ? 3 : 2;
        if (tMark === '๊') return 3;
        if (tMark === '๋') return 4;
    }

    // 2. 無記号・生音 (Live Sound) ★ここを厳格に
    // 母音が am, ai, ao 等、または末子音がある Live なら、何があってもここ
    if (sType.toLowerCase() === 'live') {
        return (charClass === 'High') ? 4 : 0; // 高級なら上声(4)、それ以外は平声(0)
    }

    // 3. 無記号・死音 (Dead Sound)
    // 中・高級子音は一律で 低声(1)
    if (charClass === 'High' || charClass === 'Mid') {
        return 1;
    }

    // 4. 低級子音(Low) かつ 死音(Dead) の場合のみ、長短で分岐
    // 短母音なら 高声(3)、長母音なら 下声(2)
    return (vLen === 'short') ? 3 : 2;
}
};










</script>
