<script>

/**
 * StudyEngine: 学習システムの中枢ロジック
 * AppStoreのステート（状態）を監視し、描画、音声再生、学習進捗の判定を行う司令塔。
 */
const StudyEngine = {

  /**
   * 学習画面のメインレンダリング（描画）
   * キューから現在の単語を抽出し、ViewControllerを介して画面上の全てのテキスト・色・統計情報を更新する。
   */
  render: function() {

    // カードが変わる際、分析パネルをリセット（非表示）にする
    const panel = document.getElementById('analysis-panel');
    if (panel) { panel.classList.add('hidden'); panel.style.display = 'none'; }
    const list = AppStore.state.queue;
    if (!list || list.length === 0) return;
    
    // カード描画のたびに「めくり状態」を未読(false)にリセット
    AppStore.update('revealed', false);

    // 現在のインデックスに該当する単語オブジェクトを取得
    const item = list[AppStore.state.currentIndex];

    // 1. UIの物理リセット（隠すべき要素を隠し、スクロール位置などを整える）
    ViewController.resetCardUI();

    // 2. 視覚的情報の更新（忘却曲線に基づくボーダー色、最終学習日などの統計）
    ViewController.updateBorder(item);
    ViewController.updateStats(item);
    
    // 3. テキストデータの流し込み（現在の出題言語モードに応じてタイ語/日本語を切り替え）
    ViewController.updateText(item, AppStore.state.isTargetThai);

    this.renderContextLinks(item.example_th, 'ex-th', item.id);
    
    // ★ 解説（日本語/タイ語混じり）にもリンクを貼る
    // 解説文の中にタイ語が含まれていれば、それも自動でチップになります
    this.renderContextLinks(item.explanation, 'note', item.id);
    // this.renderContextLinks(item.explanation, 'ex-ja', item.id);

    // ★ 追加：逆引き（この単語を引用している他のカード）を表示
    // 第一引数に「今のタイ語単語」、第二引数に「今のID（自分を除外するため）」を渡す
    this.renderReferences(item.word_th, item.id);
    
// ★ render は「今のカードを表示した瞬間」の見た目を整えるだけに留める
    const btn = document.getElementById('bookmark-btn');
    const icon = document.getElementById('card-bookmark-icon');
    
    if (btn && icon && item) {
      const isBM = (item.is_bookmark === true || String(item.is_bookmark).toLowerCase() === "true");
      
      // ここは「初期描画時」に星がついているか判定して色を塗るだけ
      icon.innerText = isBM ? "★" : "☆";
      if (isBM) btn.classList.add('is-gold');
      else btn.classList.remove('is-gold');
    }
    // 4. スクロール時に出現するヘッダー情報の同期
    this.syncHeader();

    
  },

  /**
   * 音声合成エンジンによる再生
   * @param {boolean} isEx - trueなら例文、falseなら単語単体を再生
   */
  speak: function(isEx = false) {
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return;

    let text = "";
    let lang = "th-TH";

    // モード判定：タイ語学習時はタイ語、日本語学習時は日本語（意味）を選択
    if (AppStore.state.isTargetThai) {
      text = isEx ? item.example_th : item.word_th;
      lang = "th-TH";
    } else {
      // 日本語学習モード（タイ人向け等）では、意味(meaning_ja)を日本語で読み上げる
      text = isEx ? item.example_ja : item.meaning_ja;
      lang = "ja-JP";
    }

    // 音声再生の実務を AudioSystem モジュールへ委託
    AudioSystem.play(
      text, 
      lang, 
      AppStore.state.isSlowMode ? 0.5 : 0.9 // スローモードなら0.5倍速
    );
  },

  /**
   * 再生速度（スローモード）のトグル切り替え
   * UI上のアイコン(🐢/🐌)と再生速度パラメータを同時に更新する。
   */
  toggleSlowMode: function() {
    if (AppStore.state.isProcessing) return;

    AppStore.state.isSlowMode = !AppStore.state.isSlowMode;
    const btn = document.getElementById('slow-mode-btn');
    
    if (btn) {
      if (AppStore.state.isSlowMode) {
        btn.classList.add('text-yellow-400', 'scale-110');
        btn.style.opacity = "1";
        btn.innerText = "🐢"; 
      } else {
        btn.classList.remove('text-yellow-400', 'scale-110');
        btn.style.opacity = "0.2";
        btn.innerText = "🐌";
      }
    }
    ViewController.showToast(`Speed: ${AppStore.state.isSlowMode ? '0.5x' : '0.9x'}`, "success");
  },

  /**
   * 指定したHTML要素内のテキストをクリップボードにコピー
   */
  copyText: function(elementId) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const text = el.innerText;
    if (!text || text === '---') return;

    navigator.clipboard.writeText(text).then(() => {
      ViewController.showToast(`Copied: ${text}`, "success");
    });
  },

  /**
   * 単語の忘却スコアに基づいてHSLカラーコードを算出
   * 赤(忘却中) -> 黄(復習期) -> 緑(定着) のグラデーションを定義。
   */
  getColor: function(item) {
    if (!item) return "hsl(0, 0%, 90%)";
    if (item.last_date === 'New') return "hsl(200, 70%, 60%)";

    const s = parseFloat(item.priority_score) || 0;
    if (s > 1.2) return "hsl(0, 75%, 60%)";   // 強警告：赤
    if (s > 0.8) return "hsl(45, 90%, 60%)";  // 警告：黄
    return "hsl(140, 50%, 70%)";             // 正常：緑
  },

  /**
   * カードをめくり、解答情報を表示する
   * 裏面の表示切り替えと音声の自動再生をトリガーする。
   */
  revealAll: function() {
    if (AppStore.state.revealed) return;

    // 状態を「めくり済み」に変更
    AppStore.update('revealed', true);

    // UIの切り替え実務を ViewController に委譲（一貫性の確保）
    ViewController.applyRevealUI(AppStore.state.isTargetThai);

    // 裏面表示と同時に単語を自動読み上げ
    this.speak(false); 
  },

  /**
   * ユーザーの自己評価を記録し、次のカードへ遷移する
   * @param {number} rating - 1(難), 2(普), 3(易)
   */
  answer: function(rating) {
    // 通信中、未読、連打の防止
    if ( !AppStore.state.revealed || AppStore.state.isAnswering) return;
    // if (AppStore.state.isProcessing || !AppStore.state.revealed || AppStore.state.isAnswering) return;
    AppStore.state.isAnswering = true;
    
    const list = AppStore.state.queue;
    const item = list[AppStore.state.currentIndex];
    
    // 解答演出とサーバーへのログ保存
    ViewController.playSuccessEffect(); 
    Bridge.saveLog(item.id, rating);

    setTimeout(() => {
      AppStore.state.isAnswering = false;
      document.getElementById('word-card').classList.remove('success-flash');
      document.getElementById('footer-ui').classList.add('translate-y-full', 'pointer-events-none');
      
      // 次のインデックスを算出（リスト末尾なら最初に戻る）
      const nextIdx = (AppStore.state.currentIndex + 1) % list.length;
      AppStore.update('currentIndex', nextIdx);
      this.render(); // 次のカードを描画
    }, 150);
  },

  /**
   * ミニヘッダー（スクロール時出現）の内容を現在の単語と同期
   */
  syncHeader: function() {
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return;
    const th = document.getElementById('header-display-th');
    const ja = document.getElementById('header-display-ja');
    
    if (AppStore.state.isTargetThai) {
      th.innerText = item.word_th || '---';
      ja.innerText = item.meaning_ja || '---';
    } else {
      th.innerText = item.meaning_ja || '---';
      ja.innerText = item.word_th || '---';
    }
  },
/**
   * 特定の単語IDへジャンプ（飛ばしバグ修正版）
   */
  jumpToWordFromId: function(id) {
    const queue = AppStore.state.queue;
    const targetIdx = queue.findIndex(v => v.id === id);
    const currentIdx = AppStore.state.currentIndex;

    if (targetIdx !== -1) {
      // 1. ターゲットを配列から切り出す
      const [targetItem] = queue.splice(targetIdx, 1);
      
      // 2. 挿入位置（今見ている単語の直前）を計算
      // ターゲットが現在地より「前」にいた場合、抜いたことで現在地が1つ前にズレているので調整
      let insertIdx = currentIdx;
      if (targetIdx < currentIdx) {
        insertIdx = currentIdx - 1;
      }

      // 3. 挿入
      queue.splice(insertIdx, 0, targetItem);
      
      // 4. 現在地をその挿入した場所に固定
      AppStore.update('currentIndex', insertIdx);
      
      // 5. 再描画
      this.render(); 
      
      console.log(`[FixedJump] ID: ${id} moved to ${insertIdx}. Queue consistency maintained.`);
    }
  },
  /**
   * 学習進捗統計（ヒートマップ）をサーバーから取得し描画
   */
renderHeatmap: function() {
  google.script.run.withSuccessHandler(d => {
    const now = new Date();
    const start = new Date();
    // 画面に収まりつつ、少しだけスクロールできる「ちょうどいい」期間（150日）
    start.setDate(now.getDate() - 150);

    const fmt = (date) => date.toISOString().split('T')[0];

    new frappe.Chart("#heatmap", { 
      type: 'heatmap', 
      data: { dataPoints: d }, 
      start: fmt(start), 
      end: fmt(now), // ★ これで「今日」が右端の境界線になります
      countOfWeeks: 20, // ★ 画面幅に収まる「週の数」を明示的に指定（ライブラリの自動計算を防ぐ）
      colors: ['#1e293b', '#4f46e5', '#6366f1', '#818cf8', '#c7d2fe']
    });

    // 描画後、少しだけ右に寄せる（念のため）
    setTimeout(() => {
      const el = document.querySelector('.heatmap-scroll');
      if (el) el.scrollLeft = el.scrollWidth;
    }, 200);
  }).getLearningStatistics();
},
  /**
   * 出題のメイン言語（タイ語からか、日本語からか）を切り替える
   */
  toggleTargetLanguage: function() {
    if (AppStore.state.isProcessing) return;
    
    const nextMode = !AppStore.state.isTargetThai;
    AppStore.update('isTargetThai', nextMode);
    
    const btn = document.getElementById('target-toggle-btn');
    if (btn) btn.innerText = nextMode ? "🇹🇭" : "🇯🇵";
    
    this.render(); 
  },

  /**
   * 学習アルゴリズム（Smart:忘却曲線重視 / Classic:ランダム）を切り替える
   */
  toggleMode: function() {
    if (AppStore.state.isProcessing) return;
    
    AppStore.state.isSmart = !AppStore.state.isSmart; 
    const btn = document.getElementById('mode-btn');
    if (btn) btn.innerText = AppStore.state.isSmart ? '🧠' : '✨';
    
    // Bridgeのソートロジックを再実行してキューを再構成
    Bridge._refreshQueue(AppStore.state.allVocab);
    this.render();
  },

  /**
   * 外部タイ語辞書サイト（GotThai）を現在のワードで開く
   */
  openGotThai: function(query) {
    if (AppStore.state.isProcessing) return;

    let word = "";
    if (query !== undefined && query !== null) {
      word = query.trim();
    } else {
      // 引数がない場合は現在表示中のカードのタイ語を使用
      const item = AppStore.state.queue[AppStore.state.currentIndex];
      word = item ? item.word_th : "";
    }

    if (!word || word === '---' || word === '') {
      ViewController.showToast("Please enter or select a word.", "warning");
      return;
    }

    // GotThai検索用URLの生成
    const url = "https://www.gotthai.net/search_all?search_form_all%5Bkeyword%5D=" 
              + encodeURIComponent(word) 
              + "&search_form_all%5Bforce_type%5D=thai";
    
    window.open(url, '_blank');
    ViewController.showToast(`Searching "${word}" on GotThai...`, "success");
  },


renderContextLinks: function(rawText, targetElementId, excludeId) {
  const targetEl = document.getElementById(targetElementId);
  if (!rawText || !targetEl) return;

  let text = rawText;
  const allVocab = AppStore.state.allVocab;
  const map = new Map();

  // 1. 【自分自身の処理】 
  // excludeId に一致する「自分」を先に見つけ、特別なクラス 'is-self' を付与
  const selfVocab = allVocab.find(v => v.id === excludeId);
  if (selfVocab && text.includes(selfVocab.word_th)) {
    const placeholder = `__SELF__`;
    const meaning = selfVocab.meaning_ja.replace(/"/g, '&quot;');
    // クラスに 'is-self' を追加
    const linkHtml = `<span class="context-link is-self" data-meaning="${meaning}" onclick="event.stopPropagation(); StudyEngine.handleContextClick(this, '${selfVocab.id}')">${selfVocab.word_th}</span>`;
    
    map.set(placeholder, linkHtml);
    text = text.split(selfVocab.word_th).join(placeholder);
  }

  // 2. 【自分以外の処理】
  const sortedOthers = [...allVocab]
    .filter(v => v.word_th && v.word_th.length > 1 && v.id !== excludeId)
    .sort((a, b) => b.word_th.length - a.word_th.length);

  sortedOthers.forEach((v, index) => {
    if (text.includes(v.word_th)) {
      const placeholder = `__VOCAB_${index}__`;
      const meaning = v.meaning_ja.replace(/"/g, '&quot;');
      const linkHtml = `<span class="context-link" data-meaning="${meaning}" onclick="event.stopPropagation(); StudyEngine.handleContextClick(this, '${v.id}')">${v.word_th}</span>`;
      
      map.set(placeholder, linkHtml);
      text = text.split(v.word_th).join(placeholder);
    }
  });

  // 3. 復元
  map.forEach((html, placeholder) => {
    text = text.split(placeholder).join(html);
  });

  targetEl.innerHTML = text;
},
/**
 * 2クリック遷移のロジック（ここだけ追加）
 */
handleContextClick: function(el, id) {
  if (el.classList.contains('is-confirming')) {
    // 2回目：ジャンプ
    this.jumpToWordFromId(id);
    el.classList.remove('is-confirming');
  } else {
    // 1回目：他を消して自分を「確認中」にする（これでCSSのTIPが出る）
    document.querySelectorAll('.context-link').forEach(l => l.classList.remove('is-confirming'));
    el.classList.add('is-confirming');
    
    // 3秒後に自動解除
    setTimeout(() => el.classList.remove('is-confirming'), 3000);
  }
},
/**
 * この単語を「解説」や「例文」に含んでいる他の単語を抽出する
 */
renderReferences: function(currentWordTh, currentId) {
  const refListEl = document.getElementById('reference-list');
  if (!refListEl) return;

  // 全単語の中から、解説文(explanation)に今の単語が含まれているものを探す
  const refs = AppStore.state.allVocab.filter(v => 
    v.id !== currentId && 
    (v.explanation.includes(currentWordTh) || v.example_th.includes(currentWordTh))
  );

  if (refs.length === 0) {
    refListEl.innerHTML = ""; // なければ非表示
    return;
  }

  // 小さなチップ（またはリスト）として表示
  let html = `<div class="text-xs text-gray-500 mt-4 mb-2">この単語が登場する他のカード:</div>`;
  html += `<div class="flex flex-wrap gap-2">`;
refs.forEach(r => {
  html += `
    <button onclick="event.stopPropagation(); StudyEngine.jumpToWordFromId('${r.id}')" 
            class="px-3 py-1.5 rounded-xl bg-white/5 border border-white/5 text-[11px] font-bold text-blue-500/80 hover:bg-blue-500/10 active:scale-95 transition-all">
      ${r.word_th} <span class="opacity-40 font-normal text-[9px] ml-1">${r.meaning_ja}</span>
    </button>`;
});
  html += `</div>`;
  
  refListEl.innerHTML = html;
},
/**
 * クリップボードの内容を指定したIDのinputにペーストする
 */
pasteTo: function(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;

  // ブラウザのクリップボード読み取り権限を確認して実行
  navigator.clipboard.readText()
    .then(text => {
      if (text) {
        el.value = text;
        // リスト検索の場合は、入力イベントを強制発火させてフィルタリングを動かす
        if (elementId === 'list-search') {
          VocabListUI.update(text);
        }
        ViewController.showToast("Pasted!", "success");
      }
    })
    .catch(err => {
      console.error('Failed to read clipboard:', err);
      ViewController.showToast("Clipboard access denied", "warning");
    });
},
toggleAnalysis: function() {
        console.log("hello ana"); // 山岡さんのデバッグログも復活
        const panel = document.getElementById('analysis-panel');
        if (!panel) return;

        // すでに表示されているなら閉じる（トグル動作）

            panel.style.display = 'none';
            return;
        }

        // 非表示なら、最新の解析を実行して表示する

renderAnalysis: function() {
const item = AppStore.getCurrentItem();
    if (!item || !item.word_th) return;
    
    const panel = document.getElementById('analysis-panel');
    if (!panel) return;
    panel.innerHTML = '';
    panel.style.display = 'flex';
    panel.classList.remove('hidden');

    const syllables = ThaiParser.parseSyllables(item.word_th, item);
    const meta = syllables.meta || { isReliable: true, warnings: [], isDict: false };

    // --- 🔊 エンジンによる「論理的な発音記号」の生成 ---
    // 声調記号の定義： [平, 低, 下, 高, 上]
// --- 🔊 エンジンによる「論理的な発音記号」の生成 ---
// --- 🔊 改良版：論理的な発音記号の生成 ---
// --- 🔊 改良版：理想的な発音記号 [ sà-nùk ] の生成 ---
 // --- 📊 解析ステータスバー ---
// Parserが算出した phonetic 文字列を取得（リカバリー適用済みの値）
// --- 📊 解析ステータスバー（ Parserの正直な警告を反映） ---
const derivedStr = meta.derivedPhonetic ? `[ ${meta.derivedPhonetic} ]` : "";
let statusHTML = '';
const statusBaseClass = "w-full mb-3 px-3 py-1.5 border rounded-lg text-[10px] font-bold flex items-center justify-between";

// Parserからの警告があるかチェック
const hasWarnings = meta.warnings && meta.warnings.length > 0;

if (meta.isDict) {
    // 📖 辞書：青
    statusHTML = `<div class="${statusBaseClass} bg-blue-600/20 border-blue-500/50 text-blue-500 dark:text-blue-400">
        <div class="flex items-center gap-2"><span class="animate-pulse">📖</span> 辞書データ適用済み</div>
        <div class="font-mono opacity-80 lowercase tracking-widest">${derivedStr}</div>
    </div>`;
} else if (meta.warnings && meta.warnings.some(w => w.includes("🛠️"))) {
    // ⚠️ 【追加：黄色】リカバリー成功（自動修正済み）
    const history = meta.warnings[0]; // 🛠️ 吸着リカバリー実行... のメッセージ

    statusHTML = `<div class="${statusBaseClass} bg-amber-600/20 border-amber-500/50 text-amber-600 dark:text-amber-400">
        <div class="flex items-center gap-2"><span>🛠️</span> 自動リカバリー済（要確認）</div>
        <div class="font-mono opacity-80 lowercase tracking-widest">${derivedStr}</div>
    </div>
    <div class="text-[9px] text-amber-500/80 px-2 mb-2 italic font-mono truncate">${history}</div>`;

} else if (!meta.isReliable || hasWarnings) {
    // 🚨 【既存：赤】吸着すらできなかった、本当のエラー
    const icon = "⚠️";
    const label = "解析エラーの疑い";
    const message = meta.warnings && meta.warnings[0] ? meta.warnings[0] : "信頼度が低いです";

    statusHTML = `<div class="${statusBaseClass} bg-rose-600/20 border-rose-500/50 text-rose-600 dark:text-rose-400">
        <div class="flex items-center gap-2"><span class="animate-bounce">${icon}</span> ${label}</div>
        <div class="font-mono opacity-80 lowercase tracking-widest">${derivedStr}</div>
    </div>
    <div class="text-[9px] text-rose-400/80 px-2 mb-2 italic font-mono truncate">${message}</div>`;
}  else {
    // ✅ 正常：緑
    statusHTML = `<div class="${statusBaseClass} bg-emerald-600/10 border-emerald-500/40 text-emerald-700 dark:text-emerald-500">
        <div class="flex items-center gap-2"><span>✅</span> システム解析：正常</div>
        <div class="font-mono opacity-80 lowercase tracking-widest">${derivedStr}</div>
    </div>`;
}

// ★最重要：ステータスバーのすぐ下に「隠し入力欄」を配置
const editorPanel = `
<div id="editor-${item.id}" class="hidden w-full mb-3 p-2 bg-slate-100 dark:bg-slate-800/50 rounded-lg border border-blue-500/30 flex gap-2 items-center animate-in fade-in slide-in-from-top-1">
    <input type="text" id="input-${item.id}" 
           class="flex-1 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 p-2 rounded text-slate-900 dark:text-white thai-font text-sm focus:ring-2 focus:ring-blue-500 outline-none"
           placeholder="スペース区切りで入力 (例: รัด ถะ บาน)"
           onkeydown="if(event.key==='Enter') saveSplit('${item.id}')">
    <button onclick="saveSplit('${item.id}')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-[11px] font-bold shadow-lg shadow-blue-900/20">保存</button>
</div>
`;

panel.insertAdjacentHTML('beforeend', statusHTML + editorPanel);

    const wrapper = document.createElement('div');
    // 構造は変えず、paddingとgapを微調整してスキャンしやすく
    wrapper.style.cssText = `
        display: flex; overflow-x: auto; gap: 12px; width: 100%;

/**
 * GS_Parser: 音節構造解析エンジン (Final Fixed Version)
 */
const ThaiParser = {

  // --- ★新機能1：例外オーバーライド辞書 ---
  // ルールベース(Greedy Loop)では構造上どうしても誤分割される単語
  // （例：二重機能子音/Overlap）を強制的に正しい音節配列に切り分ける。

  // --- メインルーター（外部から呼ばれるのはここだけ） ---
/**
   * メインルーター：DBエントリを優先的にチェックする
   * @param {string} text - 解析するタイ語
   * @param {Object} dbEntry - スプレッドシートから取得した1行分のデータ(任意)
   */
parseSyllables: function(text, dbEntry = null) {
    if (!text) return [];

    // 1. DB(シート)に custom_split があればそれを使う
    if (dbEntry && dbEntry.custom_split) {
      try {
        const chunks = typeof dbEntry.custom_split === 'string' 
                       ? JSON.parse(dbEntry.custom_split) 
                       : dbEntry.custom_split;
        
        let combinedSyllables = [];
        chunks.forEach(chunk => {
           // ★ 修正：パーツを解析するが、必ず1つの音節に強制マージする
           const parsed = this._parseCore(chunk);
           if (parsed.length > 0) {
             const atomicSyllable = parsed[0];
             
             // もしエンジンが勝手に複数に分けた場合、1つに統合する
             if (parsed.length > 1) {
               atomicSyllable.full = chunk; // 表示を元のチャンクに戻す
               
               // 最後のパーツから末子音（lastC）の情報を継承
               const lastPart = parsed[parsed.length - 1];
               atomicSyllable.lastC = lastPart.lastC || lastPart.mainC;
               
               // バラバラにされた記号や文字をすべて marks に統合（声調計算用）
               for(let k = 1; k < parsed.length; k++) {
                 atomicSyllable.marks = atomicSyllable.marks.concat(
                    Array.from(parsed[k].mainC), 
                    parsed[k].marks
                 );
               }
             }
             combinedSyllables.push(atomicSyllable);
           }
        });
        
        // 辞書適用時は強制的に「信頼(Reliable)」フラグを立て、警告を封じる
        combinedSyllables.meta = { isDict: true, isReliable: true, warnings: [] };
        return this.resolveLogic(combinedSyllables);
      } catch (e) {
        console.error("Custom split process error:", e);
      }
    }

    // 2. なければ自動解析
    const syllables = this._parseCore(text);
    return this.resolveLogic(syllables);
  },

  // --- コア解析エンジン（文字を左から舐めて吸い込む） ---
  _parseCore: function(text) {
    const vMarks = "ะาิีึืุูัำ็"; // ★ '็' を追加
    const leadingV = "เแโใไ";
    const toneMarks = "่้๊๋์";
    const chars = Array.from(text);
    const syllables = [];
    let i = 0;

    while (i < chars.length) {
      let syl = { full: '', leadingV: '', mainC: '', marks: [], lastC: '', isRoHan: false };

// ★追加：逆転パターンの先読み (例: แมลง -> [ม] + [แลง])
      // 1文字目が子音で、2文字目が前置母音(เแโใไ)の場合、1文字目を独立させる
      if (i + 1 < chars.length && 
          leadingV.indexOf(chars[i]) === -1 && 
          leadingV.indexOf(chars[i+1]) !== -1) {
        syl.mainC = chars[i]; syl.full = chars[i]; i++;
        syllables.push(syl);
        continue; // 次のループ（前置母音の処理）へ
      }
      // Step 1. 前置母音 (เแโใไ) の回収
      if (i < chars.length && leadingV.indexOf(chars[i]) !== -1) {
        syl.leadingV = chars[i]; syl.full += chars[i]; i++;
      }

      // Step 2. 核子音の回収 (クラスタ、ห引導、ฤ の処理)
      if (i < chars.length) {
        syl.mainC = chars[i]; syl.full += chars[i]; i++;
        
        if (syl.mainC === 'ฤ') {
          // ฤ (Rue) は母音の性質を持つため、そのまま次へ
        } else if (i < chars.length) {
          const c2 = chars[i];
          const nextMark = chars[i+1];
          const isHo = syl.mainC === 'ห' && "งญนมรลวยว".indexOf(c2) !== -1;
          const isCluster = "กขคตปผพจสซ".indexOf(syl.mainC) !== -1 && "รลว".indexOf(c2) !== -1;
          
          if (isHo || isCluster) {
            // ★重要: c2が 'ร' で、次も 'ร' なら Ro Han のためクラスタ化をキャンセル！
            if (c2 === 'ร' && nextMark === 'ร') {
               // 何もしない（Step 3 に任せる）
            } else if (!(vMarks.indexOf(c2) !== -1 || toneMarks.indexOf(c2) !== -1)) {
               syl.mainC += c2; syl.full += c2; i++;
            }
          }
        }
      }

      // Step 3. Ro Han (รร) の物理検知
      if (i + 1 < chars.length && chars[i] === 'ร' && chars[i+1] === 'ร') {
        const next = chars[i+2];
        // 次の文字が母音記号でない場合のみ Ro Han として扱う
        if (!next || (vMarks.indexOf(next) === -1 && leadingV.indexOf(next) === -1)) {
          syl.isRoHan = true; syl.marks.push('รร'); syl.full += 'รร'; i += 2;
        }
      }

// Step 4. 母音記号と「母音として機能する子音」の回収
      while (i < chars.length) {
        const c = chars[i];
        const next = chars[i+1];
        
        if (next === '์') break;

        // A. 明らかな記号類
        if (vMarks.indexOf(c) !== -1 || toneMarks.indexOf(c) !== -1 || c === '์') {
          syl.marks.push(c); syl.full += c; i++;
          continue;
        }

        // B. 子音兼母音 (ย, ว, อ) の判定強化
        // 前置母音がない場合でも、これらが「核」になるケースを救済
        const hasMainVowel = syl.marks.some(m => vMarks.indexOf(m) !== -1);
        const isVowelPart = 
          (c === 'ย' && (syl.leadingV === 'เ' || hasMainVowel)) || 
          (c === 'ว' && (syl.marks.includes('ั') || !hasMainVowel)) || // -ัว または 単独の ว
          (c === 'อ' && !hasMainVowel); // 単独の อ (ของ 等)

        if (isVowelPart) {
          syl.marks.push(c); syl.full += c; i++;
          continue;
        }
        break;
      }

      // Step 5. 末子音と、それに連なる黙字(์)セットの回収
// --- Step 5. 末子音の回収（先読みロジック搭載） ---
      while (i < chars.length) {
        const c = chars[i];
        const next = chars[i+1];
        const afterNext = chars[i+2]; // ★一歩先を見る

        // A. 次が前置母音なら、今の文字は確実に次音節の頭子音
        if (leadingV.indexOf(c) !== -1) break;

        // B. 【重要】先読みブレーキ
        // 今の文字(c)を末子音として飲み込む前に、次(next)が「母音を伴った頭文字」かチェック
        if (next) {
          const nextHasVowel = (vMarks.indexOf(next) !== -1 || toneMarks.indexOf(next) !== -1 || leadingV.indexOf(next) !== -1);
          const afterNextHasVowel = afterNext && (vMarks.indexOf(afterNext) !== -1 || toneMarks.indexOf(afterNext) !== -1);
          
          // 次の文字が母音を持っている、あるいは「次＋その次」が「子音＋母音」のセットなら
          // 今の文字(c)は末子音ではなく、次音節の頭文字（またはその一部）である可能性が高い
          if (nextHasVowel && next !== '์') break; 
          if (afterNextHasVowel) break; // これで ช-นะ (cha-na) を守る
        }

        // C. 条件をクリアした文字を末子音(lastC)として吸い込む
        syl.lastC = c; 
        syl.full += c; 
        i++;

        // 直後の ์ (黙字) 等の付随記号を回収
        while (i < chars.length && (vMarks.indexOf(chars[i]) !== -1 || toneMarks.indexOf(chars[i]) !== -1 || chars[i] === '์')) {
          syl.marks.push(chars[i]); 
          syl.full += chars[i]; 
          i++;
        }
        break; // 末子音は1つまで
      }
      
      syllables.push(syl);
    }
    return syllables;
  },

  // --- 解析結果を元に、声調や属性を確定させるロジック ---
  resolveLogic: function(syllables) {
    const lowSingles = "งนมยรลวยญณฬ";
    
    // パス1: クラス判定と声調計算
    syllables.forEach((syl, i) => {
        const headChar = syl.mainC[0];
        const cObj = ThaiMasterData.consonants[headChar] || { class: '不明' };
        
        syl.finalClass = cObj.class;
        syl.isOverridden = false;
        syl.ruleLabel = "標準";

        // 属性伝染・引導子音(ห/อ)の判定
        if (syl.mainC.startsWith('ห') && syl.mainC.length > 1) {
            syl.finalClass = 'High'; syl.isOverridden = true; syl.ruleLabel = "ห引導";
        } else if (i > 0) {
            const prev = syllables[i-1];
            const isPrevOpenA = (!prev.lastC && !prev.leadingV && prev.marks.length === 0) || prev.isRoHan;

            if ((prev.finalClass === 'High' || prev.finalClass === 'Mid') && 
                isPrevOpenA && 
                syl.finalClass === 'Low' && 
                lowSingles.indexOf(headChar) !== -1) {
                syl.finalClass = prev.finalClass;
                syl.isOverridden = true;
                syl.ruleLabel = "属性伝染";
            }
        }

        // Validatorを呼んで母音と基本タイプを取得
        const vRule = ThaiValidator.resolveVowel(syl);
        const tMark = syl.marks.find(m => /[\u0E48-\u0E4B]/.test(m));
        let sType = syl.lastC ? (ThaiMasterData.terminalGroups[syl.lastC] || 'Dead') : vRule.type;
        
        // ★ Ro Han (รร) の死音化ロジック
        // Parserで配列として後ろに要素(音節)が存在する場合、促音(Dead)扱いにする
        if (syl.isRoHan && i + 1 < syllables.length) {
            sType = 'Dead';
            syl.ruleLabel = "RoHan(閉)";
        }

syl.toneNum = ThaiValidator.getToneNumber(syl.finalClass, tMark, sType, vRule.length);
        syl.sType = sType;
        syl.vSound = vRule.sound; 
if (syl.isRoHan) {
    syl.vSound = 'a';
}
        syl.vLen = vRule.length;

        // --- 🔊 【ロジック層での発音記号導出】 ---
const tObj = ThaiMasterData.toneMap[syl.toneNum] || { mark: "" };
        
        // A. 頭音の確定（引導子音スキップ）
        const phoneticHead = (syl.mainC.length > 1 && (syl.mainC[0] === 'ห' || syl.mainC[0] === 'อ'))
                             ? syl.mainC[1] : syl.mainC[0];
        syl.pInitial = (ThaiMasterData.consonants[phoneticHead]?.sound || "").toLowerCase();

        // B. 末音の確定（★ここがポイント：.final を参照）
        syl.pFinal = syl.lastC ? (ThaiMasterData.consonants[syl.lastC]?.final || "").toLowerCase() : "-";

        // C. 全体発音の組み立て（末子が "-" の場合は含めない）
        const pVowel = (syl.vSound || "").toLowerCase();
        const pFinalClean = (syl.pFinal === "-") ? "" : syl.pFinal;
        syl.derived = syl.pInitial + pVowel + tObj.mark + pFinalClean;

        
    });

// --- パス2：自己診断（確信度チェック）強化版 ---
let hasWarning = false;
let warningReasons = [];
const isDictApplied = syllables.meta ? syllables.meta.isDict : false;

syllables.forEach((syl, i) => {
    syl.confidence = "HIGH";
    
    if ("ๆฯ".indexOf(syl.mainC) !== -1) return;

    // A. 文字自体の不明チェック
    if (syl.finalClass === '不明') {
        syl.confidence = "LOW";
        warningReasons.push(`[${syl.full}]: 不明な文字が含まれています`);
    }

    // B. 裸の子音（記号も母音も末子音もない）のチェック
    const isNaked = !syl.leadingV && syl.marks.length === 0 && !syl.lastC && !syl.isRoHan && syl.mainC.length === 1;
    
    if (!isDictApplied && isNaked) {
        if (i === syllables.length - 1) {
            // 末尾の場合：既存の末子音分離チェック
            const isLikelyFinalC = "งนมยรลวยกบด".indexOf(syl.mainC) !== -1;
            if (isLikelyFinalC && i > 0 && (syllables[i-1].marks.length > 0 || syllables[i-1].leadingV)) {
                syl.confidence = "LOW";
                warningReasons.push(`[${syl.full}]: 末子音の分離（解析ミス）の疑い`);
            }
        } else {
            // ★強化ポイント：音節の途中に裸の子音がある場合
            // 本来の「暗黙a」か「解析ミス（吸着漏れ）」か判別不能なため、あえて「LOW」にして警告を出す
            syl.confidence = "LOW";
            warningReasons.push(`[${syl.full}]: 音節中央の単独子音（末子音吸着漏れ、またはOverlapの疑い）`);
        }
    }
    
    if (syl.confidence === "LOW") hasWarning = true;
});

    // メタデータとして診断結果と「完成済み発音記号」を付与
    syllables.meta = {
        isReliable: !hasWarning,
        warnings: warningReasons,
        isDict: isDictApplied,
        derivedPhonetic: syllables.map(s => s.derived).join("-") // ここで連結
    };
// --- 🛡️ パス3：正直なリカバリー・レイヤー (中間吸着 & 履歴残し) ---
    if (!isDictApplied && syllables.length >= 2) {
        let recoveryHappened = false;
        let history = [];

        for (let j = syllables.length - 1; j >= 1; j--) {
            let current = syllables[j];
            let prev = syllables[j - 1];

            // 判定条件：現在が「裸の子音」かつ「前の音節に母音がある」場合
            const isOrphan = !current.leadingV && current.marks.length === 0 && !current.lastC && current.mainC.length === 1;
            const prevHasVowel = prev.marks.length > 0 || prev.leadingV || prev.isRoHan;

            if (isOrphan && prevHasVowel) {
                const beforeStr = `${prev.full}-${current.full}`;
                
                // 1. 強制吸着
                prev.lastC = current.mainC;
                prev.full += current.mainC;
                
                // 2. 再計算
                const recV = ThaiValidator.resolveVowel(prev);
                prev.sType = prev.lastC ? (ThaiMasterData.terminalGroups[prev.lastC] || 'Dead') : recV.type;
                const tMark = prev.marks.find(m => /[\u0E48-\u0E4B]/.test(m));
                prev.toneNum = ThaiValidator.getToneNumber(prev.finalClass, tMark, prev.sType, recV.length);
                
                // 3. 発音記号(derived)の再生成
                const tObj = ThaiMasterData.toneMap[prev.toneNum] || { mark: "" };
                const pHead = (prev.mainC.length > 1 && (prev.mainC[0] === 'ห' || prev.mainC[0] === 'อ')) ? prev.mainC[1] : prev.mainC[0];
                const pInit = (ThaiMasterData.consonants[pHead]?.sound || "").toLowerCase();
                const pFinal = (ThaiMasterData.consonants[prev.lastC]?.final || "").toLowerCase();
                prev.derived = pInit + (recV.sound || "").toLowerCase() + tObj.mark + pFinal;
                // 4. 履歴を記録して削除
                history.push(`[${beforeStr} → ${prev.full}]`);
                syllables.splice(j, 1);
                recoveryHappened = true;
            }
            
        }
        
  if (recoveryHappened) {
            // ★ 足したこと：確信度の塗り替え
            // 吸着に成功した音節については、最低限の体裁は整ったので "MID" に格上げする
            syllables.forEach(s => {
                if (s.confidence === "LOW") {
                    s.confidence = "MID"; // 赤から黄色へ
                }
            });

            // メタデータの更新
            syllables.meta.isReliable = false; // 依然として「100%確実」ではないので false を維持
            syllables.meta.warnings = [
                `🛠️ 吸着リカバリー実行: ${history.join(', ')}`,
                // warningReasons は「吸着前の状態」の警告なので、ここではあえて含めず履歴を優先する
            ];
            syllables.meta.derivedPhonetic = syllables.map(s => s.derived).join("-");
        }

    }

    return syllables;
  }
};

/**
 * GS_Validator: 判定ロジック
 */
const ThaiValidator = {

  resolveVowel: function(syl) {
    // デバッグ用: マスタに照合する直前の「ベース文字列」と「末子音」を出力
    console.log(`DEBUG: [${syl.full}] mainC: "${(syl.mainC || '') + syl.marks.filter(m => !/[่้๊๋์]/.test(m)).join('')}" lastC: "${syl.lastC}"`);
    
    // --- 0. Ro Han (รร) の強制割り込み処理 ---
    // Parserのフラグ漏れを防ぐため、文字面に 'รร' が含まれているかを物理検知する
    const isRoHanChar = syl.full.indexOf('รร') !== -1;

    if (isRoHanChar) {
      return { 
        sound: 'a', // Ro Han はデフォルトで短母音の 'a' を持つ
        length: 'short', 
        // Parser側 (resolveLogic) で「後ろに子音が続くから死音(Dead)」と
        // 判定されている場合はそれに従い、それ以外は生音(Live)とする
        type: (syl.sType === 'Dead') ? 'dead' : 'live' 
      };
    }

    // --- 1. マスタ照合用の純粋なベース文字列を作成 ---
    // 声調記号(่้๊๋)と黙字記号(์)を徹底除去して、母音だけの構成にする
    const pure = syl.marks.filter(m => !/[่้๊๋์]/.test(m)).join('');
    const base = (syl.leadingV || '') + pure;
    
    // マスタ側の symbols (例: 'เ-ีย') からハイフン等を除去して比較可能にする関数
    const normalize = (str) => str.replace(/[-\s]/g, '');

    // --- 2. マスタ照合（最長一致の原則） ---
    // A: 記号 + 末子音 (เดี๋ยว のように 'ย' や 'ว' が母音に組み込まれるパターンを優先)
    const withLast = base + (syl.lastC || '');
    
    // 優先度1: 末子音を含めた形でマスタに存在するか
    // 優先度2: 母音記号のみでマスタに存在するか
    let rule = ThaiMasterData.vowelRules.find(r => normalize(r.symbols) === withLast) ||
               ThaiMasterData.vowelRules.find(r => normalize(r.symbols) === base);

    if (rule) {
      // 母音の一部として 'ย' や 'ว' が食われた場合（例: เีย + ว）
      // これを末子音として二重計算しないようフラグを立てる
      if (normalize(rule.symbols).endsWith(syl.lastC)) {
        syl.isVowelPart = true; 
      }
      return rule;
    }

    // --- 3. 最終フォールバック (マスタにない場合の推測) ---
    // 記号が何もなく、末子音だけがある場合 (例: คน の ค + น) は暗黙の短母音 'o'
    if (syl.lastC && !syl.isVowelPart) {
      return { sound: 'o', length: 'short', type: 'live' };
    }
    
    // 末子音すらなく、記号もない単独子音 (例: ะ が省略された形など) は暗黙の短母音 'a'
    return { sound: 'a', length: 'short', type: 'dead' };
  },

  /**
   * 声調計算ロジック (タイ語の絶対ルールに基づく)
   * 戻り値: 0(平), 1(低), 2(下), 3(高), 4(上)
   */
  getToneNumber: function(charClass, tMark, sType, vLength) {
    const vLen = (vLength || 'short').toLowerCase();
    
    // --- ルール1: 声調記号がある場合（最優先） ---
    // 子音のクラス（低級か、中/高級か）によって記号の意味が変わる
    if (tMark) {
        if (tMark === '่') return (charClass === 'Low') ? 2 : 1; // ่ : 低級なら下声(2)、他は低声(1)
        if (tMark === '้') return (charClass === 'Low') ? 3 : 2; // ้ : 低級なら高声(3)、他は下声(2)
        if (tMark === '๊') return 3;                            // ๊ : 常に高声(3) ※主に中級で使用
        if (tMark === '๋') return 4;                            // ๋ : 常に上声(4) ※主に中級で使用
    }

    // --- ルール2: 無記号・生音 (Live Sound) ---
    // 長母音で終わる、または末子音が生音(ง,น,ม,ย,ว)の場合
    if (sType.toLowerCase() === 'live') {
        // 高級子音なら上声(4)、中級・低級なら平声(0)
        return (charClass === 'High') ? 4 : 0; 
    }

    // --- ルール3: 無記号・死音 (Dead Sound) の 中級・高級 ---
    // 短母音で終わる、または末子音が死音(ก,ด,บ)の場合
    if (charClass === 'High' || charClass === 'Mid') {
        return 1; // 長さに関係なく一律で「低声(1)」
    }

    // --- ルール4: 無記号・死音 (Dead Sound) の 低級 ---
    // 低級子音の死音だけは、母音の長さで声調が分岐する
    // 短母音なら「高声(3)」、長母音なら「下声(2)」
    return (vLen === 'short') ? 3 : 2;
  }
};
