<script>

/**
 * StudyEngine: 学習システムの中枢ロジック
 * AppStoreのステート（状態）を監視し、描画、音声再生、学習進捗の判定を行う司令塔。
 */
const StudyEngine = {

  /**
   * 学習画面のメインレンダリング（描画）
   * キューから現在の単語を抽出し、ViewControllerを介して画面上の全てのテキスト・色・統計情報を更新する。
   */
  render: function() {
    this.hideTooltip();
    // カードが変わる際、分析パネルをリセット（非表示）にする
    const panel = document.getElementById('analysis-panel');
    if (panel) { panel.classList.add('hidden'); panel.style.display = 'none'; }
    const list = AppStore.state.queue;
    if (!list || list.length === 0) return;
    
    // カード描画のたびに「めくり状態」を未読(false)にリセット
    AppStore.update('revealed', false);

    // 現在のインデックスに該当する単語オブジェクトを取得
    const item = list[AppStore.state.currentIndex];

    // 1. UIの物理リセット（隠すべき要素を隠し、スクロール位置などを整える）
    ViewController.resetCardUI();

    // 2. 視覚的情報の更新（忘却曲線に基づくボーダー色、最終学習日などの統計）
    ViewController.updateBorder(item);
    ViewController.updateStats(item);
    
    // 3. テキストデータの流し込み（現在の出題言語モードに応じてタイ語/日本語を切り替え）
    ViewController.updateText(item, AppStore.state.isTargetThai);

    this.renderContextLinks(item.example_th, 'ex-th', item.id);
    
    // ★ 解説（日本語/タイ語混じり）にもリンクを貼る
    // 解説文の中にタイ語が含まれていれば、それも自動でチップになります
    this.renderContextLinks(item.explanation, 'note', item.id);
    // this.renderContextLinks(item.explanation, 'ex-ja', item.id);

    // ★ 追加：逆引き（この単語を引用している他のカード）を表示
    // 第一引数に「今のタイ語単語」、第二引数に「今のID（自分を除外するため）」を渡す
    this.renderReferences(item.word_th, item.id);
    
// ★ render は「今のカードを表示した瞬間」の見た目を整えるだけに留める
    const btn = document.getElementById('bookmark-btn');
    const icon = document.getElementById('card-bookmark-icon');
    
    if (btn && icon && item) {
      const isBM = (item.is_bookmark === true || String(item.is_bookmark).toLowerCase() === "true");
      
      // ここは「初期描画時」に星がついているか判定して色を塗るだけ
      icon.innerText = isBM ? "★" : "☆";
      if (isBM) btn.classList.add('is-gold');
      else btn.classList.remove('is-gold');
    }
    // 4. スクロール時に出現するヘッダー情報の同期
    this.syncHeader();

this.updateMemoPreview(item); // 共通化して呼び出す
  },

/**
   * メモのプレビュー表示を更新する
   * 複数行ある場合は1行目のみを表示し、末尾に「...」を付与する
   */
  updateMemoPreview: function(item) {
    const memoArea = document.getElementById('memo-preview-area');
    const memoText = document.getElementById('memo-preview-text');
    
    if (!memoArea || !memoText) return;

    if (item && item.memo && item.memo.trim() !== "") {
      const fullText = item.memo.trim();
      
      // 改行コードでテキストを配列に分割
      const lines = fullText.split('\n');
      
      // 1行目を取得
      let previewString = lines[0];
      
      // 元のテキストが2行以上あった場合は、末尾に「...」をつける
      if (lines.length > 1) {
        previewString += ' ...';
      }

      memoText.innerText = previewString;
      memoArea.classList.remove('hidden');
    } else {
      // メモが空の場合はエリアごと隠す
      memoArea.classList.add('hidden');
      memoText.innerText = "";
    }
  },

  /**
   * 音声合成エンジンによる再生
   * @param {boolean} isEx - trueなら例文、falseなら単語単体を再生
   */
  speak: function(isEx = false) {
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return;

    let text = "";
    let lang = "th-TH";

    // モード判定：タイ語学習時はタイ語、日本語学習時は日本語（意味）を選択
    if (AppStore.state.isTargetThai) {
      text = isEx ? item.example_th : item.word_th;
      lang = "th-TH";
    } else {
      // 日本語学習モード（タイ人向け等）では、意味(meaning_ja)を日本語で読み上げる
      text = isEx ? item.example_ja : item.meaning_ja;
      lang = "ja-JP";
    }

// --- ★ 音声エンジンのフリーズ対策（サニタイズ） ---
    if (text) {
      text = String(text)
        .replace(/\d+\.\s*/g, '')      // 箇条書きの「1. 」などを消す
        .replace(/\n/g, ' ')           // 【重要】改行をスペースにする（沈黙バグ対策）
        .replace(/\//g, ' ')           // 【重要】スラッシュをスペースにする
        .replace(/<br\s*\/?>/gi, ' '); // 念のためHTMLタグの改行も消す
    }

    // 音声再生の実務を AudioSystem モジュールへ委託
    AudioSystem.play(
      text, 
      lang, 
      AppStore.state.isSlowMode ? 0.5 : 0.9 // スローモードなら0.5倍速
    );
  },

/**
   * 特定の文字列だけを強制的に読み上げる（言語指定対応版）
   */
  speakSpecificText: function(textToSpeak, lang = 'th-TH') {
    if (!textToSpeak || textToSpeak === '---') return;
    
    AudioSystem.play(
      textToSpeak, 
      lang, // ★ 決め打ちをやめて引数から受け取る
      AppStore.state.isSlowMode ? 0.5 : 0.9
    );
  },

  /**
   * (追加) 特定の文字列だけを強制的にコピーする
   */
  copyTextSpecific: function(textToCopy) {
    if (!textToCopy || textToCopy === '---') return;
    navigator.clipboard.writeText(textToCopy).then(() => {
      ViewController.showToast("Copied to clipboard!");
    });
  },
  /**
   * 再生速度（スローモード）のトグル切り替え
   * UI上のアイコン(🐢/🐌)と再生速度パラメータを同時に更新する。
   */
  toggleSlowMode: function() {
    if (AppStore.state.isProcessing) return;

    AppStore.state.isSlowMode = !AppStore.state.isSlowMode;
    const btn = document.getElementById('slow-mode-btn');
    
    if (btn) {
      if (AppStore.state.isSlowMode) {
        btn.classList.add('text-yellow-400', 'scale-110');
        btn.style.opacity = "1";
        btn.innerText = "🐢"; 
      } else {
        btn.classList.remove('text-yellow-400', 'scale-110');
        btn.style.opacity = "0.2";
        btn.innerText = "🐌";
      }
    }
    ViewController.showToast(`Speed: ${AppStore.state.isSlowMode ? '0.5x' : '0.9x'}`, "success");
  },

  /**
   * 指定したHTML要素内のテキストをクリップボードにコピー
   */
  copyText: function(elementId) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const text = el.innerText;
    if (!text || text === '---') return;

    navigator.clipboard.writeText(text).then(() => {
      ViewController.showToast(`Copied: ${text}`, "success");
    });
  },

  /**
   * 単語の忘却スコアに基づいてHSLカラーコードを算出
   * 赤(忘却中) -> 黄(復習期) -> 緑(定着) のグラデーションを定義。
   */
  getColor: function(item) {
    if (!item) return "hsl(0, 0%, 90%)";
    if (item.last_date === 'New') return "hsl(200, 70%, 60%)";

    const s = parseFloat(item.priority_score) || 0;
    if (s > 1.2) return "hsl(0, 75%, 60%)";   // 強警告：赤
    if (s > 0.8) return "hsl(45, 90%, 60%)";  // 警告：黄
    return "hsl(140, 50%, 70%)";             // 正常：緑
  },

  /**
   * カードをめくり、解答情報を表示する
   * 裏面の表示切り替えと音声の自動再生をトリガーする。
   */
  revealAll: function() {
    if (AppStore.state.revealed) return;

    // 状態を「めくり済み」に変更
    AppStore.update('revealed', true);

    // UIの切り替え実務を ViewController に委譲（一貫性の確保）
    ViewController.applyRevealUI(AppStore.state.isTargetThai);

    // 裏面表示と同時に単語を自動読み上げ
    this.speak(false); 

    
  },

  /**
   * ユーザーの自己評価を記録し、次のカードへ遷移する
   * @param {number} rating - 1(難), 2(普), 3(易)
   */
  answer: function(rating) {
    // 通信中、未読、連打の防止
    if ( !AppStore.state.revealed || AppStore.state.isAnswering) return;
    // if (AppStore.state.isProcessing || !AppStore.state.revealed || AppStore.state.isAnswering) return;
    AppStore.state.isAnswering = true;
    
    const list = AppStore.state.queue;
    const item = list[AppStore.state.currentIndex];
    
    // 解答演出とサーバーへのログ保存
    ViewController.playSuccessEffect(); 
    Bridge.saveLog(item.id, rating);

    setTimeout(() => {
      AppStore.state.isAnswering = false;
      document.getElementById('word-card').classList.remove('success-flash');
      document.getElementById('footer-ui').classList.add('translate-y-full', 'pointer-events-none');
      
      // 次のインデックスを算出（リスト末尾なら最初に戻る）
      const nextIdx = (AppStore.state.currentIndex + 1) % list.length;
      AppStore.update('currentIndex', nextIdx);
      this.render(); // 次のカードを描画
    }, 150);
  },

/**
   * ミニヘッダー（スクロール時出現）の内容を現在の単語と同期
   * JS側で文字数を制限し、タップで最上部へ戻る機能を付与
   */
  syncHeader: function() {
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return;
    
    const th = document.getElementById('header-display-th');
    const ja = document.getElementById('header-display-ja');
    const wordArea = document.getElementById('header-word-area');

    // 1. 意味の整形ロジック
    const rawJa = String(item.meaning_ja || '---')
      .replace(/<br\s*\/?>/gi, '\n')
      .split(/[\n\r]+/)
      .map(line => line.replace(/^\d+\.\s*/, '').trim())
      .filter(line => line.length > 0)
      .join(' / ');

    // 2. JS側で物理的に文字数をカット（見切れ処理）
    const truncate = (s, l) => (s.length > l) ? s.substring(0, l) + '..' : s;
    const displayTh = truncate(item.word_th || '', 10); 
    const displayJa = truncate(rawJa, 18);             

    // 3. 表示反映と【中央揃えの強制付与】
    if (AppStore.state.isTargetThai) {
      if (th) th.innerText = displayTh;
      if (ja) ja.innerText = displayJa;
    } else {
      if (th) th.innerText = displayJa;
      if (ja) ja.innerText = displayTh;
    }

    // ★ 追加：テキスト自体を確実に中央揃えにする
    if (th) th.style.textAlign = 'center';
    if (ja) ja.style.textAlign = 'center';

    // 4. ★ 親枠の中央揃え ＆ タップで最上部へスクロールする機能
    if (wordArea) {
      // ★ 追加：短い単語が左に寄らないよう、フレックスボックスで強制的に中心に串刺しにする
      wordArea.style.display = 'flex';
      wordArea.style.flexDirection = 'column';
      wordArea.style.alignItems = 'center';
      wordArea.style.justifyContent = 'center';
      wordArea.style.width = '100%';

      // スクロール用のおまじない
      wordArea.style.cursor = 'pointer';
      wordArea.style.touchAction = 'manipulation';
      
      wordArea.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        // 画面をスムーズに一番上まで戻す
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // 【保険】古いスマホなどで smooth スクロールが効かない場合の強制ワープ
        setTimeout(() => {
          if (window.scrollY > 0) {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
          }
        }, 350);
      };
    }
  },
/**
   * 特定の単語IDへジャンプ（飛ばしバグ修正版）
   */
  jumpToWordFromId: function(id) {
    const queue = AppStore.state.queue;
    const targetIdx = queue.findIndex(v => v.id === id);
    const currentIdx = AppStore.state.currentIndex;

    if (targetIdx !== -1) {
      // 1. ターゲットを配列から切り出す
      const [targetItem] = queue.splice(targetIdx, 1);
      
      // 2. 挿入位置（今見ている単語の直前）を計算
      // ターゲットが現在地より「前」にいた場合、抜いたことで現在地が1つ前にズレているので調整
      let insertIdx = currentIdx;
      if (targetIdx < currentIdx) {
        insertIdx = currentIdx - 1;
      }

      // 3. 挿入
      queue.splice(insertIdx, 0, targetItem);
      
      // 4. 現在地をその挿入した場所に固定
      AppStore.update('currentIndex', insertIdx);
      
      // 5. 再描画
      this.render(); 
      
      console.log(`[FixedJump] ID: ${id} moved to ${insertIdx}. Queue consistency maintained.`);
    }
  },
  /**
   * 学習進捗統計（ヒートマップ）をサーバーから取得し描画
   */
renderHeatmap: function() {
  google.script.run.withSuccessHandler(d => {
    const now = new Date();
    const start = new Date();
    // 画面に収まりつつ、少しだけスクロールできる「ちょうどいい」期間（150日）
    start.setDate(now.getDate() - 150);

    const fmt = (date) => date.toISOString().split('T')[0];

    new frappe.Chart("#heatmap", { 
      type: 'heatmap', 
      data: { dataPoints: d }, 
      start: fmt(start), 
      end: fmt(now), // ★ これで「今日」が右端の境界線になります
      countOfWeeks: 20, // ★ 画面幅に収まる「週の数」を明示的に指定（ライブラリの自動計算を防ぐ）
      colors: ['#1e293b', '#4f46e5', '#6366f1', '#818cf8', '#c7d2fe']
    });

    // 描画後、少しだけ右に寄せる（念のため）
    setTimeout(() => {
      const el = document.querySelector('.heatmap-scroll');
      if (el) el.scrollLeft = el.scrollWidth;
    }, 200);
  }).getLearningStatistics();
},
  /**
   * 出題のメイン言語（タイ語からか、日本語からか）を切り替える
   */
  toggleTargetLanguage: function() {
    if (AppStore.state.isProcessing) return;
    
    const nextMode = !AppStore.state.isTargetThai;
    AppStore.update('isTargetThai', nextMode);
    
    const btn = document.getElementById('target-toggle-btn');
    if (btn) btn.innerText = nextMode ? "🇹🇭" : "🇯🇵";
    
    this.render(); 
  },

renderToneRules: function() {
    const container = document.getElementById('tone-rules-container');
    if (!container || !ThaiMasterData.consonants) return;

    // --- 1. 子音クラスの動的グルーピング（読み方付きチップ生成） ---
    const groups = { 'Mid': [], 'High': [], 'Low': [] };
    const finalGroups = {}; // ★追加：末子音のグループ分け用

    Object.entries(ThaiMasterData.consonants).forEach(([char, info]) => {
      // 頭子音のグループ分け
      if (groups[info.class]) {
        const sound = info.sound || '-';
        const chip = `
          <div class="flex items-baseline gap-1 bg-black/5 dark:bg-white/5 px-2 py-1 rounded-md border border-black/10 dark:border-white/10">
            <span class="thai-font font-bold text-[14px] leading-none">${char}</span>
            <span class="text-[9px] opacity-60 font-mono text-blue-600 dark:text-blue-300 leading-none">${sound}</span>
          </div>`;
        groups[info.class].push(chip);
      }
      // ★追加：末子音(final)のグループ分け
      if (info.final && info.final !== '-' && info.final !== '?') {
        if (!finalGroups[info.final]) finalGroups[info.final] = [];
        finalGroups[info.final].push(char);
      }
    });

    let html = '<div class="mt-8 space-y-8 text-[10px] pb-40">';
    html += '<h3 class="text-xs font-black opacity-40 mb-6 tracking-widest text-center underline decoration-blue-500/30 underline-offset-8">DB-SYNCED MASTER REFERENCE</h3>';

    // --- A. 子音クラス (Consonants from DB) ---
    html += '<section class="bg-white/5 rounded-2xl p-4 border border-white/10">';
    html += '<p class="font-bold mb-3 text-cyan-400 flex items-center"><span class="text-lg mr-2">A</span>Consonant Classes</p>';
    html += '<div class="flex flex-col gap-3">';
    
    const classInfo = [
      { id: 'Mid', label: '中級', color: 'text-green-500 dark:text-green-400', bg: 'bg-green-500/10' },
      { id: 'High', label: '高級', color: 'text-purple-500 dark:text-purple-400', bg: 'bg-purple-500/10' },
      { id: 'Low', label: '低級', color: 'text-rose-500 dark:text-rose-400', bg: 'bg-rose-500/10' }
    ];

    classInfo.forEach(c => {
      html += `<div class="p-3 ${c.bg} rounded-xl border border-white/5 flex flex-col gap-2">`;
      html += `  <div class="font-black ${c.color} text-[11px] border-b border-black/5 dark:border-white/10 pb-1.5">${c.label}</div>`;
      html += `  <div class="flex flex-wrap gap-1.5 pt-1">${groups[c.id].join('')}</div>`;
      html += `</div>`;
    });
    html += '</div></section>';

    // --- B. 主要母音 (Vowels from DB) ---
    html += '<section class="bg-white/5 rounded-2xl p-4 border border-white/10">';
    html += '<p class="font-bold mb-3 text-green-400 flex items-center"><span class="text-lg mr-2">B</span>Vowel Rules</p>';
    html += '<div class="max-h-60 overflow-y-auto pr-2 custom-scrollbar">';
    html += '<table class="w-full text-left border-collapse">';
    html += '<thead><tr class="opacity-50 border-b border-white/10 text-[8px]"><th class="py-1">Symbol</th><th class="py-1">Sound</th><th class="py-1">Type</th></tr></thead>';
    html += '<tbody class="divide-y divide-white/5 font-mono">';
    
    ThaiMasterData.vowelRules.slice(0, 30).forEach(rule => {
      const typeColor = rule.length === 'long' ? 'text-green-300' : 'text-rose-300';
      html += `<tr>`;
      html += `<td class="py-1.5 text-[11px]">${rule.symbols}</td>`;
      html += `<td class="py-1.5 font-bold">${rule.sound}</td>`;
      html += `<td class="py-1.5 ${typeColor} opacity-70">${rule.length}</td>`;
      html += `</tr>`;
    });
    
    html += '</tbody></table></div>';
    html += '<p class="mt-2 text-center opacity-30 text-[7px]">Showing top 30 rules from DB</p></section>';

    // ==========================================
    // ★追加: C. 二重子音・特殊な頭子音 (Clusters from DB)
    // ==========================================
    if (ThaiMasterData.clusters) {
      html += '<section class="bg-white/5 rounded-2xl p-4 border border-white/10">';
      html += '<p class="font-bold mb-3 text-orange-400 flex items-center"><span class="text-lg mr-2">C</span>Clusters & Special Initials</p>';
      html += '<div class="flex flex-wrap gap-1.5">';
      
      Object.entries(ThaiMasterData.clusters).forEach(([combo, info]) => {
        // クラスによって文字色を変える
        const cColor = info.class === 'Mid' ? 'text-green-500 dark:text-green-400' :
                       info.class === 'High' ? 'text-purple-500 dark:text-purple-400' :
                       'text-rose-500 dark:text-rose-400';

        // トリック子音（ทร = s など）は発音記号を赤くして目立たせる
        const isTrick = (combo[0] !== info.sound[0] && !['khr','khl','khw','phr','phl'].includes(info.sound));
        const soundColor = isTrick ? 'text-rose-500 dark:text-rose-400 font-black' : 'text-blue-600 dark:text-blue-300';

        html += `
          <div class="flex items-baseline gap-1 bg-black/5 dark:bg-white/5 px-2 py-1 rounded-md border border-black/10 dark:border-white/10">
            <span class="thai-font font-bold text-[14px] ${cColor} leading-none">${combo}</span>
            <span class="text-[9px] opacity-80 font-mono ${soundColor} leading-none">${info.sound}</span>
          </div>`;
      });
      html += '</div></section>';
    }

    // ==========================================
    // ★追加: D. 末子音の変化ルール (Final Consonants)
    // ==========================================
    html += '<section class="bg-white/5 rounded-2xl p-4 border border-white/10">';
    html += '<p class="font-bold mb-3 text-pink-400 flex items-center"><span class="text-lg mr-2">D</span>Final Consonants</p>';
    html += '<div class="grid grid-cols-2 gap-2">';
    
    // 定番の6つの末子音の並び順を指定
    const order = ['k', 't', 'p', 'ng', 'n', 'm'];
    
    order.forEach(sound => {
      if (finalGroups[sound]) {
        // k, t, p は「死音(Dead)」、ng, n, m は「生音(Live)」
        const isDead = ['k', 't', 'p'].includes(sound);
        const bgClass = isDead ? 'bg-rose-500/5 border-rose-500/20' : 'bg-green-500/5 border-green-500/20';
        const txtClass = isDead ? 'text-rose-500 dark:text-rose-400' : 'text-green-500 dark:text-green-400';
        
        html += `<div class="p-2.5 rounded-xl border ${bgClass} flex flex-col gap-1.5 shadow-sm">`;
        html += `  <div class="font-mono font-black text-[12px] flex justify-between items-center ${txtClass}">`;
        html += `    <span>- ${sound}</span> <span class="text-[9px] opacity-70 border border-current px-1.5 rounded">${isDead ? 'Dead (死)' : 'Live (生)'}</span>`;
        html += `  </div>`;
        html += `  <div class="thai-font text-[13px] opacity-80 leading-relaxed break-all">${finalGroups[sound].join(' ')}</div>`;
        html += `</div>`;
      }
    });
    html += '</div></section>';

renderContextLinks: function(rawText, targetElementId, excludeId) {
  const targetEl = document.getElementById(targetElementId);
  if (!rawText || !targetEl) return;

  let text = rawText;
  const allVocab = AppStore.state.allVocab;
  const map = new Map();

  // 1. 【絶対ルール】自分も他人も混ぜて、とにかく「文字数が長い順」にソートする
  // これにより「สถานที่」が「ที่」より先に処理され、部分一致によるリンク破壊を防ぎます。
  const sortedVocab = [...allVocab]
    .filter(v => v.word_th && v.word_th.length > 1)
    .sort((a, b) => b.word_th.length - a.word_th.length);

  // 2. 置換処理の実行
  sortedVocab.forEach((v, index) => {
    if (text.includes(v.word_th)) {
      const placeholder = `__VOCAB_${index}__`;
      
      // ツールチップ用に意味を「A / B」の1行に美しく整形
      const meaning = String(v.meaning_ja || "")
        .replace(/\d+\.\s*/g, '')
        .replace(/[\n\r]+/g, ' / ')
        .replace(/"/g, '&quot;');

      // ★ ここで「自分かどうか」を判定し、付けるCSSクラスを切り替える
      const isSelf = (v.id === excludeId);
      const linkClass = isSelf ? "context-link is-self" : "context-link";

      const linkHtml = `<span class="${linkClass}" data-meaning="${meaning}" onclick="event.stopPropagation(); StudyEngine.handleContextClick(this, '${v.id}')">${v.word_th}</span>`;
      
      map.set(placeholder, linkHtml);
      text = text.split(v.word_th).join(placeholder);
    }
  });

  // 3. プレースホルダーを実際のHTMLリンクに復元
  map.forEach((html, placeholder) => {
    text = text.split(placeholder).join(html);
  });
  
  // 改行コードを明確なHTMLの改行タグに変換する
  text = text.replace(/\n/g, '<br>');

  targetEl.innerHTML = text;
},
/**
   * 2クリック遷移のロジック（レイアウト崩れ・端っこ見切れ防止の完全版）
   */
  handleContextClick: function(el, id) {
    // 2回目クリック：ジャンプ処理
    if (el.dataset.active === 'true') {
      this.jumpToWordFromId(id);
      el.dataset.active = 'false';
      this.hideTooltip();
      return;
    }

    // 1回目クリック：他のハイライトをすべて消す
    document.querySelectorAll('.context-link').forEach(l => {
      l.dataset.active = 'false';
      l.style.background = ''; 
      l.style.borderRadius = '';
    });

    // 自分をハイライト（CSSに依存せず直接塗ることで、テキストの改行崩れを100%防ぐ）
    el.dataset.active = 'true';
    el.style.background = 'rgba(59, 130, 246, 0.3)'; // Tailwindの blue-500/30 相当
    el.style.borderRadius = '4px';
    
    // 独立したツールチップを表示（画面端を自動検知）
    this.showTooltip(el, el.getAttribute('data-meaning'));

    // 3秒後に自動解除
    if (this.tooltipTimer) clearTimeout(this.tooltipTimer);
    this.tooltipTimer = setTimeout(() => {
      if (el.dataset.active === 'true') {
        el.dataset.active = 'false';
        el.style.background = '';
        this.hideTooltip();
      }
    }, 3000);
  },
/**
   * 画面端で見切れない独立ツールチップの生成・表示（スクロール追従版）
   */
  showTooltip: function(anchorEl, text) {
    let tooltip = document.getElementById('global-context-tooltip');
    if (!tooltip) {
      tooltip = document.createElement('div');
      tooltip.id = 'global-context-tooltip';
      // ★ fixed を absolute に変更し、ページ全体に対する絶対配置にする
      tooltip.className = 'absolute z-[10000] bg-[#1e293b] border border-blue-500/30 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg shadow-xl pointer-events-none whitespace-nowrap transition-opacity duration-200';
      document.body.appendChild(tooltip);
    }

    tooltip.innerHTML = text;
    tooltip.style.opacity = '0';
    tooltip.style.display = 'block';

    // 描画を待ってからサイズを計算
    requestAnimationFrame(() => {
      const rect = anchorEl.getBoundingClientRect();
      const tooltipWidth = tooltip.offsetWidth;
      
      // ★ window.scrollY / scrollX を足して、スクロールされても元の単語にピタッと追従させる
      let left = rect.left + window.scrollX + (rect.width / 2) - (tooltipWidth / 2);
      let top = rect.top + window.scrollY - tooltip.offsetHeight - 8; 

      // 画面端の「見切れ」防止ロジック（ここも scrollX を考慮）
      const safePadding = 12; 
      if (left < window.scrollX + safePadding) {
        left = window.scrollX + safePadding; 
      } else if (left + tooltipWidth > window.scrollX + window.innerWidth - safePadding) {
        left = window.scrollX + window.innerWidth - tooltipWidth - safePadding; 
      }

      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
      tooltip.style.opacity = '1';
    });
  },
  /**
   * ツールチップを隠す
   */
  hideTooltip: function() {
    const tooltip = document.getElementById('global-context-tooltip');
    if (tooltip) {
      tooltip.style.opacity = '0';
      setTimeout(() => tooltip.style.display = 'none', 200);
    }
  },

/**
   * AppStoreの解析データを構造化してクリップボードへ
   * エンジンの内部キー (finalClass, pInitial, vSound) を正確に参照
   */
  copyAnalysisToClipboard: function(e) {
    if (e) e.stopPropagation();
const analysis = AppStore.state.currentAnalysis;
    const item = AppStore.getCurrentItem();

    if (!analysis || !item) return;

    // --- ここで「完全比較用」の文字列を作る ---
    // カッコを全部消し、前後のスペースも完全に消す
    const rawAi = (item.phonetic || '').replace(/[\[\]]/g, '').trim();
    const rawEngine = (analysis.meta?.derivedPhonetic || '').replace(/[\[\]]/g, '').trim();

    // 純粋な中身だけで一致判定
    const isMismatch = rawAi !== rawEngine;

    // --- 表示用（クリップボード）は1重カッコ [a-rai] に統一 ---
    const displayAi = `[${rawAi}]`;
    const displayEngine = `[${rawEngine}]`;

    let text = `【THAI-GO 発音比較】\n`;
    text += `単語: ${item.word_th}\n`;
    text += `🤖 AI生成値: ${displayAi}\n`;
    text += `⚙️ 解析エンジン: ${displayEngine}\n`;
    text += isMismatch ? `⚠️ 読みの不一致を検出\n\n` : `✅ 読みは一致\n\n`;
    
    text += `意味: ${item.meaning_ja || '---'}\n\n`;

    // 2. 音節ごとの詳細（エンジンの内部プロパティ名を反映）
    analysis.forEach((syl, idx) => {
      // --- ここが重要：undefinedを殺すためのキー合わせ ---
      const tone = syl.toneLabel || "平声";
      
      // 子音情報: mainC(文字) / finalClass(級) / pInitial(発音記号)
      const mainC = syl.mainC || '---';
      const cls = syl.finalClass || 'Low'; 
      const snd = syl.pInitial || '-';
      
      // 母音情報: vSound(音) / vLen(長短) / sType(生死)
      const vSound = syl.vSound || 'a';
      const vLen = syl.vLen || '短';
      const type = syl.sType || '生音';

      text += `■ ${idx + 1}. ${syl.full}\n`;
      text += `   声調: ${tone}\n`;
      text += `   子音: ${mainC} (${cls}) / 発音: ${snd}\n`;
      text += `   母音: ${vSound} (${vLen}) / タイプ: ${type}\n\n`;
    });

    // 3. 警告メッセージ
    if (analysis.meta && analysis.meta.warnings?.length > 0) {
      text += `判定アラート: ⚠️ ${analysis.meta.warnings.join(' ')}\n`;
    }
    
    text += `---\nGenerated by THAI-GO`;

    // 4. 実行
    navigator.clipboard.writeText(text).then(() => {
      const toastMsg = isMismatch ? "Copied（不一致検出！）" : "Copied";
      ViewController.showToast(toastMsg, isMismatch ? "warning" : "success");
      if (window.navigator.vibrate) window.navigator.vibrate(isMismatch ? [10, 50, 10] : 5);
    });
  },

/**
 * GS_Parser: 音節構造解析エンジン (Final Fixed Version)
 */
const ThaiParser = {

  // --- ★新機能1：例外オーバーライド辞書 ---
  // ルールベース(Greedy Loop)では構造上どうしても誤分割される単語
  // （例：二重機能子音/Overlap）を強制的に正しい音節配列に切り分ける。

  // --- メインルーター（外部から呼ばれるのはここだけ） ---
/**
   * メインルーター：DBエントリを優先的にチェックする
   * @param {string} text - 解析するタイ語
   * @param {Object} dbEntry - スプレッドシートから取得した1行分のデータ(任意)
   */
parseSyllables: function(text, dbEntry = null) {
    if (!text) return [];

    // 1. DB(シート)に custom_split があればそれを使う
    if (dbEntry && dbEntry.custom_split) {
      try {
        const chunks = typeof dbEntry.custom_split === 'string' 
                       ? JSON.parse(dbEntry.custom_split) 
                       : dbEntry.custom_split;
        
        let combinedSyllables = [];
        chunks.forEach(chunk => {
           // ★ 修正：パーツを解析するが、必ず1つの音節に強制マージする
           const parsed = this._parseCore(chunk);
           if (parsed.length > 0) {
             const atomicSyllable = parsed[0];
             
             // もしエンジンが勝手に複数に分けた場合、1つに統合する
             if (parsed.length > 1) {
               atomicSyllable.full = chunk; // 表示を元のチャンクに戻す
               
               // 最後のパーツから末子音（lastC）の情報を継承
               const lastPart = parsed[parsed.length - 1];
               atomicSyllable.lastC = lastPart.lastC || lastPart.mainC;
               
               // バラバラにされた記号や文字をすべて marks に統合（声調計算用）
               for(let k = 1; k < parsed.length; k++) {
                 atomicSyllable.marks = atomicSyllable.marks.concat(
                    Array.from(parsed[k].mainC), 
                    parsed[k].marks
                 );
               }
             }
             combinedSyllables.push(atomicSyllable);
           }
        });
        
        // 辞書適用時は強制的に「信頼(Reliable)」フラグを立て、警告を封じる
        combinedSyllables.meta = { isDict: true, isReliable: true, warnings: [] };
        return (AppStore.state.currentAnalysis = this.resolveLogic(combinedSyllables));
      } catch (e) {
        console.error("Custom split process error:", e);
      }
    }

    // 2. なければ自動解析
    const syllables = this._parseCore(text);
    return (AppStore.state.currentAnalysis = this.resolveLogic(syllables));
  },

// --- コア解析エンジン（文字を左から舐めて吸い込む） ---
  _parseCore: function(text) {
    const vMarks = "ะาำิีึืุูั็ฤๅ"; 
    const leadingV = "เแโใไ";
    const toneMarks = "่้๊๋์";
    
    const chars = Array.from(text);
    const syllables = [];
    let i = 0;

    while (i < chars.length) {
      let syl = { full: '', leadingV: '', mainC: '', marks: [], lastC: '', isRoHan: false };

      // Step 0. 逆転パターンの先読み
      if (i + 1 < chars.length) {
        const combo = chars[i] + chars[i+1];
        if (ThaiMasterData.clusters[combo]) {
          // 何もしない（後で処理）
        } 
        else if (leadingV.indexOf(chars[i]) === -1 && leadingV.indexOf(chars[i+1]) !== -1) {
          syl.mainC = chars[i]; syl.full = chars[i]; i++;
          syllables.push(syl);
          continue; 
        }
      }
      
      // Step 1. 前置母音
      if (i < chars.length && leadingV.indexOf(chars[i]) !== -1) {
        syl.leadingV = chars[i]; syl.full += chars[i]; i++;
      }

      // Step 2. 核子音
      if (i < chars.length) {
        const c1 = chars[i];
        const c2 = chars[i+1];
        const nextMark = chars[i+2]; 
        const combo = c1 + c2;

        if (c2 && ThaiMasterData.clusters[combo]) {
          if (c2 === 'ร' && nextMark === 'ร') {
            syl.mainC = c1; syl.full += c1; i++;
          } else {
            syl.mainC = combo; syl.full += combo; i += 2;
          }
        } 
        else if (
          (c1 === 'ห' && c2 && "งญนมรลวยว".indexOf(c2) !== -1) || 
          (c1 === 'อ' && c2 === 'ย' && (nextMark === 'า' || nextMark === '่' || nextMark === 'ู'))
        ) {
          syl.mainC = combo; syl.full += combo; i += 2;
        } 
        else {
          syl.mainC = c1; syl.full += c1; i++;
        }
      }

      // Step 3. Ro Han (รร)
      if (i + 1 < chars.length && chars[i] === 'ร' && chars[i+1] === 'ร') {
        const next = chars[i+2];
        if (!next || (vMarks.indexOf(next) === -1 && leadingV.indexOf(next) === -1)) {
          syl.isRoHan = true; syl.marks.push('รร'); syl.full += 'รร'; i += 2;
        }
      }

      // Step 4. 母音記号と「母音として機能する子音」の厳格な回収
      while (i < chars.length) {
        const c = chars[i];
        const next = chars[i+1];
        
        if (next === '์') break;

        if (vMarks.indexOf(c) !== -1 || toneMarks.indexOf(c) !== -1 || c === '์') {
          syl.marks.push(c); syl.full += c; i++;
          continue;
        }

        const hasMainVowel = syl.marks.some(m => vMarks.indexOf(m) !== -1);
        let isVowelPart = false;

        // ย, ว, อ の「母音化」判定
        if (c === 'อ') {
          // ★ 修正：็ (マイタイクー) がある時も、อ を母音パーツとして合体させる！
          if (syl.marks.includes('ื') || syl.marks.includes('๊') || syl.marks.includes('๋') || syl.marks.includes('็')) {
            isVowelPart = true;
          } else if (syl.leadingV === 'เ' && !hasMainVowel) {
            isVowelPart = true;
          } else if (!hasMainVowel && !syl.leadingV) {
            isVowelPart = true;
          }
        } 
        else if (c === 'ย') {
          if (syl.leadingV === 'เ' && syl.marks.includes('ี')) {
            isVowelPart = true;
          }
        } 
        else if (c === 'ว') {
          if (syl.marks.includes('ั')) {
            isVowelPart = true;
          } else if (!hasMainVowel && !syl.leadingV) {
            isVowelPart = true;
          }
        }

        if (isVowelPart) {
          syl.marks.push(c); syl.full += c; i++;
          continue;
        }
        break; 
      }

      // Step 5. 末子音の回収
      while (i < chars.length) {
        const c = chars[i];
        const next = chars[i+1];
        const afterNext = chars[i+2]; 

        if (leadingV.indexOf(c) !== -1) break;

        if (next) {
          const nextHasVowel = (vMarks.indexOf(next) !== -1 || toneMarks.indexOf(next) !== -1 || leadingV.indexOf(next) !== -1);
          const afterNextHasVowel = afterNext && (vMarks.indexOf(afterNext) !== -1 || toneMarks.indexOf(afterNext) !== -1);
          
          if (nextHasVowel && next !== '์') break; 
          if (afterNextHasVowel) break; 
        }

        syl.lastC = c; 
        syl.full += c; 
        i++;

        while (i < chars.length && (vMarks.indexOf(chars[i]) !== -1 || toneMarks.indexOf(chars[i]) !== -1 || chars[i] === '์')) {
          syl.marks.push(chars[i]); 
          syl.full += chars[i]; 
          i++;
        }
        break; 
      }
      
      syllables.push(syl);
    }
    return syllables;
  },

  // --- 解析結果を元に、声調や属性を確定させるロジック ---
  resolveLogic: function(syllables) {
    const lowSingles = "งนมยรลวยญณฬ";
    
    // パス1: クラス判定と声調計算
    syllables.forEach((syl, i) => {
        const headChar = syl.mainC[0];
        // ★修正：ฤ が頭文字の時は、一時的に「ร (Low)」と同じクラスとして扱う
        let cObj = ThaiMasterData.consonants[headChar];
        if (headChar === 'ฤ') {
            cObj = { class: 'Low' }; // 音(sound)は空でOK。母音側で鳴らすため。
        } else if (!cObj) {
            cObj = { class: '不明' };
        }

        syl.finalClass = cObj.class;
        syl.isOverridden = false;
        syl.ruleLabel = "標準";

        // 属性伝染・引導子音(ห/อ)の判定
        if (syl.mainC.startsWith('ห') && syl.mainC.length > 1) {
        syl.finalClass = 'High'; syl.isOverridden = true; syl.ruleLabel = "ห引導";
        } else if (syl.mainC === 'อย') {
            syl.finalClass = 'Mid'; syl.isOverridden = true; syl.ruleLabel = "อ引導"; // ← ★追加
        } else if (i > 0) {
            const prev = syllables[i-1];
            const isPrevOpenA = (!prev.lastC && !prev.leadingV && prev.marks.length === 0) || prev.isRoHan;

            if ((prev.finalClass === 'High' || prev.finalClass === 'Mid') && 
                isPrevOpenA && 
                syl.finalClass === 'Low' && 
                lowSingles.indexOf(headChar) !== -1) {
                syl.finalClass = prev.finalClass;
                syl.isOverridden = true;
                syl.ruleLabel = "属性伝染";
            }
        }

        // Validatorを呼んで母音と基本タイプを取得
        const vRule = ThaiValidator.resolveVowel(syl);
        const tMark = syl.marks.find(m => /[\u0E48-\u0E4B]/.test(m));
        let sType = syl.lastC ? (ThaiMasterData.terminalGroups[syl.lastC] || 'Dead') : vRule.type;
        
        // ★ Ro Han (รร) の死音化ロジック
        // Parserで配列として後ろに要素(音節)が存在する場合、促音(Dead)扱いにする
        if (syl.isRoHan && i + 1 < syllables.length) {
            sType = 'Dead';
            syl.ruleLabel = "RoHan(閉)";
        }

syl.toneNum = ThaiValidator.getToneNumber(syl.finalClass, tMark, sType, vRule.length);
        syl.sType = sType;
        syl.vSound = vRule.sound; 
if (syl.isRoHan) {
    syl.vSound = 'a';
}
        syl.vLen = vRule.length;

        // --- 🔊 【ロジック層での発音記号導出】 ---
// --- 🔊 【ロジック層での発音記号導出】 ---
        const tObj = ThaiMasterData.toneMap[syl.toneNum] || { mark: "" };
        
        let baseSound = "";
        const headStr = syl.mainC;

        // 1. マスタ(clusters)を最優先で引く（'ตร' -> 'tr'）
        if (ThaiMasterData.clusters[headStr]) {
            baseSound = ThaiMasterData.clusters[headStr].sound;
        } 
        // 2. 引導子音(ห/อ)の場合は2文字目を採用 (既存ロジック)
        else if (headStr.length > 1 && (headStr[0] === 'ห' || headStr[0] === 'อ')) {
            baseSound = ThaiMasterData.consonants[headStr[1]]?.sound || "";
        } 
        // 3. 通常の単独子音
        else {
            baseSound = ThaiMasterData.consonants[headStr[0]]?.sound || "";
        }

        syl.pInitial = baseSound.toLowerCase();

        // 4. 全体発音の組み立て（母音の直後に声調記号を置く [ sà-nùk ] 形式）
// --- 🔊 【ロジック層での発音記号導出】 ---
        // 1. パーツの定義（すべて揃える）
        const displayToneObj = ThaiMasterData.toneMap[syl.toneNum] || { mark: "" };
        const toneDisplayMark = displayToneObj.mark || ""; // 声調記号

        const pInitial = (syl.pInitial || "").toLowerCase(); // 頭子音
        const pVowelSound = (syl.vSound || "").toLowerCase(); // 母音

        // ★ ReferenceError の原因：この定義が syl.derived より上に必要
        const pFinalClean = (syl.lastC) 
            ? (ThaiMasterData.consonants[syl.lastC]?.final || "").toLowerCase() 
            : "";

        // 2. 母音の1文字目に声調記号を差し込む (sɔɔ -> sɔ́ɔ)
        let vWithTone = "";
        if (pVowelSound.length > 0) {
            vWithTone = pVowelSound[0] + toneDisplayMark + pVowelSound.substring(1);
        } else {
            vWithTone = toneDisplayMark; 
        }

        // 3. 最終的な組み立て（ここで全ての変数が揃っている状態）
        syl.derived = pInitial + vWithTone + pFinalClean;
        
    });

// --- パス2：自己診断（確信度チェック）強化版 ---
let hasWarning = false;
let warningReasons = [];
const isDictApplied = syllables.meta ? syllables.meta.isDict : false;

syllables.forEach((syl, i) => {
    syl.confidence = "HIGH";
    
    if ("ๆฯ".indexOf(syl.mainC) !== -1) return;

    // A. 文字自体の不明チェック
    if (syl.finalClass === '不明') {
        syl.confidence = "LOW";
        warningReasons.push(`[${syl.full}]: 不明な文字が含まれています`);
    }

    // B. 裸の子音（記号も母音も末子音もない）のチェック
    const isNaked = !syl.leadingV && syl.marks.length === 0 && !syl.lastC && !syl.isRoHan && syl.mainC.length === 1;
    
    if (!isDictApplied && isNaked) {
        if (i === syllables.length - 1) {
            // 末尾の場合：既存の末子音分離チェック
            const isLikelyFinalC = "งนมยรลวยกบด".indexOf(syl.mainC) !== -1;
            if (isLikelyFinalC && i > 0 && (syllables[i-1].marks.length > 0 || syllables[i-1].leadingV)) {
                syl.confidence = "LOW";
                warningReasons.push(`[${syl.full}]: 末子音の分離（解析ミス）の疑い`);
            }
        } else {
            // ★強化ポイント：音節の途中に裸の子音がある場合
            // 本来の「暗黙a」か「解析ミス（吸着漏れ）」か判別不能なため、あえて「LOW」にして警告を出す
            syl.confidence = "LOW";
            warningReasons.push(`[${syl.full}]: 音節中央の単独子音（末子音吸着漏れ、またはOverlapの疑い）`);
        }
    }
    
    if (syl.confidence === "LOW") hasWarning = true;
});

    // メタデータとして診断結果と「完成済み発音記号」を付与
    syllables.meta = {
        isReliable: !hasWarning,
        warnings: warningReasons,
        isDict: isDictApplied,
        derivedPhonetic: syllables.map(s => s.derived).join("-") // ここで連結
    };
// --- 🛡️ パス3：正直なリカバリー・レイヤー (中間吸着 & 履歴残し) ---
    if (!isDictApplied && syllables.length >= 2) {
        let recoveryHappened = false;
        let history = [];

        for (let j = syllables.length - 1; j >= 1; j--) {
            let current = syllables[j];
            let prev = syllables[j - 1];

            // 判定条件：現在が「裸の子音」かつ「前の音節に母音がある」場合
            const isOrphan = !current.leadingV && current.marks.length === 0 && !current.lastC && current.mainC.length === 1;
            const prevHasVowel = prev.marks.length > 0 || prev.leadingV || prev.isRoHan;

            if (isOrphan && prevHasVowel) {
                const beforeStr = `${prev.full}-${current.full}`;
                
                // 1. 強制吸着
                prev.lastC = current.mainC;
                prev.full += current.mainC;
                
                // 2. 再計算
                const recV = ThaiValidator.resolveVowel(prev);
                prev.sType = prev.lastC ? (ThaiMasterData.terminalGroups[prev.lastC] || 'Dead') : recV.type;
                const tMark = prev.marks.find(m => /[\u0E48-\u0E4B]/.test(m));
                prev.toneNum = ThaiValidator.getToneNumber(prev.finalClass, tMark, prev.sType, recV.length);
                
// ★追加：吸着後の母音情報を同期（表示・コピー用の不整合防止）
prev.vSound = recV.sound;
prev.vLen = recV.length;

// 3. 発音記号(derived)の再生成
const tObj = ThaiMasterData.toneMap[prev.toneNum] || { mark: "" };

// ★追加：通常ルートと同じ優先順位で頭子音の音価を決定
const headStr = prev.mainC || "";
let pInit = "";

if (ThaiMasterData.clusters[headStr]) {
   pInit = (ThaiMasterData.clusters[headStr].sound || "").toLowerCase();
} else if (headStr.length > 1 && (headStr[0] === 'ห' || headStr[0] === 'อ')) {
   pInit = (ThaiMasterData.consonants[headStr[1]]?.sound || "").toLowerCase();
} else {
   pInit = (ThaiMasterData.consonants[headStr[0]]?.sound || "").toLowerCase();
}

const pFinal = (ThaiMasterData.consonants[prev.lastC]?.final || "").toLowerCase();
const pVowel = (recV.sound || "").toLowerCase();
const toneMark = tObj.mark || "";

let vWithTone = "";
if (pVowel.length > 0) {
   vWithTone = pVowel[0] + toneMark + pVowel.substring(1);
} else {
   vWithTone = toneMark;
}

prev.derived = pInit + vWithTone + pFinal;
                // 4. 履歴を記録して削除
                history.push(`[${beforeStr} → ${prev.full}]`);
                syllables.splice(j, 1);
                recoveryHappened = true;
            }
            
        }
        
  if (recoveryHappened) {
            // ★ 足したこと：確信度の塗り替え
            // 吸着に成功した音節については、最低限の体裁は整ったので "MID" に格上げする
            syllables.forEach(s => {
                if (s.confidence === "LOW") {
                    s.confidence = "MID"; // 赤から黄色へ
                }
            });



            // メタデータの更新
            syllables.meta.isReliable = false; // 依然として「100%確実」ではないので false を維持
            syllables.meta.warnings = [
                `🛠️ 吸着リカバリー実行: ${history.join(', ')}`,
                // warningReasons は「吸着前の状態」の警告なので、ここではあえて含めず履歴を優先する
            ];
            syllables.meta.derivedPhonetic = syllables.map(s => s.derived).join("-");
        }

    }
// --- 🕵️ 最終診断：属性伝染・暗黙o の地雷原をチェック ---
// --- 🕵️ 最終診断：属性伝染・暗黙o の地雷原をチェック ---
for (let i = 0; i < syllables.length - 1; i++) {
    const current = syllables[i];
    const next = syllables[i + 1];

    // ガード：チップが存在しない、またはメイン文字がない場合はスキップ
    if (!current?.mainC?.[0] || !next?.full) continue;

    // ① 前のチップの開始文字のクラスを確認
    const firstChar = current.mainC[0];
    const charData = ThaiMasterData.consonants[firstChar];
    
    // マスタに存在しない文字（記号など）はスキップ
    if (!charData) continue;

    const charClass = charData.class;
    const isHighOrMid = (charClass === 'High' || charClass === 'Mid');

    // ② 次のチップが「母音記号なし」かつ「2文字以上（จน์ や นก など）」かチェック
    // next.marks が存在しない、または空配列であることを確認
    const hasNoMarks = !next.marks || next.marks.length === 0;
    
    // 暗黙の o (子音2つ並び) の判定
    // current が高/中級で、next が母音記号なしの2文字以上なら「地雷」
    const isImplicitO = hasNoMarks && next.full.length >= 2;

// 【追加：3連続子音の地雷原チェック】
    // 例：[ถ][นน] のように分かれるべきが [ถน][น] になっているケース
    const totalChars = current.full.length + next.full.length;
    const hasAnyMark = current.marks.length > 0 || next.marks.length > 0;
    const hasAnyLeadingV = current.leadingV || next.leadingV;

    // 母音記号が一切なく、合計3文字以上の子音が並んでいる場合
    if (totalChars >= 3 && !hasAnyMark && !hasAnyLeadingV) {
        current.confidence = "LOW";
        next.confidence = "LOW";
        next.ruleLabel = "3連子音/分割注意";
        
        if (syllables.meta && syllables.meta.warnings) {
            syllables.meta.warnings.push(`⚠️ [${current.full}${next.full}]: 暗黙の母音(a/o)の境界が不明瞭です。`);
        }
    }
    if (isHighOrMid && isImplicitO) {
        // 判定の上書き：分割ミスの可能性が極めて高い（例：กาญ-จน์）
        next.confidence = "LOW"; 
        next.ruleLabel = "属性伝染/分割疑い";
        
        // 前のチップも注意喚起のために黄色（MID）へ
        if (current.confidence !== "LOW") {
            current.confidence = "MID";
        }
        
        // メタデータの警告リストに通知を追加
        if (syllables.meta && syllables.meta.warnings) {
            const warnMsg = `⚠️ [${current.full}${next.full}]: 分割ミス（属性伝染/暗黙o）の可能性があります`;
            if (!syllables.meta.warnings.includes(warnMsg)) {
                syllables.meta.warnings.push(warnMsg);
            }
            syllables.meta.isReliable = false;
        }
    }
}
    return syllables;
  }
};

/**
 * GS_Validator: 判定ロジック
 */
const ThaiValidator = {

  resolveVowel: function(syl) {
    // デバッグ用: マスタに照合する直前の「ベース文字列」と「末子音」を出力
    console.log(`DEBUG: [${syl.full}] mainC: "${(syl.mainC || '') + syl.marks.filter(m => !/[่้๊๋์]/.test(m)).join('')}" lastC: "${syl.lastC}"`);
    
    // --- 0. Ro Han (รร) の強制割り込み処理 ---
    // Parserのフラグ漏れを防ぐため、文字面に 'รร' が含まれているかを物理検知する
    const isRoHanChar = syl.full.indexOf('รร') !== -1;

    if (isRoHanChar) {
      return { 
        sound: 'a', // Ro Han はデフォルトで短母音の 'a' を持つ
        length: 'short', 
        // Parser側 (resolveLogic) で「後ろに子音が続くから死音(Dead)」と
        // 判定されている場合はそれに従い、それ以外は生音(Live)とする
        type: (syl.sType === 'Dead') ? 'dead' : 'live' 
      };
    }

    // ==========================================
    // ★追加： ฤ / ฤๅ (Rue) のキメラ割り込み処理
    // ==========================================
    const hasRueMark = syl.marks.includes('ฤ');
    const isRueMain = syl.mainC === 'ฤ';

    if (hasRueMark || isRueMain) {
      const isLong = syl.marks.includes('ๅ') || syl.full.includes('ฤๅ');
      return {
        // ฤ は「ร＋母音」のキメラなので、母音側に r の音を仕込んでおく
        sound: 'rɯ', 
        length: isLong ? 'long' : 'short',
        // 短母音（ฤ）単独の場合は dead（死音）として扱う
        type: syl.lastC ? (ThaiMasterData.terminalGroups[syl.lastC] || 'Dead') : (isLong ? 'live' : 'dead')
      };
    }
    // ==========================================

    // --- 1. マスタ照合用の純粋なベース文字列を作成 ---
    // 声調記号(่้๊๋)と黙字記号(์)を徹底除去して、母音だけの構成にする
    const pure = syl.marks.filter(m => !/[่้๊๋์]/.test(m)).join('');
    const base = (syl.leadingV || '') + pure;
    
    // マスタ側の symbols (例: 'เ-ีย') からハイフン等を除去して比較可能にする関数
    const normalize = (str) => str.replace(/[-\s]/g, '');

    // --- 2. マスタ照合（最長一致の原則） ---
    // A: 記号 + 末子音 (เดี๋ยว のように 'ย' や 'ว' が母音に組み込まれるパターンを優先)
    const withLast = base + (syl.lastC || '');
    
    // 優先度1: 末子音を含めた形でマスタに存在するか
    // 優先度2: 母音記号のみでマスタに存在するか
    let rule = ThaiMasterData.vowelRules.find(r => normalize(r.symbols) === withLast) ||
               ThaiMasterData.vowelRules.find(r => normalize(r.symbols) === base);

    if (rule) {
      // 母音の一部として 'ย' や 'ว' が食われた場合（例: เีย + ว）
      // これを末子音として二重計算しないようフラグを立てる
      if (normalize(rule.symbols).endsWith(syl.lastC)) {
        syl.isVowelPart = true; 
      }
      return rule;
    }

    // --- 3. 最終フォールバック (マスタにない場合の推測) ---
    // 記号が何もなく、末子音だけがある場合 (例: คน の ค + น) は暗黙の短母音 'o'
    if (syl.lastC && !syl.isVowelPart) {
      return { sound: 'o', length: 'short', type: 'live' };
    }
    
    // 末子音すらなく、記号もない単独子音 (例: ะ が省略された形など) は暗黙の短母音 'a'
    return { sound: 'a', length: 'short', type: 'dead' };
  },

  /**
   * 声調計算ロジック (タイ語の絶対ルールに基づく)
   * 戻り値: 0(平), 1(低), 2(下), 3(高), 4(上)
   */
  getToneNumber: function(charClass, tMark, sType, vLength) {
    const vLen = (vLength || 'short').toLowerCase();
    
    // --- ルール1: 声調記号がある場合（最優先） ---
    // 子音のクラス（低級か、中/高級か）によって記号の意味が変わる
    if (tMark) {
        if (tMark === '่') return (charClass === 'Low') ? 2 : 1; // ่ : 低級なら下声(2)、他は低声(1)
        if (tMark === '้') return (charClass === 'Low') ? 3 : 2; // ้ : 低級なら高声(3)、他は下声(2)
        if (tMark === '๊') return 3;                            // ๊ : 常に高声(3) ※主に中級で使用
        if (tMark === '๋') return 4;                            // ๋ : 常に上声(4) ※主に中級で使用
    }

    // --- ルール2: 無記号・生音 (Live Sound) ---
    // 長母音で終わる、または末子音が生音(ง,น,ม,ย,ว)の場合
    if (sType.toLowerCase() === 'live') {
        // 高級子音なら上声(4)、中級・低級なら平声(0)
        return (charClass === 'High') ? 4 : 0; 
    }

    // --- ルール3: 無記号・死音 (Dead Sound) の 中級・高級 ---
    // 短母音で終わる、または末子音が死音(ก,ด,บ)の場合
    if (charClass === 'High' || charClass === 'Mid') {
        return 1; // 長さに関係なく一律で「低声(1)」
    }

    // --- ルール4: 無記号・死音 (Dead Sound) の 低級 ---
    // 低級子音の死音だけは、母音の長さで声調が分岐する
    // 短母音なら「高声(3)」、長母音なら「下声(2)」
    return (vLen === 'short') ? 3 : 2;
  }
};
