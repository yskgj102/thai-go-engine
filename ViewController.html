<script>
/**
 * ViewController: UI/UXの状態管理・アニメーション・物理ロックの司令塔
 * HTML要素の直接操作を一手に引き受け、AppStoreの状態を画面へ視覚的に反映させる。
 */
const ViewController = {

  /**
   * ヘッダーのActivity（本日の習得数）を更新
   */
  updateScoreUI: function() {
    const el = document.getElementById('correct-count');
    if (el) el.innerText = AppStore.state.todayScore; 
  },

  /**
   * カード描画前の物理リセット
   * 次のカードを表示する直前に、めくり要素(reveal-target)を隠し、フッターを下げる。
   */
  resetCardUI: function() {
    // 全ての「めくり後に表示される要素」を隠す
    document.querySelectorAll('.reveal-target').forEach(el => el.classList.add('hidden'));

    // ★ メモエリアを隠し、中身もリセット
    const memoArea = document.getElementById('memo-preview-area');
    const memoText = document.getElementById('memo-preview-text');
    if (memoArea) memoArea.classList.add('hidden');
    if (memoText) memoText.innerText = ""; // 前の単語のカスを消す
    
    document.getElementById('app-container').classList.remove('is-revealed');
    

    // フッター（解答ボタン）を隠し、クリックを無効化
    const footer = document.getElementById('footer-ui');
    if (footer) {
      footer.style.pointerEvents = 'none';
      footer.classList.add('translate-y-full'); 
    }
    
    // 「Tap to flip」のヒントを表示
    const hint = document.getElementById('tap-hint');
    if (hint) hint.classList.remove('hidden');
  },

  /**
   * 正解時や単語召喚時の視覚的フィードバック（フラッシュ演出）
   */
  playSuccessEffect: function() {
    const card = document.getElementById('word-card');
    if (card) {
      card.classList.add('success-flash');
      setTimeout(() => card.classList.remove('success-flash'), 400);
    }
  },

  /**
   * カードをめくった際のUIアニメーション
   * @param {boolean} isTargetThai - 現在の出題モードがタイ語メインかどうか
   */
  applyRevealUI: function(isTargetThai) {
    document.getElementById('app-container').classList.add('is-revealed');
    document.querySelectorAll('.reveal-target').forEach(el => el.classList.remove('hidden'));
    
    // 解答フッターをせり上げ、クリックを有効化
    const footer = document.getElementById('footer-ui');
    if (footer) {
      footer.style.pointerEvents = 'auto';
      footer.classList.remove('translate-y-full');
    }
    
    document.getElementById('tap-hint').classList.add('hidden');
    
      const ph = document.getElementById('phonetic');
      if (ph) ph.classList.remove('hidden');
  },

  /**
   * スクロール量に応じたヘッダーのトランスフォーム
   * 単語カードが画面外へ消えるタイミングで、ミニマルなヘッダー表示に切り替える。
   */
  handleHeaderTransform: function() {
    const wordCard = document.getElementById('word-card');
    if (!wordCard) return;
    const cardRect = wordCard.getBoundingClientRect();
    
    // 境界値(85px)を超えたら表示内容をスワップ
    const shouldSwap = cardRect.bottom < 85;
    if (shouldSwap !== AppStore.state.isHeaderSwapped) {
      AppStore.state.isHeaderSwapped = shouldSwap;
      this._applyHeaderUI(shouldSwap);
    }
  },

  /**
   * ヘッダーUIの内部的な切り替え処理（不透明度と位置のアニメーション）
   */
  _applyHeaderUI: function(isSwapped) {
    const inputArea = document.getElementById('header-input-area');
    const wordArea = document.getElementById('header-word-area');
    if (isSwapped) {
      // インプットを消し、現在の単語情報を出す
      inputArea.style.opacity = "0";
      inputArea.style.transform = "translateY(-16px)";
      inputArea.style.pointerEvents = "none";
      wordArea.style.opacity = "1";
      wordArea.style.transform = "translateY(0)";
      wordArea.style.pointerEvents = "auto";
      StudyEngine.syncHeader(); 
    } else {
      // 元の状態に戻す
      inputArea.style.opacity = "1";
      inputArea.style.transform = "translateY(0)";
      inputArea.style.pointerEvents = "auto";
      wordArea.style.opacity = "0";
      wordArea.style.transform = "translateY(16px)";
      wordArea.style.pointerEvents = "none";
    }
  },

  /**
   * 画面中央上部に通知を表示
   * @param {string} message - 表示する文字列
   * @param {string} type - success, warning, error のいずれか
   */
  showToast: function(message, type = "success") {
    const toast = document.createElement('div');
    const bgColor = type === "success" ? "bg-blue-500/90" : (type === "warning" ? "bg-amber-500/90" : "bg-rose-500/90");
    toast.className = `fixed top-24 left-1/2 -translate-x-1/2 ${bgColor} text-white text-[10px] font-black px-6 py-3 rounded-full shadow-2xl z-[100] backdrop-blur-md transition-all duration-500 opacity-0 translate-y-2`;
    toast.innerText = message;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-2'), 10);
    setTimeout(() => {
      toast.classList.add('opacity-0');
      setTimeout(() => toast.remove(), 500);
    }, 3000);
  },
  
  applyGlobalLock: function(message, isAllowList = false) {
    AppStore.state.isProcessing = true;
    if (message) this.showToast(message, "success");
  

    // 1. 【聖域化】bodyにクラスを付与（CSSが発動する）
    if (isAllowList) {
      document.body.classList.add('allow-list-active');
    } else {
      document.body.classList.remove('allow-list-active');
    }

    // 2. リスト更新（render内の pointerClass も一応そのまま活かす）
    VocabListUI.update(null, isAllowList); 

// 3. 【入力系】メモ帳と検索窓を除外するロジック
    document.querySelectorAll('input, textarea').forEach(el => {
      // 「メモ帳」または「検索窓」ならロックしない（そのまま通す）
      if (el.id === 'memo-textarea' || el.id === 'list-search') {
        el.readOnly = false;
        el.style.setProperty('opacity', '1', 'important');
        el.style.setProperty('pointer-events', 'auto', 'important');
      } else {
        // それ以外（通常の入力欄）はロック
        el.readOnly = true;
        el.style.setProperty('opacity', '0.4', 'important');
        el.style.setProperty('pointer-events', 'none', 'important');
      }
    });

    // 4. 【ボタン系】ここは今の「きいている」ループを維持
    document.querySelectorAll('button').forEach(b => {
      const onclick = (b.getAttribute('onclick') || "").toLowerCase();
      const isEssential = onclick.includes('copy') || onclick.includes('speak') || 
                          onclick.includes('toggle') || onclick.includes('bookmark') || onclick.includes('paste') || onclick.includes('memo');
      
      if (isEssential) {
        b.style.setProperty('pointer-events', 'auto', 'important');
        b.style.opacity = "1";
      } else {
        b.style.setProperty('pointer-events', 'none', 'important');
        b.style.setProperty('opacity', '0.4', 'important');
      }
    });
  },

  /**
   * 全ての物理ロックを解除
   */
  releaseLocks: function() {
    AppStore.state.isProcessing = false; 
    document.querySelectorAll('input, textarea, button').forEach(el => {
      el.readOnly = false;
      el.style.opacity = "";
      el.style.pointerEvents = "";
    });

    VocabListUI.update();
  },



  /**
   * 単語削除のリクエスト（誤操作防止の2段階タップ・安全装置付き）
   */
  requestDeleteCurrentWord: function(event) {
    if (event) event.stopPropagation();

    const btn = document.getElementById('delete-word-btn');
    const currentItem = AppStore.getCurrentItem();
    if (!currentItem || !btn) return;

    const isConfirming = btn.getAttribute('data-confirm') === 'true';

    if (isConfirming) {
      // 2回目：実際にBridge経由でサーバーへ削除命令を出す
      Bridge.deleteWordAndLogs(currentItem.id);
      
      // ボタンの状態リセット
      btn.setAttribute('data-confirm', 'false');
      btn.innerText = '× Destruct';
      btn.classList.remove('bg-red-500', 'text-white', 'opacity-100');
      btn.classList.add('text-red-500/30');
    } else {
      // 1回目：警告状態（赤背景）へ移行
      btn.setAttribute('data-confirm', 'true');
      btn.innerText = 'CONFIRM DELETE?';
      btn.classList.remove('text-red-500/30');
      btn.classList.add('bg-red-500', 'text-white', 'opacity-100', 'scale-110');
      
      // 3秒間放置で自動キャンセル
      setTimeout(() => {
        if (btn.getAttribute('data-confirm') === 'true') {
          btn.setAttribute('data-confirm', 'false');
          btn.innerText = '× Destruct';
          btn.classList.remove('bg-red-500', 'text-white', 'opacity-100', 'scale-110');
          btn.classList.add('text-red-500/30');
        }
      }, 3000);
    }
  },

  /**
   * テーマ（ダーク/ライト）の動的切り替え
   */
  toggleTheme: function() {
    const isLight = document.body.classList.toggle('light-mode');
    AppStore.state.isLightMode = isLight;
    
    const icon = document.getElementById('theme-icon');
    if (icon) icon.innerText = isLight ? '☀️' : '🌙';
    
    localStorage.setItem('thai-go-theme', isLight ? 'light' : 'dark');
    
    // iOS/Androidのブラウザ外枠の色を更新
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) {
      metaTheme.setAttribute('content', isLight ? '#f8fafc' : '#000000');
    }
  },

  /**
   * 起動時のテーマ初期化
   */
  initTheme: function() {
    if (localStorage.getItem('thai-go-theme') === 'light') {
      document.body.classList.add('light-mode');
      AppStore.state.isLightMode = true;
      const icon = document.getElementById('theme-icon');
      if (icon) icon.innerText = '☀️';
    }
  },

/**
   * ボキャブラリーパネルの開閉（検索フォーカス強制版）
   * 常にフォーカスを当てることで invokeQuickSearch を不要にする。
   */
  toggleVocabPanel: function(e) {
    if (e) e.stopPropagation();
    const panel = document.getElementById('vocab-panel');
    const searchInput = document.getElementById('list-search');

    if (panel.classList.contains('hidden')) {
      // --- OPEN ---
      panel.classList.remove('hidden'); 
      requestAnimationFrame(() => {
          panel.classList.add('is-open');
          AppStore.state.isVocabPanelOpen = true;
          VocabListUI.update();
          
          // 開く時は常にフォーカス（アニメーション完了を待たずに即準備）
          if (searchInput) {
            setTimeout(() => {
              searchInput.focus();
              searchInput.click(); 
              // 既存の文字があれば全選択、なければ即入力可能な状態に
              searchInput.setSelectionRange(0, searchInput.value.length);
            }, 300); 
          }
      });
      document.body.style.overflow = 'hidden';
    } else {
      // --- CLOSE ---
      panel.classList.remove('is-open');
      AppStore.state.isVocabPanelOpen = false;
      setTimeout(() => {
        panel.classList.add('hidden');
        document.body.style.overflow = '';
        if (searchInput) searchInput.blur();
      }, 300);
    }
  },

  /**
   * AppStoreから渡された単語情報をHTML各要素に反映
   */
  updateText: function(item, isThai) {
    const mapping = {
      'word-th': isThai ? (item.word_th || '---') : (item.meaning_ja || '---'),
      'meaning': isThai ? (item.meaning_ja || '---') : (item.word_th || '---'),
      'phonetic': isThai ? (item.phonetic || '---'):(item.meaning_kana || '---'),
      'category': item.category || '---',
      'ex-th': item.example_th || '---',
      'ex-phonetic': item.example_phonetic || '---',
      'ex-ja':  item.example_ja || '---',
      'note': item.explanation || ''
    };

    Object.entries(mapping).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.innerText = val;
    });
    
    const ph = document.getElementById('phonetic');
    if (ph) isThai ? ph.classList.remove('hidden') : ph.classList.add('hidden');
  },

  /**
   * 単語の忘却・学習間隔統計を画面に反映
   */
  updateStats: function(item) {
    const interval = item.interval || 0;
    const lastDate = (item.last_date && item.last_date !== 'New') 
      ? String(item.last_date).split(/[ T]/)[0] : 'New';

    document.getElementById('stat-interval').innerText = `Int: ${interval}d`;
    document.getElementById('stat-last').innerText = `Last: ${lastDate}`;
  },

  /**
   * 忘却度に応じたカラーボーダーの適用
   */
  updateBorder: function(item) {
    const card = document.getElementById('word-card');
    if (!card || !item) return;

    const color = StudyEngine.getColor(item); // StudyEngine側の判定ロジックに依存
    card.style.borderLeft = card.style.borderRight = `4px solid ${color}`;
  },

  /**
   * 全単語数のカウントアップ
   */
  updateTotalCount: function(count) {
    const el = document.getElementById('vocab-total-count');
    if (el) el.innerText = count || 0;
  },

  /**
   * ヒートマップエリアの表示切り替え
   */
  toggleStats: function() {
    const area = document.getElementById('stats-area');
    if (!area) return;
    const isOpening = area.classList.toggle('hidden');
    if (!isOpening){
       StudyEngine.renderHeatmap();
       // ルール表の描画（今回追加）
       StudyEngine.renderToneRules();
    }
  },

  /**
   * カスタム分割エディタの表示切り替え
   */
  toggleSplitEditor: function(id) {
    const el = document.getElementById(`editor-${id}`);
    if (el) {
      const isHidden = el.classList.toggle('hidden');
      if (!isHidden) {
        const input = document.getElementById(`input-${id}`);
        // 現在の解析がエラーなら、ヒントとして現在の単語を適当に割って入れるなどの処理も可能
        if (input) input.focus();
      }
    }
  },
toggleMemoSheet: function(show) {
    const sheet = document.getElementById('memo-sheet');
    const overlay = document.getElementById('memo-overlay');
    const textarea = document.getElementById('memo-textarea');
    
    // Bridgeから読み込まれた現在の単語データを取得
    const currentItem = AppStore.state.queue[AppStore.state.currentIndex];

    if (show && currentItem) {
      // 1. メモ内容をセット
      textarea.value = currentItem.memo || ""; 
      
      // 2. 表示
      overlay.style.display = 'block';
      setTimeout(() => sheet.classList.add('show'), 10);
      
      // 3. 入力しやすく
      textarea.focus();
    } else {
      // 閉じる処理
      sheet.classList.remove('show');
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 300);
      document.activeElement.blur();
    }
  },

  saveAndCloseMemo: function() {
    const text = document.getElementById('memo-textarea').value;
    const currentItem = AppStore.state.queue[AppStore.state.currentIndex];
    
    if (currentItem) {
      // GAS側保存実行
      Bridge.executeSaveMemo(currentItem.id, text);
      // メモリ上のデータを更新（再描画せずとも次回開いた時に反映される）
      currentItem.memo = text;
    }
    this.toggleMemoSheet(false);
  }
};

/**
 * グローバルリスナー: スクロールに応じたヘッダーアニメーションを監視
 */
window.addEventListener('scroll', () => {
  window.requestAnimationFrame(() => ViewController.handleHeaderTransform());
}, { passive: true });
</script>
