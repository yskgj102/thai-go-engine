<script>
const ChatSystem = {
  isWaiting: false,
  mode: 'translate', 

  toggleMode: function(newMode) {
    if (this.isWaiting) return;
    this.mode = newMode;
    
    const transBtn = document.getElementById('mode-translate-btn');
    const askBtn = document.getElementById('mode-ask-btn');
    const input = document.getElementById('chat-input');
    const quickPrompts = document.getElementById('chat-quick-prompts'); 
    
    if (newMode === 'translate') {
      transBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-blue-600 text-white shadow-sm transition-all";
      askBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-slate-500/10 text-slate-500 dark:text-slate-400 transition-all";
      input.placeholder = "こういう時なんていう？...";
      if (quickPrompts) quickPrompts.classList.add('hidden'); 
    } else {
      transBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-slate-500/10 text-slate-500 dark:text-slate-400 transition-all";
      askBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-purple-600 text-white shadow-sm transition-all";
      input.placeholder = "文法やニュアンスを質問する...";
      if (quickPrompts) quickPrompts.classList.remove('hidden'); 
    }
  },

  insertPrompt: function(text) {
    const inputEl = document.getElementById('chat-input');
    if (!inputEl) return;
    
    inputEl.value = text; 
    inputEl.focus();      
    
    inputEl.style.height = ''; 
    inputEl.style.height = inputEl.scrollHeight + 'px';
  },

  sendMessage: function() {
    if (this.isWaiting) return;

    const inputEl = document.getElementById('chat-input');
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    this.isWaiting = true;
    
    inputEl.disabled = true;
    inputEl.placeholder = "AIが思考中...";
    const btn = document.getElementById('chat-send-btn');
    if (btn) btn.classList.add('opacity-50', 'pointer-events-none');

    this.appendMessage('user', text);
    this.showLoading();

    if (this.mode === 'translate') {
      google.script.run
        .withSuccessHandler(response => {
          this.hideLoading();
          this.resetInput();
          if (response) {
            this.appendMessage('ai', response);
            this.extractAndRenderVocab(response); 
          } else {
            this.appendMessage('error', 'エラーが発生しました。');
          }
        })
        .withFailureHandler(err => {
          this.hideLoading();
          this.resetInput();
          this.appendMessage('error', '通信エラーが発生しました。');
        })
        .askTranslationTeacher(text); 
        
    } else {
      google.script.run
        .withSuccessHandler(response => {
          this.hideLoading();
          this.resetInput();
          if (response) {
            this.appendMessage('ai', response);
            this.extractAndRenderVocab(response); 
          } else {
            this.appendMessage('error', 'エラーが発生しました。');
          }
        })
        .withFailureHandler(err => {
          this.hideLoading();
          this.resetInput();
          this.appendMessage('error', '通信エラーが発生しました。');
        })
        .askGrammarQuestion(text); 
    }
  },

  resetInput: function() {
    this.isWaiting = false;
    const inputEl = document.getElementById('chat-input');
    inputEl.disabled = false;
    inputEl.placeholder = this.mode === 'translate' ? "こういう時なんていう？..." : "文法やニュアンスを質問する...";
    const btn = document.getElementById('chat-send-btn');
    if (btn) btn.classList.remove('opacity-50', 'pointer-events-none');
  },

  appendMessage: function(role, text) {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    
    if (role === 'user') {
      const formattedText = text.replace(/\n/g, '<br>');
      const safeDataText = encodeURIComponent(text);
      const isImage = text.includes('<img');

      div.className = "text-right mb-4 animate-in slide-in-from-right-4 fade-in duration-200 flex justify-end";
      
      div.innerHTML = `
        <div class="relative group bg-blue-600 text-white px-4 py-2.5 ${isImage ? '' : 'pb-7'} rounded-2xl rounded-tr-sm inline-block max-w-[80%] text-sm text-left shadow-sm">
          <div>${formattedText}</div>
          
          ${isImage ? '' : `
          <button 
            data-text="${safeDataText}"
            onclick="ChatUIHelper.copyText(this)"
            class="absolute bottom-1 right-2 p-1 rounded text-white/60 hover:text-white hover:bg-white/10 active:scale-95 transition-all opacity-60 hover:opacity-100 flex items-center"
            title="Copy your message"
          >
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
          `}
        </div>
      `;
      
    } else if (role === 'ai') {
      div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
      
      const htmlContent = typeof marked !== 'undefined' ? marked.parse(text) : text.replace(/\n/g, '<br>');
      const safeDataText = encodeURIComponent(text);

      div.innerHTML = `
        <div class="relative group bg-white dark:bg-white/10 text-slate-800 dark:text-white px-5 py-4 rounded-2xl rounded-tl-sm inline-block max-w-[95%] shadow-sm border border-slate-200 dark:border-white/5 pb-8">
          <div class="prose prose-sm prose-slate dark:prose-invert max-w-none leading-relaxed">
            ${htmlContent}
          </div>
          
          <button 
            data-text="${safeDataText}"
            onclick="ChatUIHelper.copyText(this)"
            class="absolute bottom-2 right-2 p-1.5 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-slate-100 dark:hover:bg-white/5 active:scale-95 transition-all opacity-60 hover:opacity-100 flex items-center gap-1"
            title="Copy to clipboard"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      `;
      
    } else {
      const formattedText = text.replace(/\n/g, '<br>');
      div.className = "text-center mb-4 animate-in fade-in duration-200";
      div.innerHTML = `<span class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl inline-block text-xs">${formattedText}</span>`;
    }
    
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  showLoading: function() {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    div.id = "chat-typing-indicator";
    div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
    div.innerHTML = `
      <span class="bg-white dark:bg-white/10 px-4 py-3 rounded-2xl rounded-tl-sm inline-flex items-center gap-1 shadow-sm border border-slate-200 dark:border-white/5">
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
      </span>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  hideLoading: function() {
    const indicator = document.getElementById('chat-typing-indicator');
    if (indicator) indicator.remove();
  },

  // 🌟 追加：マークダウンのテーブルに加えて、リスト形式からも単語を抽出する最強版
  extractAndRenderVocab: function(markdownText) {
    const words = [];
    
    // 1. テーブル形式からの抽出
    const tableRegex = /\|([^|]+)\|([^|]+)\|([^|]+)\|/g;
    let match;
    while ((match = tableRegex.exec(markdownText)) !== null) {
      const th = match[1].trim();
      const phonetic = match[2].trim();
      const ja = match[3].trim();
      if (th !== 'タイ語' && !th.includes('---')) {
        words.push({ th, phonetic, ja });
      }
    }

    // 2. リスト形式「タイ語 (発音記号): 日本語」からの抽出
    const listRegex = /([\u0E00-\u0E7F\s]+)\s*\(([^)]+)\)\s*[:：]\s*([^、,\n]+)/g;
    while ((match = listRegex.exec(markdownText)) !== null) {
      const th = match[1].trim();
      const phonetic = match[2].trim();
      const ja = match[3].trim();
      if (th && !words.find(w => w.th === th)) {
        words.push({ th, phonetic, ja });
      }
    }

    if (words.length > 0) {
      ChatUI.renderVocabularyList(words); 
    }
  },

  sendImage: function(input) {
    const file = input.files[0];
    if (!file || this.isWaiting) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const base64Data = e.target.result.split(',')[1];
      const fullBase64 = e.target.result; 
      
      this.isWaiting = true;
      this.showLoading();

      const imageHtml = `<img src="${fullBase64}" class="rounded-xl max-w-[200px] border border-white/10 shadow-md my-2" alt="upload">`;
      this.appendMessage('user', imageHtml);

      google.script.run
        .withSuccessHandler(response => {
          this.hideLoading();
          this.isWaiting = false;
          if (response) {
            this.appendMessage('ai', response);
            this.extractAndRenderVocab(response);
          }
          input.value = '';
        })
        .withFailureHandler(err => {
          this.hideLoading();
          this.isWaiting = false;
          this.appendMessage('error', '解析に失敗しました。');
        })
        .analyzeThaiImage(base64Data);
    };
    reader.readAsDataURL(file);
  },
};

const ChatUI = {
  // 🌟 追加：どこからでも使い回せるように targetId（出力先）と title（タイトル）を引数化
  renderVocabularyList: function(words, targetId = 'chat-action-panel', title = '📝 抽出された単語') {
    const container = document.getElementById(targetId);
    if (!container) return;

    // チャットと解説でIDが被らないように工夫
    const listId = `word-list-${targetId}`;
    const toggleBtnId = `toggle-list-btn-${targetId}`;

    let html = `
      <div class="rounded-2xl p-4 shadow-xl border flex flex-col mb-2 animate-in slide-in-from-bottom-5 transition-all" style="background: var(--bg-card); border-color: var(--border);">
        <div class="flex justify-between items-center shrink-0 cursor-pointer select-none active:opacity-70 transition-opacity" 
             onclick="const list = document.getElementById('${listId}'); list.classList.toggle('hidden'); const btn = document.getElementById('${toggleBtnId}'); btn.innerText = list.classList.contains('hidden') ? '開く ▼' : '閉じる ▲';">
          <h3 class="font-bold text-sm flex items-center gap-2" style="color: var(--text-main);">
            <span>${title.charAt(0)}</span> ${title.substring(1)}
          </h3>
          <div id="${toggleBtnId}" class="text-[10px] font-bold opacity-60 px-3 py-1.5 rounded-lg border transition-all flex items-center justify-center" style="background: var(--input-bg); color: var(--text-main); border-color: var(--border);">
            閉じる ▲
          </div>
        </div>
        <div class="space-y-2 overflow-y-auto custom-scrollbar pr-1 mt-3 max-h-[35vh]" id="${listId}">
    `;

    words.forEach((w, index) => {
      const safeTh = w.th.replace(/'/g, "\\'");
      const uniqueIdx = `${targetId}-${index}`; // ★これでID被りを完全に防ぐ
      html += `
        <div onclick="StudyEngine.speakSpecificText('${safeTh}')" 
             class="flex justify-between items-center p-3.5 rounded-2xl border shadow-sm cursor-pointer active:scale-[0.98] transition-transform" 
             style="background: var(--input-bg); border-color: var(--border);">
          
          <div class="flex-1 pr-3">
            <div class="flex items-center gap-2 mb-0.5">
              <div class="text-base font-bold text-blue-500 thai-font">${w.th}</div>
              <button onclick="event.stopPropagation(); navigator.clipboard.writeText('${safeTh}').then(() => typeof ViewController !== 'undefined' && ViewController.showToast('Copied!', 'success'))" 
                      class="text-[12px] opacity-40 hover:opacity-100 active:scale-125 transition-all text-blue-500" style="padding: 4px;">⧉</button>
            </div>
            <div class="text-xs" style="color: var(--text-sub);">${w.ja} <span class="text-[10px] opacity-60 ml-1 font-mono">${w.phonetic}</span></div>
          </div>
          
          <button id="add-btn-${uniqueIdx}" 
                  onclick="event.stopPropagation(); ChatUI.handleAddWord('${safeTh}', '${w.ja}', '${w.phonetic}', '${uniqueIdx}')"
                  class="bg-blue-600 active:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-md transition-all active:scale-95 flex items-center justify-center min-w-[75px]">
            <svg class="w-4 h-4 mr-1 animate-spin hidden" id="spinner-${uniqueIdx}" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="btn-text-${uniqueIdx}">追加</span>
          </button>
        </div>
      `;
    });

    html += `</div></div>`;
    container.innerHTML = html;

    // 登録済みの通信チェック
    words.forEach((w, index) => this.checkDuplicate(w.th, `${targetId}-${index}`));
  },

  checkDuplicate: function(wordTh, uniqueIdx) {
    const btn = document.getElementById(`add-btn-${uniqueIdx}`);
    const btnText = document.getElementById(`btn-text-${uniqueIdx}`);
    const spinner = document.getElementById(`spinner-${uniqueIdx}`);

    spinner.classList.remove('hidden');
    btnText.innerText = "";
    btn.classList.add('opacity-80', 'pointer-events-none');

    google.script.run
      .withSuccessHandler((isDuplicate) => {
        spinner.classList.add('hidden');
        if (isDuplicate) {
          btn.className = "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none opacity-50 border";
          btn.style.background = "var(--bg-card)";
          btn.style.color = "var(--text-sub)";
          btn.style.borderColor = "var(--border)";
          btnText.innerText = "登録済";
        } else {
          btn.classList.remove('opacity-80', 'pointer-events-none');
          btnText.innerText = "追加";
        }
      })
      .withFailureHandler(() => {
        spinner.classList.add('hidden');
        btn.classList.remove('opacity-80', 'pointer-events-none');
        btnText.innerText = "追加";
      })
      .existsInVocabulary(wordTh);
  },

  handleAddWord: function(th, ja, phonetic, uniqueIdx) {
    const btn = document.getElementById(`add-btn-${uniqueIdx}`);
    const btnText = document.getElementById(`btn-text-${uniqueIdx}`);
    const spinner = document.getElementById(`spinner-${uniqueIdx}`);

    btn.classList.add('pointer-events-none');
    spinner.classList.remove('hidden');
    btnText.innerText = "";

    if (navigator.vibrate) navigator.vibrate(15); 

    Bridge.addFromChat(th, function(isSuccess, isDuplicate) {
        spinner.classList.add('hidden');
        
        if (isSuccess) {
            btn.className = "bg-emerald-500/10 text-emerald-500 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none transition-all duration-300 border border-emerald-500/20";
            btnText.innerText = "完了！";
            if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
        } else if (isDuplicate) {
            btn.className = "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none opacity-50 border";
            btn.style.background = "var(--bg-card)";
            btn.style.color = "var(--text-sub)";
            btn.style.borderColor = "var(--border)";
            btnText.innerText = "登録済";
        } else {
            btn.classList.remove('pointer-events-none');
            btnText.innerText = "エラー";
        }
    });
  }
};

const ChatUIHelper = {
  copyText: function(buttonElement) {
    if (!navigator.clipboard) {
      if (typeof ViewController !== 'undefined') ViewController.showToast("Clipboard API not supported.", "error");
      return;
    }

    const textToCopy = decodeURIComponent(buttonElement.getAttribute('data-text'));

    navigator.clipboard.writeText(textToCopy).then(() => {
      const originalHTML = buttonElement.innerHTML;
      
      buttonElement.innerHTML = `<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
      buttonElement.classList.add('text-green-500');

      if (typeof ViewController !== 'undefined') ViewController.showToast("Copied!", "success");

      setTimeout(() => {
        buttonElement.innerHTML = originalHTML;
        buttonElement.classList.remove('text-green-500');
      }, 2000);
    }).catch(err => {
      console.error('Failed to copy: ', err);
      if (typeof ViewController !== 'undefined') ViewController.showToast("Copy failed.", "error");
    });
  }
};
</script>
