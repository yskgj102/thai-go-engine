<script>
const ChatSystem = {
  sendMessage: function() {
    const inputEl = document.getElementById('chat-input');
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    
    this.appendMessage('user', text);
    this.showLoading();

    google.script.run
      .withSuccessHandler(response => {
        this.hideLoading();
        if (response) {
          this.appendMessage('ai', response);
          this.extractAndRenderVocab(response);
        } else {
          this.appendMessage('error', 'エラーが発生しました。');
        }
      })
      .withFailureHandler(err => {
        this.hideLoading();
        this.appendMessage('error', '通信エラーが発生しました。');
      })
      .askTranslationTeacher(text);
  },

  appendMessage: function(role, text) {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    const formattedText = text.replace(/\n/g, '<br>');
    
    if (role === 'user') {
      div.className = "text-right mb-4 animate-in slide-in-from-right-4 fade-in duration-200";
      // ユーザーは青固定
      div.innerHTML = `<span class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-tr-sm inline-block max-w-[80%] text-sm text-left shadow-sm">${formattedText}</span>`;
    } else {
      div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
      // AIはアプリのテーマ変数に完全連動
      div.innerHTML = `<span class="px-4 py-2 rounded-2xl rounded-tl-sm inline-block max-w-[90%] text-sm shadow-sm border" style="background: var(--bg-card); color: var(--text-main); border-color: var(--border);">${formattedText}</span>`;
    }
    container.appendChild(div);
    // スクロールを一番下に
    setTimeout(() => container.scrollTop = container.scrollHeight, 50);
  },

  showLoading: function() { /* 必要に応じて実装 */ },
  hideLoading: function() { /* 必要に応じて実装 */ },

  extractAndRenderVocab: function(markdownText) {
    const tableRegex = /\|([^|]+)\|([^|]+)\|([^|]+)\|/g;
    let match;
    const words = [];
    
    while ((match = tableRegex.exec(markdownText)) !== null) {
      const th = match[1].trim();
      const phonetic = match[2].trim();
      const ja = match[3].trim();
      
      if (th !== 'タイ語' && !th.includes('---')) {
        words.push({ th, phonetic, ja });
      }
    }

    if (words.length > 0) {
      ChatUI.renderVocabularyList(words); 
    }
  }
};

const ChatUI = {
  renderVocabularyList: function(words) {
    const container = document.getElementById('chat-action-panel');
    if (!container) return;

    // 高さ制限(max-h-[40vh])とスクロール(overflow-y-auto)、閉じるボタンを追加
    let html = `
      <div class="rounded-2xl p-4 shadow-xl border flex flex-col max-h-[40vh] mb-2 animate-in slide-in-from-bottom-5" style="background: var(--bg-card); border-color: var(--border);">
        <div class="flex justify-between items-center mb-3 shrink-0">
          <h3 class="font-bold text-sm flex items-center gap-2" style="color: var(--text-main);">
            <span>📝</span> 抽出された単語
          </h3>
          <button onclick="document.getElementById('chat-action-panel').innerHTML=''" class="text-[10px] font-bold opacity-60 active:scale-90 px-3 py-1.5 rounded-lg border transition-all" style="background: var(--input-bg); color: var(--text-main); border-color: var(--border);">閉じる ×</button>
        </div>
        <div class="space-y-2 overflow-y-auto custom-scrollbar pr-1 pb-1" id="ios-word-list">
    `;

    words.forEach((w, index) => {
      html += `
        <div class="flex justify-between items-center p-3.5 rounded-2xl border shadow-sm" style="background: var(--input-bg); border-color: var(--border);">
          <div class="flex-1 pr-3">
            <div class="text-base font-bold text-blue-500 thai-font mb-0.5">${w.th}</div>
            <div class="text-xs" style="color: var(--text-sub);">${w.ja} <span class="text-[10px] opacity-60 ml-1 font-mono">${w.phonetic}</span></div>
          </div>
          
          <button id="add-btn-${index}" 
                  onclick="ChatUI.handleAddWord('${w.th}', '${w.ja}', '${w.phonetic}', ${index})"
                  class="bg-blue-600 active:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-md transition-all active:scale-95 flex items-center justify-center min-w-[75px]">
            <svg class="w-4 h-4 mr-1 animate-spin hidden" id="spinner-${index}" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="btn-text-${index}">追加</span>
          </button>
        </div>
      `;
    });

    html += `</div></div>`;
    container.innerHTML = html;

    words.forEach((w, index) => this.checkDuplicate(w.th, index));
  },

  checkDuplicate: function(wordTh, index) {
    const btn = document.getElementById(`add-btn-${index}`);
    const btnText = document.getElementById(`btn-text-${index}`);
    const spinner = document.getElementById(`spinner-${index}`);

    spinner.classList.remove('hidden');
    btnText.innerText = "";
    btn.classList.add('opacity-80', 'pointer-events-none');

    google.script.run
      .withSuccessHandler((isDuplicate) => {
        spinner.classList.add('hidden');
        if (isDuplicate) {
          // 登録済みカラー（CSS変数化）
          btn.className = "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none opacity-50 border";
          btn.style.background = "var(--bg-card)";
          btn.style.color = "var(--text-sub)";
          btn.style.borderColor = "var(--border)";
          btnText.innerText = "登録済";
        } else {
          btn.classList.remove('opacity-80', 'pointer-events-none');
          btnText.innerText = "追加";
        }
      })
      .withFailureHandler(() => {
        spinner.classList.add('hidden');
        btn.classList.remove('opacity-80', 'pointer-events-none');
        btnText.innerText = "追加";
      })
      .existsInVocabulary(wordTh);
  },

  handleAddWord: function(th, ja, phonetic, index) {
    const btn = document.getElementById(`add-btn-${index}`);
    const btnText = document.getElementById(`btn-text-${index}`);
    const spinner = document.getElementById(`spinner-${index}`);

    btn.classList.add('pointer-events-none');
    spinner.classList.remove('hidden');
    btnText.innerText = "";

    if (navigator.vibrate) navigator.vibrate(15); 

    Bridge.addFromChat(th, function(isSuccess, isDuplicate) {
        spinner.classList.add('hidden');
        
        if (isSuccess) {
            btn.className = "bg-emerald-500/10 text-emerald-500 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none transition-all duration-300 border border-emerald-500/20";
            btnText.innerText = "完了！";
            if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
        } else if (isDuplicate) {
            btn.className = "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none opacity-50 border";
            btn.style.background = "var(--bg-card)";
            btn.style.color = "var(--text-sub)";
            btn.style.borderColor = "var(--border)";
            btnText.innerText = "登録済";
        } else {
            btn.classList.remove('pointer-events-none');
            btnText.innerText = "エラー";
        }
    });
  }
};
</script>
