<script>
const ChatSystem = {
  isWaiting: false, // ★ 連投防止用のロックフラグ

  // チャットを送信する処理
  sendMessage: function() {
    if (this.isWaiting) return; // ★ 思考中なら連投をブロック

    const inputEl = document.getElementById('chat-input');
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    this.isWaiting = true; // ★ ロックオン
    
    // ★ 待機中のUI制御（入力不可にする）
    inputEl.disabled = true;
    inputEl.placeholder = "AIが思考中...";
    const btn = document.getElementById('chat-send-btn');
    if (btn) btn.classList.add('opacity-50', 'pointer-events-none');

    // 1. ユーザーの入力を画面に表示
    this.appendMessage('user', text);
    this.showLoading();

    // 2. GASのAPIを呼び出す
    google.script.run
      .withSuccessHandler(response => {
        this.hideLoading();
        this.resetInput(); // ★ ロック解除
        if (response) {
          this.appendMessage('ai', response);
          this.extractAndRenderVocab(response);
        } else {
          this.appendMessage('error', 'エラーが発生しました。');
        }
      })
      .withFailureHandler(err => {
        this.hideLoading();
        this.resetInput(); // ★ ロック解除
        this.appendMessage('error', '通信エラーが発生しました。');
      })
      .askTranslationTeacher(text);
  },

  // ★ ロックを解除して入力欄を元に戻す処理
  resetInput: function() {
    this.isWaiting = false;
    const inputEl = document.getElementById('chat-input');
    inputEl.disabled = false;
    inputEl.placeholder = "こういう時なんていう？...";
    const btn = document.getElementById('chat-send-btn');
    if (btn) btn.classList.remove('opacity-50', 'pointer-events-none');
    // すぐに次の質問ができるよう、自動でフォーカスを戻す（スマホの場合はソフトウェアキーボードが出ないよう適宜調整）
    // setTimeout(() => inputEl.focus(), 100); 
  },

  // 画面にメッセージを追加するUI処理
  appendMessage: function(role, text) {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    const formattedText = text.replace(/\n/g, '<br>');
    
    if (role === 'user') {
      div.className = "text-right mb-4 animate-in slide-in-from-right-4 fade-in duration-200";
      div.innerHTML = `<span class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-tr-sm inline-block max-w-[80%] text-sm text-left shadow-sm">${formattedText}</span>`;
    } else {
      div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
      div.innerHTML = `<span class="bg-white dark:bg-white/10 text-slate-800 dark:text-white px-4 py-2 rounded-2xl rounded-tl-sm inline-block max-w-[90%] text-sm shadow-sm border border-slate-200 dark:border-white/5">${formattedText}</span>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  // ★ LINE風の「考え中...」アニメーションを表示
  showLoading: function() {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    div.id = "chat-typing-indicator";
    div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
    
    // Tailwindの標準機能(animate-bounce)をズラして適用することで、3つの点が順番に跳ねる
    div.innerHTML = `
      <span class="bg-white dark:bg-white/10 px-4 py-3 rounded-2xl rounded-tl-sm inline-flex items-center gap-1 shadow-sm border border-slate-200 dark:border-white/5">
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
      </span>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  // ★ 回答が来たら「考え中...」を消す
  hideLoading: function() {
    const indicator = document.getElementById('chat-typing-indicator');
    if (indicator) {
      indicator.remove();
    }
  },

  extractAndRenderVocab: function(markdownText) {
    const tableRegex = /\|([^|]+)\|([^|]+)\|([^|]+)\|/g;
    let match;
    const words = [];
    
    while ((match = tableRegex.exec(markdownText)) !== null) {
      const th = match[1].trim();
      const phonetic = match[2].trim();
      const ja = match[3].trim();
      
      if (th !== 'タイ語' && !th.includes('---')) {
        words.push({ th, phonetic, ja });
      }
    }

    if (words.length > 0) {
      ChatUI.renderVocabularyList(words); 
    }
  }
};

const ChatUI = {
  renderVocabularyList: function(words) {
    const container = document.getElementById('chat-action-panel');
    if (!container) return;

    let html = `
      <div class="rounded-2xl p-4 shadow-xl border flex flex-col mb-2 animate-in slide-in-from-bottom-5 transition-all" style="background: var(--bg-card); border-color: var(--border);">
        <div class="flex justify-between items-center shrink-0 cursor-pointer select-none active:opacity-70 transition-opacity" 
             onclick="const list = document.getElementById('ios-word-list'); list.classList.toggle('hidden'); const btn = document.getElementById('toggle-list-btn'); btn.innerText = list.classList.contains('hidden') ? '開く ▼' : '閉じる ▲';">
          <h3 class="font-bold text-sm flex items-center gap-2" style="color: var(--text-main);">
            <span>📝</span> 抽出された単語
          </h3>
          <div id="toggle-list-btn" class="text-[10px] font-bold opacity-60 px-3 py-1.5 rounded-lg border transition-all flex items-center justify-center" style="background: var(--input-bg); color: var(--text-main); border-color: var(--border);">
            閉じる ▲
          </div>
        </div>
        <div class="space-y-2 overflow-y-auto custom-scrollbar pr-1 mt-3 max-h-[35vh]" id="ios-word-list">
    `;

    words.forEach((w, index) => {
      // 💡 音声読み上げ時にエラーが出ないよう、タイ語内のクォーテーションをエスケープ
      const safeTh = w.th.replace(/'/g, "\\'");

      // 💡 追加: onclick="StudyEngine.speakSpecificText(...)" をカード全体に設定
      // 💡 追加: cursor-pointer と active:scale-[0.98] でタップできる感を演出
      html += `
        <div onclick="StudyEngine.speakSpecificText('${safeTh}')" 
             class="flex justify-between items-center p-3.5 rounded-2xl border shadow-sm cursor-pointer active:scale-[0.98] transition-transform" 
             style="background: var(--input-bg); border-color: var(--border);">
          
          <div class="flex-1 pr-3">
            <div class="text-base font-bold text-blue-500 thai-font mb-0.5">${w.th}</div>
            <div class="text-xs" style="color: var(--text-sub);">${w.ja} <span class="text-[10px] opacity-60 ml-1 font-mono">${w.phonetic}</span></div>
          </div>
          
          <button id="add-btn-${index}" 
                  onclick="event.stopPropagation(); ChatUI.handleAddWord('${safeTh}', '${w.ja}', '${w.phonetic}', ${index})"
                  class="bg-blue-600 active:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-md transition-all active:scale-95 flex items-center justify-center min-w-[75px]">
            <svg class="w-4 h-4 mr-1 animate-spin hidden" id="spinner-${index}" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="btn-text-${index}">追加</span>
          </button>
        </div>
      `;
    });

    html += `</div></div>`;
    container.innerHTML = html;

    words.forEach((w, index) => this.checkDuplicate(w.th, index));
  },

  checkDuplicate: function(wordTh, index) {
    const btn = document.getElementById(`add-btn-${index}`);
    const btnText = document.getElementById(`btn-text-${index}`);
    const spinner = document.getElementById(`spinner-${index}`);

    spinner.classList.remove('hidden');
    btnText.innerText = "";
    btn.classList.add('opacity-80', 'pointer-events-none');

    google.script.run
      .withSuccessHandler((isDuplicate) => {
        spinner.classList.add('hidden');
        if (isDuplicate) {
          // 登録済みカラー（CSS変数化）
          btn.className = "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none opacity-50 border";
          btn.style.background = "var(--bg-card)";
          btn.style.color = "var(--text-sub)";
          btn.style.borderColor = "var(--border)";
          btnText.innerText = "登録済";
        } else {
          btn.classList.remove('opacity-80', 'pointer-events-none');
          btnText.innerText = "追加";
        }
      })
      .withFailureHandler(() => {
        spinner.classList.add('hidden');
        btn.classList.remove('opacity-80', 'pointer-events-none');
        btnText.innerText = "追加";
      })
      .existsInVocabulary(wordTh);
  },

  handleAddWord: function(th, ja, phonetic, index) {
    const btn = document.getElementById(`add-btn-${index}`);
    const btnText = document.getElementById(`btn-text-${index}`);
    const spinner = document.getElementById(`spinner-${index}`);

    btn.classList.add('pointer-events-none');
    spinner.classList.remove('hidden');
    btnText.innerText = "";

    if (navigator.vibrate) navigator.vibrate(15); 

    Bridge.addFromChat(th, function(isSuccess, isDuplicate) {
        spinner.classList.add('hidden');
        
        if (isSuccess) {
            btn.className = "bg-emerald-500/10 text-emerald-500 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none transition-all duration-300 border border-emerald-500/20";
            btnText.innerText = "完了！";
            if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
        } else if (isDuplicate) {
            btn.className = "px-4 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center min-w-[75px] pointer-events-none opacity-50 border";
            btn.style.background = "var(--bg-card)";
            btn.style.color = "var(--text-sub)";
            btn.style.borderColor = "var(--border)";
            btnText.innerText = "登録済";
        } else {
            btn.classList.remove('pointer-events-none');
            btnText.innerText = "エラー";
        }
    });
  }
};
</script>
