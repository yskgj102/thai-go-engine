<script>
const ChatSystem = {
  isWaiting: false,
  mode: 'translate', // ★追加: 初期モードは「翻訳」

  // ★追加: モード切替UIの制御
  toggleMode: function(newMode) {
    if (this.isWaiting) return; // 思考中は切り替え不可
    this.mode = newMode;
    
    const transBtn = document.getElementById('mode-translate-btn');
    const askBtn = document.getElementById('mode-ask-btn');
    const input = document.getElementById('chat-input');
    
    if (newMode === 'translate') {
      transBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-blue-600 text-white shadow-sm transition-all";
      askBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-slate-500/10 text-slate-500 dark:text-slate-400 transition-all";
      input.placeholder = "こういう時なんていう？...";
    } else {
      transBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-slate-500/10 text-slate-500 dark:text-slate-400 transition-all";
      askBtn.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-purple-600 text-white shadow-sm transition-all";
      input.placeholder = "文法やニュアンスを質問する...";
    }
  },

  sendMessage: function() {
    if (this.isWaiting) return;

    const inputEl = document.getElementById('chat-input');
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    this.isWaiting = true;
    
    inputEl.disabled = true;
    inputEl.placeholder = "AIが思考中...";
    const btn = document.getElementById('chat-send-btn');
    if (btn) btn.classList.add('opacity-50', 'pointer-events-none');

    this.appendMessage('user', text);
    this.showLoading();

    // ==========================================
    // 🌟 モードによって呼び出すGAS関数と後処理を分岐
    // ==========================================
    if (this.mode === 'translate') {
      // --- 既存ルート：翻訳して単語抽出 ---
      google.script.run
        .withSuccessHandler(response => {
          this.hideLoading();
          this.resetInput();
          if (response) {
            this.appendMessage('ai', response);
            this.extractAndRenderVocab(response); // テーブル解析してカード化UIを出す
          } else {
            this.appendMessage('error', 'エラーが発生しました。');
          }
        })
        .withFailureHandler(err => {
          this.hideLoading();
          this.resetInput();
          this.appendMessage('error', '通信エラーが発生しました。');
        })
        .askTranslationTeacher(text); // 既存の翻訳用関数
        
    } else {
      // --- 新規ルート：純粋な質問（解説のみ） ---
      google.script.run
        .withSuccessHandler(response => {
          this.hideLoading();
          this.resetInput();
          if (response) {
            this.appendMessage('ai', response);
            // 質問モードの時はテーブル解析（extractAndRenderVocab）は呼ばない
          } else {
            this.appendMessage('error', 'エラーが発生しました。');
          }
        })
        .withFailureHandler(err => {
          this.hideLoading();
          this.resetInput();
          this.appendMessage('error', '通信エラーが発生しました。');
        })
        .askGrammarQuestion(text); // ★新しく作るGAS関数
    }
  },

  resetInput: function() {
    this.isWaiting = false;
    const inputEl = document.getElementById('chat-input');
    inputEl.disabled = false;
    // モードに応じてプレースホルダーを戻す
    inputEl.placeholder = this.mode === 'translate' ? "こういう時なんていう？..." : "文法やニュアンスを質問する...";
    const btn = document.getElementById('chat-send-btn');
    if (btn) btn.classList.remove('opacity-50', 'pointer-events-none');
  },

  appendMessage: function(role, text) {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    const formattedText = text.replace(/\n/g, '<br>');
    
    if (role === 'user') {
      div.className = "text-right mb-4 animate-in slide-in-from-right-4 fade-in duration-200";
      div.innerHTML = `<span class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-tr-sm inline-block max-w-[80%] text-sm text-left shadow-sm">${formattedText}</span>`;
    } else if (role === 'ai') {
      div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
      // 質問モードの場合、回答が長文・箇条書きになる可能性が高いため markdown-body 系のクラスを当てるか、パディングを広めに取る
      div.innerHTML = `<span class="bg-white dark:bg-white/10 text-slate-800 dark:text-white px-4 py-3 rounded-2xl rounded-tl-sm inline-block max-w-[95%] text-sm shadow-sm border border-slate-200 dark:border-white/5 leading-relaxed">${formattedText}</span>`;
    } else {
      div.className = "text-center mb-4 animate-in fade-in duration-200";
      div.innerHTML = `<span class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl inline-block text-xs">${formattedText}</span>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  showLoading: function() {
    const container = document.getElementById('chat-messages-container');
    if (!container) return;
    
    const div = document.createElement('div');
    div.id = "chat-typing-indicator";
    div.className = "text-left mb-4 animate-in slide-in-from-left-4 fade-in duration-200";
    div.innerHTML = `
      <span class="bg-white dark:bg-white/10 px-4 py-3 rounded-2xl rounded-tl-sm inline-flex items-center gap-1 shadow-sm border border-slate-200 dark:border-white/5">
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
        <span class="w-1.5 h-1.5 bg-slate-400 dark:bg-white/50 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
      </span>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  hideLoading: function() {
    const indicator = document.getElementById('chat-typing-indicator');
    if (indicator) indicator.remove();
  },

  extractAndRenderVocab: function(markdownText) {
    const tableRegex = /\|([^|]+)\|([^|]+)\|([^|]+)\|/g;
    let match;
    const words = [];
    
    while ((match = tableRegex.exec(markdownText)) !== null) {
      const th = match[1].trim();
      const phonetic = match[2].trim();
      const ja = match[3].trim();
      
      if (th !== 'タイ語' && !th.includes('---')) {
        words.push({ th, phonetic, ja });
      }
    }

    if (words.length > 0) {
      ChatUI.renderVocabularyList(words); 
    }
  }
};
</script>
