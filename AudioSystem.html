<script>
/**
 * AudioSystem: ブラウザのSpeechSynthesis（音声合成API）を制御する専門ユニット
 * 学習エンジンのロジックから切り離され、「テキストを音に変換する」実務のみを担当する。
 */

const AudioSystem = {
  currentCloudAudio: null,

  /**
   * 🌟 連続再生エンジン専用：再生完了を待機できる非同期関数
   */
  playAsync: function(text, lang, rate) {
    return new Promise((resolve) => {
      // 実際の発火。終わったら resolve() を呼ぶように仕込む
      this.play(text, lang, rate, () => {
        resolve(); 
      });
    });
  },

  /**
   * 音声再生のルーター
   */
  play: function(text, lang, rate, onEnd = null) {
    if (!text || text === '---') {
      if (onEnd) onEnd();
      return;
    }

    if (AppStore.state.isCloudTTS) {
      Bridge.fetchCloudAudio(text, lang, rate, onEnd);
    } else {
      this.playBrowserTTS(text, lang, rate, onEnd);
    }
  },

  /**
   * Cloud TTS 再生ロジック
   */
  playCloudAudio: function(base64Audio, rate, onEnd) {
    try {
      if (this.currentCloudAudio) {
        this.currentCloudAudio.pause();
        this.currentCloudAudio.onended = null; 
        this.currentCloudAudio.onerror = null;
      }
      window.speechSynthesis.cancel(); 

      const audio = new Audio("data:audio/mp3;base64," + base64Audio);
      this.currentCloudAudio = audio;
      audio.playbackRate = rate; 
      
      audio.onended = () => { 
        this.currentCloudAudio = null;
        if (onEnd) onEnd(); 
      };
      audio.onerror = () => { 
        this.currentCloudAudio = null;
        if (onEnd) onEnd(); 
      };
      
      audio.play().catch(() => {
        this.currentCloudAudio = null;
        if (onEnd) onEnd();
      });
    } catch (e) {
      if (onEnd) onEnd();
    }
  },

  /**
   * ブラウザ標準TTS
   */
  playBrowserTTS: function(text, lang, rate, onEnd = null) {
    if (this.currentCloudAudio) {
      this.currentCloudAudio.pause();
      this.currentCloudAudio = null;
    }
    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = rate;
    
    if (onEnd) {
      u.onend = () => { onEnd(); };
      u.onerror = (e) => {
        if (e.error === 'interrupted') return; 
        onEnd();
      };
    }
    window.speechSynthesis.speak(u);
  },

  toggleTTSMode: function() {
    AppStore.state.isCloudTTS = !AppStore.state.isCloudTTS;
    const btn = document.getElementById('tts-mode-btn');
    if (btn) {
      btn.innerText = AppStore.state.isCloudTTS ? "☁️" : "🤖";
      btn.className = AppStore.state.isCloudTTS ? "text-xl text-blue-500 opacity-100" : "text-xl opacity-100";
      ViewController.showToast(`Mode: ${AppStore.state.isCloudTTS ? 'Cloud' : 'Browser'}`, "success");
    }
  }
};
</script>
