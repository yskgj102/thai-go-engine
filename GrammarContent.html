          section.id = `grammar-${chapter.id}`;

          const itemNav = chapter.items.map((item, itemIndex) => {
            const itemId = `grammar-${chapter.id}-i${String(itemIndex + 1).padStart(2, "0")}`;
            return `<a class="item-chip" href="#${itemId}" data-open-target>${esc(item.title)}</a>`;
          }).join("");

          const itemsHtml = chapter.items.map((item, itemIndex) => {
            const itemId = `grammar-${chapter.id}-i${String(itemIndex + 1).padStart(2, "0")}`;
            registerTitle(item.title, itemId, chapter.id);

            const searchText = [
              chapter.title, chapter.desc, item.title, item.gist,
              item.thai, item.ja, item.note, ...(item.related || []), ...(item.tags || [])
            ].join(" ");

            const relatedHtml = (item.related || []).map(term => {
              return `<button type="button" class="rel" data-related="${esc(term)}" data-source-chapter="${esc(chapter.id)}">${esc(term)}</button>`;
            }).join("");

            return `
              <details class="grammar-item" id="${itemId}" data-search="${esc(searchText)}" data-title="${esc(item.title)}" data-chapter="${esc(chapter.id)}">
                <summary>
                  <span class="item-title">${esc(item.title)}</span>
                  <span class="item-summary">${esc(firstSentence(item.gist))}</span>
                </summary>
                <div class="item-body">
                  <section class="block">
                    <h3>要点</h3>
                    <p>${esc(item.gist)}</p>
                  </section>
                  <section class="example">
                    <h3>例文</h3>
                    <p class="thai" lang="th">${esc(item.thai)}</p>
                    <p class="translation">${esc(item.ja)}</p>
                  </section>
                  <section class="block note">
                    <h3>ポイント</h3>
                    <p>${esc(item.note)}</p>
                  </section>
                  <section class="block related">
                    <h3>関連</h3>
                    <div class="related-list">${relatedHtml}</div>
                  </section>
                </div>
              </details>
            `;
          }).join("");

          section.innerHTML = `
            <details class="chapter-details">
              <summary class="chapter-summary">
                <span class="chapter-title">${esc(chapter.title)}</span>
                <span class="chapter-count">${chapter.items.length}項目</span>
                <p class="chapter-lead">${esc(chapter.desc)}</p>
              </summary>
              <div class="chapter-body">
                <nav class="item-nav" aria-label="${esc(chapter.title)}の項目">${itemNav}</nav>
                ${itemsHtml}
              </div>
            </details>
          `;

          content.appendChild(section);
        });
      }

      function updateSearch() {
        const q = normalize(search.value);
        let visibleCount = 0;

        const wrapper = document.getElementById("grammar-ref-wrapper");

        wrapper.querySelectorAll(".grammar-item").forEach(item => {
          const target = normalize(item.dataset.search);
          const hit = !q || target.includes(q);
          item.hidden = !hit;

          if (hit) {
            visibleCount += 1;
          }

          if (q && hit) {
            item.open = true;
            const chapter = item.closest(".chapter-details");
            if (chapter) chapter.open = true;
          }
        });

        wrapper.querySelectorAll(".chapter").forEach(chapter => {
          const hasVisibleItem = Array.from(chapter.querySelectorAll(".grammar-item")).some(item => !item.hidden);
          chapter.hidden = !hasVisibleItem;
        });

        count.textContent = q ? `${visibleCount}件` : `${total}項目`;
      }

      function resetFilter() {
        search.value = "";
        updateSearch();
      }

      // ==========================================
      // 🌟 修正：スクロールをボトムシート内だけに閉じ込める
      // ==========================================
      function openItem(item) {
        if (!item) return;

        const chapterDetails = item.closest(".chapter-details");
        if (chapterDetails) chapterDetails.open = true;

        item.open = true;
        item.hidden = false;

        const chapter = item.closest(".chapter");
        if (chapter) chapter.hidden = false;

        setTimeout(() => {
          // ブラウザ標準の scrollIntoView ではなく、コンテナ内の相対位置を計算してスクロール
          const scrollContainer = document.getElementById("grammar-content-area");
          if (scrollContainer) {
            const containerRect = scrollContainer.getBoundingClientRect();
            const itemRect = item.getBoundingClientRect();
            const scrollTop = scrollContainer.scrollTop + (itemRect.top - containerRect.top) - 20; // 20pxの余白
            scrollContainer.scrollTo({ top: scrollTop, behavior: "smooth" });
          }
        }, 40);

        // URLハッシュの変更はアプリの予期せぬ動作を招くため削除（コメントアウト）
        // try { history.replaceState(null, "", `#${item.id}`); } catch (e) {}
      }

      function jumpToRelated(term, sourceChapterId) {
        const matches = titleIndex.get(term) || [];

        if (matches.length > 0) {
          const preferred =
            matches.find(match => match.chapterId === sourceChapterId) ||
            matches[0];

          resetFilter();
          const item = document.getElementById(preferred.id);
          openItem(item);
          return;
        }

        search.value = term;
        updateSearch();
        
        // 検索窓へのスクロールもコンテナ内でおこなう
        const scrollContainer = document.getElementById("grammar-content-area");
        if (scrollContainer) {
          scrollContainer.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      render();

      search.addEventListener("input", updateSearch);

      openAll.addEventListener("click", () => {
        const wrapper = document.getElementById("grammar-ref-wrapper");
        wrapper.querySelectorAll("details").forEach(details => {
          details.open = true;
        });
      });

      closeAll.addEventListener("click", () => {
        const wrapper = document.getElementById("grammar-ref-wrapper");
        wrapper.querySelectorAll(".grammar-item, .chapter-details").forEach(details => {
          details.open = false;
        });
      });

      clearSearch.addEventListener("click", () => {
        resetFilter();
        search.focus();
      });

      // ==========================================
      // 🌟 修正：ブラウザの勝手なジャンプ（ガタつき）を阻止
      // ==========================================
      const wrapper = document.getElementById("grammar-ref-wrapper");
      wrapper.addEventListener("click", event => {
        const related = event.target.closest("[data-related]");
        if (related) {
          event.preventDefault(); // デフォルト動作をブロック
          jumpToRelated(related.dataset.related, related.dataset.sourceChapter);
          return;
        }

        const link = event.target.closest("a[data-open-target]");
        if (!link) return;

        event.preventDefault(); // ★ここで勝手なページ内ジャンプを完全ブロック！

        const target = document.querySelector(link.getAttribute("href"));
        if (!target) return;

        if (target.classList.contains("chapter")) {
          const details = target.querySelector(".chapter-details");
          if (details) details.open = true;
          
          // 章へのジャンプもコンテナ内のスクロールに変換
          setTimeout(() => {
            const scrollContainer = document.getElementById("grammar-content-area");
            if (scrollContainer) {
              const containerRect = scrollContainer.getBoundingClientRect();
              const targetRect = target.getBoundingClientRect();
              const scrollTop = scrollContainer.scrollTop + (targetRect.top - containerRect.top) - 20;
              scrollContainer.scrollTo({ top: scrollTop, behavior: "smooth" });
            }
          }, 40);
        }

        if (target.classList.contains("grammar-item")) {
          resetFilter();
          openItem(target);
        }
      });

    })();
  </script>
</div>
