  <script>
    window.onload = () => {
      console.log("[System] Hybrid Engine Active. Data: 2026 / Logic: Legacy.");
      ViewController.initTheme(); // テーマを先に適用（画面のチラつき防止）
      // 新 Bridge で初期ロード開始
      Bridge.initialize();

      // クイック追加などのイベントは新 Bridge へ統合
      const quickInput = document.getElementById('quick-input');
      const quickBtn = document.getElementById('quick-add-btn');
      if (quickBtn) quickBtn.onclick = () => Bridge.executeQuickAdd();
      if (quickInput) {
        quickInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') Bridge.executeQuickAdd();
        });
      }
    };
  </script>
