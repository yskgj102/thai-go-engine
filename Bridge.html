/**
 * Bridge: サーバー(GAS)とフロントエンド(AppStore)を繋ぐ通信ハブ
 * データの取得、保存、削除、AI生成のリクエストを一手に引き受け、
 * サーバー側のレスポンスを AppStore の状態に反映させる。
 */
const Bridge = {
  
  /**
   * アプリ起動時の初期データロード
   * 今日のスコアと全学習データを非同期で取得し、初期描画を開始する。
   */
  initialize: function() {
    console.log("[Bridge] Requesting initial data...");
    

    // --- 追加：タイ語解析用マスタの取得 ---
    google.script.run.withSuccessHandler(masterRes => {
      // 前の工程で作った「展開関数」をここで実行
      initializeThaiMaster(masterRes); 
      console.log("[Bridge] Thai Master Data Loaded.");
    }).getThaiMasterFull();
    
    // 1. 本日の学習済み件数（Activity）を取得
    google.script.run.withSuccessHandler(count => {
      AppStore.update('todayScore', count);
      ViewController.updateScoreUI();
    }).getTodayScore();

    // 2. 学習メインデータ（忘却曲線アルゴリズム適用済みリスト）を取得
    google.script.run.withSuccessHandler(res => {
      if (!res) return;

      // 新基盤 (AppStore) に全2万件のマスターデータをセット
      AppStore.update('allVocab', res);

      // 初期出題キュー（queue）を構築
      this._refreshQueue(res);

      // 学習画面の初回描画
      StudyEngine.render();

      // UI部品（総件数表示、辞書リスト）を最新状態に更新
      ViewController.updateTotalCount(res.length);
      VocabListUI.update();
VocabListUI.renderCategoryBar()
// --- ★ ここからスプラッシュ画面を消す演出 ---
      
      // データが届いたので、スピナーを隠す
      document.getElementById('loader')?.classList.add('hidden');
      const container = document.getElementById('card-container');
      if (container) {
        container.classList.remove('hidden');
        container.style.opacity = '1';
      }

      // スプラッシュ画面を「いけてる感じ」にフェードアウトさせる
      const splash = document.getElementById('splash-screen');
      if (splash) {
        // データ読み込み後、一瞬「タメ」を作ると高級感が出ます
        setTimeout(() => {
          splash.classList.add('splash-fade-out');
          setTimeout(() => splash.remove(), 800); // アニメーション終了後にDOM削除
          console.log("[Bridge] Splash cleared. Application Ready.");
        }, 800); 
      }
      console.log("[Bridge] Sync Complete.");
    }).getSpacedRepetitionData();
  },

  /**
   * 学習結果（自己評価）のサーバー保存
   * @param {string} id - 単語ID
   * @param {number} rating - 評価スコア(1-3)
   */
  saveLog: function(id, rating) {
    google.script.run.withSuccessHandler(() => {
      // 成功時、メモリ上の本日のスコアを+1してUIを即時更新
      const newScore = AppStore.state.todayScore + 1;
      AppStore.update('todayScore', newScore);
      ViewController.updateScoreUI();
    }).saveLearningLog(id, rating);
  },

  /**
   * 内部用：出題キュー（queue）の構築
   * モード設定（Smart/Classic）に応じて、データの並び順を決定する。
   */
  _refreshQueue: function(allData) {
    let newQueue = [];
    const isSmart = AppStore.state.isSmart;

    if (isSmart) {
      // Smartモード：サーバーから届いた忘却優先度順を維持
      newQueue = [...allData]; 
    } else {
      // Classicモード：純粋なランダムシャッフル
      newQueue = [...allData].sort(() => Math.random() - 0.5);
    }

    // 更新されたキューを AppStore に反映し、インデックスを先頭に戻す
    AppStore.update('queue', newQueue);
    AppStore.update('currentIndex', 0);
  },

  /**
   * クイック追加の実行
   * ヘッダーの入力欄、または検索結果の「Add to List」ボタンからのリクエストを処理。
   */
  executeQuickAdd: function(optionalVal) {
    const input = document.getElementById('quick-input');

    if (optionalVal && input) {
      input.value = optionalVal;
    }
    const val = optionalVal || (input ? input.value.trim() : "");

    if (!val || AppStore.state.isProcessing) return;

    // UIをロックし、追加中であることを通知
    ViewController.applyGlobalLock("Adding word ...");

    google.script.run
      .withSuccessHandler(res => {
        // 全体ロックを解除
        ViewController.releaseLocks();
        
        if (res.status === "duplicate") {
          ViewController.showToast(`Already exists.`, "warning");
          if (AppStore.state.isVocabPanelOpen) {
            ViewController.toggleVocabPanel(); 
          }
        } else {
          ViewController.showToast(`Added successfully!`, "success");
          
          // メモリ上のマスターデータ(allVocab)の先頭に追加して同期
          AppStore.state.allVocab.unshift(res.data);
          AppStore.state.queue.splice(AppStore.state.currentIndex + 1, 0, res.data);
          ViewController.updateTotalCount(AppStore.state.allVocab.length);
          VocabListUI.update();
          VocabListUI.renderCategoryBar()
        }
        
        if (input) input.value = ''; 
        // 追加（または重複確認）した単語を即座にカードとして召喚
        StudyEngine.jumpToWordFromId(res.data.id);
      })
      .withFailureHandler(() => {
        ViewController.releaseLocks();
        ViewController.showToast("Network Error.", "error");
      })
      .quickAddAutoFill(val);
  },

  //          // 画面を再描画して新しい内容を反映

reGenerate: function(id) {
    if (!id || AppStore.state.isProcessing) return;
    
    const btn = document.getElementById('re-gen-btn');
    const originalText = "AI Re-Generate";

    // 1. ロック開始
    ViewController.applyGlobalLock("AI is working...", true);
    btn.innerText = "Thinking..."; 

    // 2. 例外解除（Footer & List）
    const activeTargets = [
      '#footer-ui button', 
      '#memo-sheet',        // ★シート本体を追加
  '#memo-sheet *',      // ★シートの中にある textarea や Doneボタンすべて
  '#memo-overlay'       // ★シート用の背景
    // '#vocab-list-container *'
    ];
    activeTargets.forEach(selector => {
      document.querySelectorAll(selector).forEach(el => {
        el.style.setProperty('pointer-events', 'auto', 'important');
        el.style.setProperty('opacity', '1', 'important');
      });
    });

    // ★ 共通の「帰り道」ロジック：生存確認してJUMP
    const finalizeAndJump = () => {
      const masterIdx = AppStore.state.allVocab.findIndex(v => v.id === id);
      if (masterIdx !== -1) {
        StudyEngine.jumpToWordFromId(id);
      }
    };

    google.script.run
      .withSuccessHandler((newAiData) => {
        ViewController.releaseLocks();

        if (newAiData) {
          const masterIdx = AppStore.state.allVocab.findIndex(v => v.id === id);
          if (masterIdx !== -1) {
            Object.assign(AppStore.state.allVocab[masterIdx], newAiData);
            ViewController.showToast("AI Content Refreshed!", "success");
                    // 成功ルートで戻る
        finalizeAndJump();
            if (btn) {
              btn.innerText = "Updated!";
              btn.classList.add('text-green-500');
            }
          }
        } else {
          ViewController.showToast("AI Quota exceeded.", "warning");
          if (btn) btn.innerText = "AI Busy / Limit";
        }


        Bridge._startReGenCooldown(btn, originalText);
      })
      .withFailureHandler(err => {
        ViewController.releaseLocks();
        ViewController.showToast("System error.", "error");
        
        // ★ 失敗ルートでも戻る（生存していれば）
        // finalizeAndJump();
        
        if (btn) {
          btn.disabled = false;
          btn.innerText = originalText;
        }
      })
      .reGenerateCardById(id);
  },
  /**
   * 単語データおよび学習ログの完全抹消
   */
  deleteWordAndLogs: function(id) {
    // if (!id || AppStore.state.isProcessing) return;
    if (!id ) return;

    ViewController.applyGlobalLock("Destructing word data...");

    google.script.run
      .withSuccessHandler(res => {
        ViewController.releaseLocks();

        if (res.status === "success") {
          ViewController.showToast("Master & Logs Cleaned.", "success");
          
          // メモリ上の全データおよび現在のキューから対象IDを除去（即時反映）
          const updatedAll = AppStore.state.allVocab.filter(v => v.id !== id);
          const updatedQueue = AppStore.state.queue.filter(v => v.id !== id);
          
          AppStore.update('allVocab', updatedAll);
          AppStore.update('queue', updatedQueue);
          
          // 表示位置（インデックス）の整合性を調整
          if (AppStore.state.currentIndex >= updatedQueue.length) {
            AppStore.update('currentIndex', 0);
          }
          
          // 画面を次のカードへ更新
          StudyEngine.render();
          ViewController.updateTotalCount(updatedAll.length);
          VocabListUI.update();
          VocabListUI.renderCategoryBar()
        } else {
          ViewController.showToast(res.message, "error");
        }
      })
      .withFailureHandler(() => {
        ViewController.releaseLocks();
        ViewController.showToast("Network Error during deletion.", "error");
      })
      .deleteWordAndLogs(id);
  },
  
  /** * 内部用：再生成ボタンのカウントダウン制御 
   */
  _startReGenCooldown: function(btn, originalText) {
    btn.disabled = true;
    btn.style.opacity = "0.3";
    let timeLeft = 20;
    const timer = setInterval(() => {
      timeLeft--;
      btn.innerText = `Wait ${timeLeft}s`;
      
      if (timeLeft <= 0) {
        clearInterval(timer);
        btn.disabled = false;
        btn.innerText = originalText;
        btn.classList.remove('text-green-500');
        btn.style.opacity = "0.3"; 
        // ViewController.showToast("Re-Gen Ready.", "success");
      }
    }, 1000);
  },
/**
   * ブックマークのトグル（外科手術方式）
   * ロック中も即座に反応し、画面全体のリセット(render)を避ける。
   */
  executeToggleBookmark: function(id) {
    // 1. メモリ上のデータを即座に書き換え
    const item = AppStore.state.allVocab.find(v => v.id === id);
    if (!item) return;

    const isBM = !(item.is_bookmark === true || String(item.is_bookmark).toLowerCase() === "true");
    item.is_bookmark = isBM;

    // 2. 【外科手術】render() を呼ばず、画面上の「星」だけを直接狙い撃ちして書き換える
    const btn = document.getElementById('bookmark-btn');
    const icon = document.getElementById('card-bookmark-icon');
    
    if (btn && icon) {
      if (isBM) {
        icon.innerText = "★";
        btn.classList.add('is-gold');
      } else {
        icon.innerText = "☆";
        btn.classList.remove('is-gold');
      }
    }

    // 3. GASへ送信（これはロック中もキューに入るので問題なし）
    google.script.run.toggleBookmark(id);
    
    // 手応えとしての振動
    if (window.navigator.vibrate) window.navigator.vibrate(5);
  },
executeSaveSplit: function(id) {
    const input = document.getElementById(`input-${id}`);
    if (!input) return;

    // スペース区切りを掃除
    const rawVal = input.value.replace(/　/g, ' ').replace(/\s+/g, ' ').trim();
    
    let jsonStr = null;
    let splitArray = null;

    if (rawVal === "") {
        // 【重要】空入力なら削除（null）として扱う
        jsonStr = null; 
        splitArray = null;
    } else {
        // 入力があれば通常通り配列化
        splitArray = rawVal.split(' ');
        jsonStr = JSON.stringify(splitArray);
    }

    ViewController.applyGlobalLock("Updating Dictionary...", true);

    google.script.run
      .withSuccessHandler(res => {
        ViewController.releaseLocks();
        if (res && res.status === "success") {
          // 1. メモリ上のデータを更新
          const item = AppStore.state.allVocab.find(v => String(v.id) === String(id));
          if (item) {
            // custom_split を新データ（またはnull）で上書き
            item.custom_split = splitArray; 
            
            // 現在のアイテムも同期
            if (String(AppStore.state.currentItemId) === String(id)) {
              AppStore.state.currentItem = item;
            }

            // 2. 再描画（これで、nullなら「緑色/正常」、値ありなら「青色/辞書」に切り替わる）
            StudyEngine.renderAnalysis(); 
            
            const msg = splitArray ? "Updated successfully!" : "Custom split deleted.";
            ViewController.showToast(msg, "success");
          }
        } else {
          ViewController.showToast("Save failed.", "error");
        }
      })
      .withFailureHandler(err => {
        ViewController.releaseLocks();
        ViewController.showToast("Network Error.", "error");
      })
      .updateCustomSplit(id, jsonStr); 
  },

// Bridge.js 内
executeSaveMemo: function(id, text) {
  if (!id) return;

  google.script.run
    .withSuccessHandler(res => {
      if (res.status === "success") {
        // 1. 全データ(allVocab)の中から対象を更新
        const item = AppStore.state.allVocab.find(v => String(v.id) === String(id));
        if (item) {
          item.memo = text; // ここで空文字がセットされる
        }

        // 2. ★重要：今表示しているカードが「保存した単語」なら、即座に見た目を更新
        const currentItem = AppStore.getCurrentItem();
        if (currentItem && String(currentItem.id) === String(id)) {
          // メモが空なら隠し、あれば表示するロジックを強制実行
          StudyEngine.updateMemoPreview(currentItem);
        }

        // ViewController.showToast(text ? "Memo saved" : "Memo cleared", "success");
      }
    })
    .updateWordMemo(id, text);
},
/**
   * メモ欄のテキストをAIに送信し、回答を追記して保存する
   */
  executeAskAi: function() {
    const item = AppStore.getCurrentItem();
    const textarea = document.getElementById('memo-textarea');
    if (!item || !textarea) return;

    const fullText = textarea.value.trim();
    if (!fullText) {
      ViewController.showToast("Please write something first.", "warning");
      return;
    }

    // --- ★ 追加：表示テキスト・区切り文字の共通化（一元管理） ---
    const AI_BTN_TEXT = "🪄 Ask AI";
    const AI_LOADING_TEXT = "Thinking...";
    const AI_DELIMITER = `\n\n--- ${AI_BTN_TEXT} ---\n`;
    // -------------------------------------------------------------

    // デリミタ（区切り文字）で分割し、過去のAIの回答（下半分）を切り捨てる
    const userText = fullText.split(AI_DELIMITER)[0].trim();

    const btn = document.getElementById('ask-ai-btn');
    ViewController.applyGlobalLock("Asking AI Teacher...", btn);
    if (btn) btn.innerText = AI_LOADING_TEXT;

    google.script.run
      .withSuccessHandler(res => {
        ViewController.releaseLocks();
        if (res) {
          // 自分のテキスト ＋ デリミタ ＋ AIの最新回答 で上書き
          const newText = userText + AI_DELIMITER + res;
          textarea.value = newText;
          
          // 自動でDBに保存（手動でDoneを押す手間を省く）
          Bridge.executeSaveMemo(item.id, newText);
          ViewController.showToast("AI Replied!", "success");
        } else {
          ViewController.showToast("AI is busy.", "error");
        }
        // 成功時のボタン表記リセット
        if (btn) btn.innerText = AI_BTN_TEXT;
      })
      .withFailureHandler(err => {
        ViewController.releaseLocks();
        ViewController.showToast("Network Error.", "error");
        // 失敗時のボタン表記リセット
        if (btn) btn.innerText = AI_BTN_TEXT;
      })
      .askAiTeacher(JSON.stringify(item), userText);
  },
};
const AutoPlayEngine = {
  active: false,
  timer: null,
  wakeLock: null, 

  _blocker: function(e) {
    if (e.target.closest('#autoplay-toggle-btn')) return;
    e.stopPropagation();
    e.preventDefault();
  },

  toggle: function() {
    if (this.active) this.stop();
    else this.start();
  },

  start: function() {
    if (this.active) return;
    this.active = true;
    this.updateUI(true);
    this.updateLock(true);
    
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen')
        .then(lock => { this.wakeLock = lock; })
        .catch(err => console.log('WakeLock Error:', err));
    }

    this.executeStep(0); 
  },

  stop: function() {
    this.active = false;
    if (this.timer) clearTimeout(this.timer);
    window.speechSynthesis.cancel();
    this.updateUI(false);
    this.updateLock(false);
    
    if (this.wakeLock) {
      this.wakeLock.release().catch(err => console.log(err));
      this.wakeLock = null;
    }
  },

  updateLock: function(isActive) {
    if (isActive) {
      document.addEventListener('click', this._blocker, true);
      if (document.activeElement) document.activeElement.blur();
    } else {
      document.removeEventListener('click', this._blocker, true);
    }
  },

  updateUI: function(isActive) {
    const btn = document.getElementById('autoplay-toggle-btn');
    const icon = document.getElementById('play-icon');
    const pulse = document.getElementById('autoplay-pulse');
    if (!btn || !icon) return;

    if (isActive) {
      btn.classList.replace('text-blue-500/40', 'text-blue-500');
      pulse?.classList.remove('hidden');
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 9h6v6H9z" />';
    } else {
      btn.classList.replace('text-blue-500', 'text-blue-500/40');
      pulse?.classList.add('hidden');
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
    }
  },

  executeStep: function(step) {
    if (!this.active) return;
    const item = AppStore.state.queue[AppStore.state.currentIndex];
    if (!item) return this.stop();
    
    const isThaiMode = AppStore.state.isTargetThai;
    const rate = AppStore.state.isSlowMode ? 0.7 : 0.9;

    switch (step) {
      case 0: // ① 表面の読み上げ ＋ めくり
        // 二重再生防止のため元の声帯を奪う
        const originalSpeak = StudyEngine.speak;
        StudyEngine.speak = function() {}; 
        
        StudyEngine.revealAll(); 
        
        // 0.5秒後に声帯を返す
        setTimeout(() => { StudyEngine.speak = originalSpeak; }, 500); 

        const t0 = isThaiMode ? item.word_th : item.meaning_ja;
        this.timer = setTimeout(() => {
          AudioSystem.play(t0, isThaiMode ? 'th-TH' : 'ja-JP', isThaiMode ? rate : 1.0, () => {
            // 単語（1回目）が終わったら、すぐに裏面（日本語）へ
            if (this.active) this.timer = setTimeout(() => this.executeStep(1), 1000);
          });
        }, 100);
        break;

      case 1: // ② 裏面（意味）の読み上げ
        const t1 = isThaiMode ? item.meaning_ja : item.word_th;
        AudioSystem.play(t1, isThaiMode ? 'ja-JP' : 'th-TH', isThaiMode ? 1.0 : rate, () => {
          if (this.active) this.timer = setTimeout(() => this.executeStep(2), 1200);
        });
        break;

      case 2: // ③ 例文問い（1回目）
        const t2 = isThaiMode ? item.example_th : item.example_ja;
        if (t2 && t2 !== "---") {
          AudioSystem.play(t2, isThaiMode ? 'th-TH' : 'ja-JP', isThaiMode ? rate : 1.0, () => {
            if (this.active) this.timer = setTimeout(() => this.executeStep(3), 800);
          });
        } else {
          // 例文がない場合はスキップして次へ
          this.executeStep(4);
        }
        break;

      case 3: // ④ 例文問い（2回目リピート）
        const t3 = isThaiMode ? item.example_th : item.example_ja;
        AudioSystem.play(t3, isThaiMode ? 'th-TH' : 'ja-JP', isThaiMode ? rate : 1.0, () => {
          if (this.active) this.timer = setTimeout(() => this.executeStep(4), 1200);
        });
        break;

      case 4: // ⑤ 例文答え（日本語） ＋ 次のカードへ
        const t4 = isThaiMode ? item.example_ja : item.example_th;
        const nextWord = () => {
          if (!this.active) return;
          const nextIdx = (AppStore.state.currentIndex + 1) % AppStore.state.queue.length;
          AppStore.update('currentIndex', nextIdx);
          StudyEngine.render(); 
          this.timer = setTimeout(() => this.executeStep(0), 2000); // 2秒待って次の単語へ
        };
        
        if (t4 && t4 !== "---") {
          AudioSystem.play(t4, isThaiMode ? 'ja-JP' : 'th-TH', isThaiMode ? 1.0 : rate, nextWord);
        } else {
          nextWord();
        }
        break;
    }
  },

};

// ★追加：2. バックグラウンド（別アプリ切り替えや画面オフ）を検知して自動一時停止
document.addEventListener("visibilitychange", () => {
  if (document.hidden && AutoPlayEngine.active) {
    AutoPlayEngine.stop();
    // もしトースト通知が出せる状態なら、一言添えてあげる
    if (typeof ViewController !== 'undefined' && ViewController.showToast) {
      ViewController.showToast("Background mode: Paused.", "warning");
    }
  }
});
</script>
