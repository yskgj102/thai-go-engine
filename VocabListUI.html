<script>
/**
 * VocabListUI: ボキャブラリーリストの表示・高度な検索・無限スクロールを管理
 * 発音記号の揺れや日本語の読み（ひらがな/カタカナ）を吸収する「山岡流正規化エンジン」を搭載。
 */
const VocabListUI = {
  state: {
    displayLimit: 80, // 初回表示件数（2万件を一度に出さず、描画負荷を軽減）
    currentQuery: "",  // 現在の検索文字列
    onlyBookmark: false // ★ここを真偽値で持つ
  },

  /**
   * 山岡流・発音記号正規化エンジン
   * タイ語特有の声調記号や特殊母音を、アルファベットのみのプレーンな文字列に変換する。
   * 1. NFD正規化で「母音」と「声調記号」を分離して記号を消去
   * 2. 特殊母音 (ɔ, ɛ, ɯ, ə) を標準アルファベットへ置換
   * 3. 有気音(h)や末尾鼻音(ng)の揺れを吸収し、検索ヒット率を最大化
   */
  normalizePhonetic: function(str) {
    if (!str) return "";
    return str.toLowerCase()
              .normalize("NFD")               // 声調記号を分離（á -> a + ´）
              .replace(/[\u0300-\u036f]/g, "") // 分離した声調記号のみを削除
              .replace(/ɔ/g, "o")             // ɔ -> o (thɔ́ɔng -> thong)
              .replace(/ɛ/g, "e")             // ɛ -> e (ka-fɛɛ -> kafee)
              .replace(/ɯ/g, "u")             // ɯ -> u (mɯɯ -> muu)
              .replace(/ə/g, "o")             // ə -> o
              .replace(/[- ]/g, "")           // ハイフン・スペースを完全に除去
              .replace(/ph/g, "p")            // 有気音の揺れ対策 (ph -> p)
              .replace(/th/g, "t")            // (th -> t)
              .replace(/kh/g, "k")            // (kh -> k)
              .replace(/ng/g, "n")            // 末尾の鼻母音 (ng -> n)
              .replace(/[’']/g, "")           // アポストロフィを除去
              .replace(/y$/g, "i");           // 末尾のyをiとみなす
  },

  /**
   * 日本語検索用の正規化エンジン
   * カタカナ、ひらがな、送り仮名の揺れを吸収する。
   */
  normalizeJapanese: function(str) {
    if (!str) return "";
    return str
      .replace(/[\u30a1-\u30f6]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0x60); // カタカナをひらがなに統一
      })
      .replace(/ー/g, "") // 長音記号を除去（コーヒー/こーひー どちらでもヒットさせる）
      .replace(/[する|した|したこと]$/, "") // 動詞の語尾変化をカットして語幹でマッチング
      .trim();
  },

  /**
   * 検索クエリの更新と再描画
   * @param {string} query - 検索入力文字列
   */
  update: function(query,isAllowList = false) {
    const searchInput = document.getElementById('list-search');
    // 検索窓の値を優先し、なければ引数を使用。全角スペースを処理して小文字化
    let q = (searchInput && searchInput.value !== undefined) ? searchInput.value : (query || '');
    this.state.currentQuery = q.toLowerCase().trim();
this.renderCategoryBar();
    // 検索のたびに表示リミットをリセットして爆速化
    this.state.displayLimit = 80;
    this.render(isAllowList);
  },

  /**
   * 無限スクロール用：表示件数を拡張
   */
  loadMore: function() {
    this.state.displayLimit += 80;
    this.render();
  },

  /**
   * リストのメインレンダリング（描画）
   * AppStoreの全データに対し、正規化エンジンを通したスコアリング検索を実行する。
   */
  render: function(isAllowList = false) {
    const container = document.getElementById('vocab-list-container');
    const totalCountEl = document.getElementById('vocab-total-count'); 
    if (!container) return;

    // AppStoreから全2万件のデータを取得
    const allVocab = AppStore.state.allVocab; 
    const q = this.state.currentQuery;
    const isLocked = AppStore.state.isProcessing;

    if (!allVocab || allVocab.length === 0) {
      container.innerHTML = `<div class="p-12 text-center opacity-40"><div class="animate-spin w-5 h-6 border-2 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div></div>`;
      return;
    }

    // 通信ロック中はクリックを無効化
   // 66行目付近
// 許可(isAllowList)が true なら、isLocked が true だろうが関係ない。
    // ロック用の pointer-events-none や opacity-50 を「一切付けない」ルートを通す。
const pointerClass = (isLocked && !isAllowList) ? 'pointer-events-none opacity-50' : 'cursor-pointer';
// --- ★ここから検索ロジックの修正 ---
    let displayData = allVocab;

    // 1. まず「星フィルタ」がONなら絞り込む
    if (this.state.onlyBookmark) {
      displayData = displayData.filter(v => 
        v.is_bookmark === true || String(v.is_bookmark).toLowerCase() === "true"
      );
    }

    // 2. その後、検索窓に文字があればスコアリング検索を実行
    if (q !== '') {
      // スペース区切りのAND検索に対応
      const keywords = q.split(/[\s　]+/).filter(k => k.length > 0);
      const normalizedKeywords = keywords.map(kw => this.normalizePhonetic(kw));
      const normalizedJapaneseKeywords = keywords.map(kw => this.normalizeJapanese(kw));
// 【★修正ポイント】ここで qLower を定義します
      const qLower = q.toLowerCase();
      displayData = displayData.map(v => {
        let score = 0;
// ★ ここを修正：String() で囲って、数値でも安全に文字列として扱う
        const th = String(v.word_th || "").toLowerCase();
        const rawPh = String(v.phonetic || "").toLowerCase();
        const cat = String(v.category || "").toLowerCase();
        

        // 【★強化ポイント1】カテゴリー完全一致なら、超高スコアを与えて最上位へ
  // ボタンで「動詞」を押した時、他の単語をすべて引き離して「動詞」だけを並べる
  if (cat === qLower || cat.startsWith(qLower)) {
    score += 10000; // 桁違いのスコアで最優先
  }
        // データ側の発音記号も正規化エンジンに通して比較
        const normPh = this.normalizePhonetic(rawPh);
const ja   = String(v.meaning_ja || ""); 
        const kana = this.normalizeJapanese(String(v.meaning_kana || ""));

        // 全キーワードがどれかのフィールドに部分一致するかチェック
        const isMatch = keywords.every((kw, i) => {
          const nKw = normalizedKeywords[i];
          const kJ = normalizedJapaneseKeywords[i]; 
          
          const matchTh = th.includes(kw);
          const matchJa = ja.includes(kw);       // 漢字へのマッチ
          const matchKana = kana.includes(kJ);   // ひらがな読みへのマッチ
          const matchCat = cat.includes(kw);
          const matchPh = normPh.includes(nKw);  // 正規化発音記号へのマッチ

          // スコアリング：ユーザーの意図に近いものを上位へ
          if (matchTh) score += 500;
          if (matchJa) score += 600;   // 漢字一致は意図が強いため高め
          if (matchKana) score += 400; 
          if (matchCat) score += 800; // カテゴリー一致の重みを少しアップ
          
          if (matchPh) {
            if (normPh === nKw) score += 2000;      // 完全一致は最優先
            else if (normPh.startsWith(nKw)) score += 1000; // 前方一致
            else score += 500;
            
          }
          return (matchTh || matchJa || matchKana || matchPh || matchCat);
        });

        return { ...v, matchScore: isMatch ? score : 0 };
      }).filter(v => v.matchScore > 0).sort((a, b) => b.matchScore - a.matchScore);
    }

    // ヒット件数の表示更新
    if (totalCountEl) totalCountEl.innerText = `${displayData.length} hits`;

    const limitedData = displayData.slice(0, this.state.displayLimit);

    // --- HTML生成（各単語カードの構築） ---
    let html = "";
// ★追加：星フィルタがONで、かつデータがある場合にシャッフル学習ボタンを表示
// ★修正：プロセス中(isLocked)はボタンを無効化する
    if (this.state.onlyBookmark && displayData.length > 0) {
      const btnClass = isLocked 
        ? "opacity-30 pointer-events-none cursor-not-allowed" // ロック時：薄くして触らせない
        : "opacity-100 active:scale-95 cursor-pointer";    // 通常時：くっきり、押し心地あり

      html += `
        <div class="p-2 mb-4">
          <button onclick="VocabListUI.startBookmarkStudy()" 
                  ${isLocked ? 'disabled' : ''} 
                  class="w-full p-4 bg-[#FFD700]/10 border border-[#FFD700]/30 rounded-2xl text-[#FFD700] text-[12px] font-black uppercase tracking-[0.2em] shadow-[0_0_15px_rgba(255,215,0,0.1)] transition-all flex items-center justify-center gap-3 ${btnClass}">
            <span class="text-[14px]">${isLocked ? '⌛' : '🔀'}</span> 
            ${isLocked ? 'PROCESSING...' : `START STAR SHUFFLE (${displayData.length})`}
          </button>
        </div>
      `;
    }
    // --- HTML生成（各単語カードの構築） ---
// --- HTML生成（各単語カードの構築） ---
    html += limitedData.map(item => {
      // 忘却度に応じたカラーバーをStudyEngineから取得
      const statusColor = StudyEngine.getColor(item); 
      
      // ★ ブックマーク状態の判定（1,370件のデータ揺れを吸収）
      const isBM = (item.is_bookmark === true || String(item.is_bookmark).toLowerCase() === "true");

      return `
        <div onclick="StudyEngine.jumpToWordFromId('${item.id}');ViewController.toggleVocabPanel()" 
             class="relative flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5 active:scale-95 transition-all mb-2 overflow-hidden ${pointerClass}">
          
          <div class="absolute left-0 top-0 bottom-0 w-[2px]" style="background-color: ${statusColor}; opacity: 0.8;"></div>

          <div class="min-w-0 flex-1 pl-2">
            <div class="flex items-center gap-2 mb-0.5">
              ${isBM ? '<span class="text-[10px] text-[#FFD700] drop-shadow-[0_0_5px_rgba(255,215,0,0.4)] shrink-0">★</span>' : ''}
              
              <span class="thai-font text-[13px] font-bold text-blue-500/90 truncate">${item.word_th}</span>
              <span class="text-[8px] font-mono opacity-20 shrink-0">${item.last_date === 'New' ? 'New' : item.last_date.split(' ')[0]}</span>
            </div>
            <div class="text-[10px] opacity-40 truncate">${item.meaning_ja}</div>
            <div class="text-[9px] opacity-20 italic font-mono truncate mt-0.5">${item.phonetic || ''}</div>
          </div>
          <div class="text-right ml-2 shrink-0">
            <div class="text-[8px] font-black uppercase tracking-tighter opacity-20 mb-1">${item.category}</div>
            <div class="text-[7px] font-mono opacity-10 italic">${item.interval}d</div>
          </div>
        </div>
      `;
    }).join('');

    // 無限スクロール：最下部まで来たら次の80件をロード
    if (displayData.length > this.state.displayLimit) {
      html += `<div id="list-end-marker" class="p-8 text-center opacity-20 text-[9px] tracking-widest">LOADING MORE...</div>`;
    }

    // クイック追加ボタン：検索結果がない、または少ない場合に候補として表示
    if (q.length > 0 && displayData.length < 50) {
      const btnLabel = isLocked ? '... PROCESSING ...' : `+ Add "${q}" to List`;
      html += `<div class="p-2 pt-4">
        <button id="list-add-btn" ${isLocked ? 'disabled' : ''} 
          onclick="Bridge.executeQuickAdd('${q.replace(/'/g, "")}')" 
          class="w-full p-4 bg-blue-500/10 border border-blue-500/30 rounded-2xl text-blue-500 text-[11px] font-black uppercase tracking-widest active:scale-95 transition-all ${isLocked ? 'opacity-50' : ''}">
          ${btnLabel}
        </button></div>`;
    }

    container.innerHTML = html || `<div class="p-20 text-center opacity-20 text-[10px] tracking-widest">NO RESULTS FOUND</div>`;

    this.initObserver();
  },
  /**
   * 星付き単語のみをシャッフルして学習を開始
   */
  startBookmarkStudy: function() {
    // 1. 星付きだけを抽出
    const stars = AppStore.state.allVocab.filter(v => 
      v.is_bookmark === true || String(v.is_bookmark).toLowerCase() === "true"
    );

    if (stars.length === 0) return;

    // 2. シャッフル（Fisher-Yates アルゴリズム）
    for (let i = stars.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [stars[i], stars[j]] = [stars[j], stars[i]];
    }

    // 3. AppStore のキューを「星付きシャッフル」に差し替え
    AppStore.state.queue = stars;
    AppStore.update('currentIndex', 0);

    // 4. 学習画面へ遷移して描画
    ViewController.toggleVocabPanel(); // リストを閉じる
    StudyEngine.render();             // 最初のカードを表示
    
    ViewController.showToast(`Started Star Shuffle: ${stars.length} words`, "success");
    if (window.navigator.vibrate) window.navigator.vibrate([10, 30, 10]);
  },
/**
 * カテゴリーボタンの描画（アクティブ状態対応）
 */
renderCategoryBar: function() {
const container = document.getElementById('category-filter-bar');
  if (!container) return;

  const currentQ = this.state.currentQuery;
  const allVocab = AppStore.state.allVocab || [];

  // 1. 純粋な日本語名だけを抽出
  const uniqueCats = [...new Set(
    allVocab.map(v => v.category?.replace(/[^\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF].*$/, '') || '')
  )].filter(c => c && c !== "未分類");

  // 2. 【一般的・高頻度順】の定義
  const commonOrder = ["名詞", "動詞", "形容詞", "副詞", "助動詞", "前置詞", "接続詞", "代名詞", "文末詞"];

  // 3. 定義した順序でソート（リストにないものは一番後ろへ）
  const sortedCats = uniqueCats.sort((a, b) => {
    let indexA = commonOrder.indexOf(a);
    let indexB = commonOrder.indexOf(b);
    if (indexA === -1) indexA = 999;
    if (indexB === -1) indexB = 999;
    return indexA - indexB;
  });

// ★ 2. ボタン配列に星を追加
    const buttons = ["全件", "⭐", ...sortedCats];
    
  container.innerHTML = buttons.map(cat => {
  let isActive = false;
  
  if (cat === "⭐") {
    isActive = this.state.onlyBookmark;
  } else if (cat === "全件") {
    // 検索窓が空、かつ、星もOFFの時だけ「全件」を光らせる
    isActive = (this.state.currentQuery === "" && !this.state.onlyBookmark);
  } else {
    // カテゴリボタンの判定
    isActive = (this.state.currentQuery === cat.toLowerCase());
  }

  const activeClass = isActive 
    ? 'bg-blue-600 text-white border-blue-400 shadow-[0_0_10px_rgba(37,99,235,0.5)] scale-105' 
    : 'bg-white/5 text-white/40 border-white/10 hover:bg-white/10';
    return `
      <button class="category-btn px-4 py-1.5 rounded-full border text-[10px] font-black transition-all active:scale-95 ${activeClass}" 
              onclick="VocabListUI.applyCategoryFilter('${cat}')">
        ${cat}
      </button>
    `;
  }).join('');
},
/**
 * カテゴリ・星ボタンを押した時の挙動
 */
applyCategoryFilter: function(cat) {
  const searchInput = document.getElementById('list-search');
  
  if (cat === "⭐") {
    // 星ボタンはトグル（ON/OFF）
    this.state.onlyBookmark = !this.state.onlyBookmark;
  } else if (cat === "全件") {
    // 全リセット
    this.state.currentQuery = "";
    this.state.onlyBookmark = false;
    if (searchInput) searchInput.value = "";
  } else {
    // カテゴリ絞り込み（星フィルタは維持したままカテゴリだけ変える）
    const q = cat.toLowerCase();
    this.state.currentQuery = q;
    if (searchInput) searchInput.value = cat + " ";
  }

  // ★重要：ここで「ボタンの色」を即座に塗り替える
  this.renderCategoryBar();
  
  // リストの中身を更新
  this.state.displayLimit = 80;
  this.render();
  
  if (window.navigator.vibrate) window.navigator.vibrate(5);
},
  /**
   * IntersectionObserverによるスクロール検知の初期化
   */
  initObserver: function() {
    const marker = document.getElementById('list-end-marker');
    if (!marker) return;

    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        observer.disconnect();
        this.loadMore();
      }
    }, { root: document.getElementById('vocab-panel'), threshold: 0.1 });

    observer.observe(marker);
  }
};
</script>
